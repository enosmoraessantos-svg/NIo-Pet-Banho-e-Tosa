<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM - Nilo Pet</title>
    <script src="https://jsdelivr.net"></script>
    <script src="https://cloudflare.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --azul-claro: #e3f2fd;
            --azul-medio: #2196f3;
            --azul-escuro: #1565c0;
            --branco: #ffffff;
            --cinza: #f5f5f5;
        }

        body { font-family: 'Poppins', sans-serif; background-color: var(--azul-claro); margin: 0; display: flex; }
        
        /* Login Overlay */
        #login-screen {
            position: fixed; inset: 0; background: var(--azul-claro);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .login-card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; }
        
        /* Dashboard Layout */
        #admin-panel { display: none; width: 100%; height: 100vh; flex-direction: row; }
        
        .sidebar {
            width: 260px; background: var(--azul-escuro); color: white;
            padding: 20px; display: flex; flex-direction: column; gap: 10px;
        }
        
        .sidebar button {
            background: transparent; border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 12px; border-radius: 8px; cursor: pointer;
            text-align: left; transition: 0.3s;
        }
        
        .sidebar button:hover { background: var(--azul-medio); }
        
        .main-content { flex: 1; padding: 30px; overflow-y: auto; background: var(--azul-claro); }
        
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: var(--azul-medio); color: white; border-radius: 4px; }

        .btn-zap { background: #25d366; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        .grid-vagas { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div id="login-screen">
        <div class="login-card" id="card-auth">
            <h2 style="color: var(--azul-escuro)">Nilo Pet ADM</h2>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button onclick="login()" style="width: 100%; padding: 12px; background: var(--azul-medio); color: white; border: none; border-radius: 8px; cursor: pointer;">Entrar</button>
            <p onclick="mostrarEsqueciSenha()" style="text-align: center; color: var(--azul-escuro); cursor: pointer; margin-top: 15px; font-size: 0.9rem;">Esqueci minha senha</p>
        </div>
        
        <div class="login-card" id="card-esqueci" style="display: none;">
            <h3>Recuperar Senha</h3>
            <p>Qual o nome do pet?</p>
            <input type="text" id="resp-pet" placeholder="Nome do pet">
            <button onclick="recuperarSenha()" style="width: 100%; padding: 12px; background: var(--azul-medio); color: white; border: none; border-radius: 8px;">Verificar</button>
            <button onclick="voltarLogin()" style="background: none; border: none; width: 100%; margin-top: 10px;">Voltar</button>
        </div>
    </div>

    <!-- PAINEL PRINCIPAL -->
    <div id="admin-panel">
        <div class="sidebar">
            <h3 style="text-align: center;">Nilo Pet</h3>
            <button onclick="showSection('geral')">Agendamento Geral</button>
            <button onclick="showSection('dia')">Agendamento do Dia</button>
            <button onclick="showSection('pacotes')">Pacotes</button>
            <button onclick="showSection('vagas')">Gestão de Vagas</button>
            <button onclick="showSection('bloqueio')">Bloqueio/Desbloqueio</button>
            <button onclick="exportarExcel()">Exportar Relatório</button>
            <button onclick="location.reload()" style="margin-top: auto; background: #e74c3c;">Sair</button>
        </div>

        <div class="main-content">
            <!-- As seções serão injetadas aqui via JS -->
            <div id="content-area"></div>
        </div>
    </div>

    <script>
        // A URL deve parar no .co
const SB_URL = "https://yczhjyxisqrvfxxgipop.supabase.co"; 
const SB_KEY = "sb_publishable_6SmMDIymguOi59WrVb1QQA_wSykUdUm";

// A inicialização deve ser assim:
const supabaseClient = supabase.createClient(SB_URL, SB_KEY);


        // LOGIN LOGIC
        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === 'nilo pet banho e tosa' && p === 'nilopetbanhoetosa2026') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'flex';
                showSection('geral');
            } else { alert('Acesso negado'); }
        }

        function mostrarEsqueciSenha() {
            document.getElementById('card-auth').style.display = 'none';
            document.getElementById('card-esqueci').style.display = 'block';
        }

        function recuperarSenha() {
            const resp = document.getElementById('resp-pet').value.toLowerCase();
            if(resp === 'nilo pet banho e tosa') {
                alert('Sua senha é: nilopetbanhoetosa2026');
                voltarLogin();
            } else { alert('Resposta incorreta'); }
        }

        function voltarLogin() {
            document.getElementById('card-auth').style.display = 'block';
            document.getElementById('card-esqueci').style.display = 'none';
        }

        // NAVEGAÇÃO E SEÇÕES
        async function showSection(section) {
            const area = document.getElementById('content-area');
            area.innerHTML = `<h2>Carregando ${section}...</h2>`;

            if(section === 'geral') {
                const { data } = await supabase.from('agendamentos').select('*').order('data_agendamento', { ascending: true });
                renderGeral(data);
            }
            // Implementar as outras seções seguindo a mesma lógica
        }

        function renderGeral(dados) {
            let html = `
                <div class="card">
                    <h2>Agendamento Geral</h2>
                    <div style="display:flex; gap:10px; margin-bottom: 20px;">
                        <input type="date" id="filtro-data" onchange="filtrar()">
                        <select id="filtro-status"><option>Todos</option><option>Falou com cliente</option></select>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Cliente/Pet</th>
                                <th>Serviço</th>
                                <th>Data/Hora</th>
                                <th>Pagamento</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${dados.map(item => `
                                <tr>
                                    <td>${item.cliente_nome}<br><small>${item.pet_nome}</small></td>
                                    <td>${item.servico} (${item.tipo_plano})</td>
                                    <td>${item.data_agendamento}<br>${item.horario}</td>
                                    <td>R$ ${item.valor_total || '0,00'}</td>
                                    <td>
                                        <button class="btn-zap" onclick="enviarZap('${item.whatsapp}', 'confirmacao')">Confirmar</button>
                                        <button onclick="excluir('${item.id}')" style="background:red; color:white; border:none; border-radius:5px;">X</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            document.getElementById('content-area').innerHTML = html;
        }

        // WHATSAPP LOGIC
        function enviarZap(num, tipo) {
            let msg = "";
            if(tipo === 'confirmacao') msg = "Olá, segue os dados do seu agendamento...";
            window.open(`https://wa.me{num.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`);
        }

        // EXPORTAR EXCEL
        function exportarExcel() {
            // Lógica para pegar os dados da tabela e converter usando a lib XLSX
            alert('Gerando relatório...');
        }
    </script>
</body>
</html>
