<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM Nilo Pet</title>
    <script src="https://jsdelivr.net"></script>
    <script src="https://cloudflare.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --azul: #e3f2fd; --azul-m: #2196f3; --azul-e: #1565c0; }
        body { font-family: 'Poppins', sans-serif; background: var(--azul); margin: 0; display: flex; height: 100vh; }
        #login-screen { position: fixed; inset: 0; background: var(--azul); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .card-login { background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        .sidebar { width: 250px; background: var(--azul-e); color: #fff; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .sidebar button { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 12px; border-radius: 8px; cursor: pointer; text-align: left; }
        .sidebar button:hover { background: var(--azul-m); }
        .main { flex: 1; padding: 20px; overflow-y: auto; }
        .item-card { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn-acao { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card-login">
        <h2>Nilo Pet ADM</h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="login()" style="width:100%; background:var(--azul-m); color:#fff; border:none; padding:12px; border-radius:8px; cursor:pointer;">ENTRAR</button>
    </div>
</div>

<div class="sidebar">
    <h3>NILO PET</h3>
    <button onclick="carregarAgendamentos('geral')">Agendamento Geral</button>
    <button onclick="carregarAgendamentos('dia')">Agendamento do Dia</button>
    <button onclick="carregarAgendamentos('pacotes')">Pacotes</button>
    <button onclick="exportarExcel()" style="background:#4caf50">Exportar Excel</button>
    <button onclick="location.reload()" style="background:#f44336; margin-top:auto">Sair</button>
</div>

<div class="main">
    <h2 id="titulo-pagina">Agendamento Geral</h2>
    <div id="loading" style="display:none">Carregando dados...</div>
    <div id="lista-agendamentos"></div>
</div>

<script>
    const SB_URL = "https://supabase.co";
    const SB_KEY = "sb_publishable_6SmMDIymguOi59WrVb1QQA_wSykUdUm";
    let supabase;

    // Inicialização forçada
    window.addEventListener('DOMContentLoaded', () => {
        if (window.supabase) {
            supabase = window.supabase.createClient(SB_URL, SB_KEY);
        }
    });

    function login() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === 'nilo pet banho e tosa' && p === 'nilopetbanhoetosa2026') {
            document.getElementById('login-screen').style.display = 'none';
            carregarAgendamentos('geral');
        } else { alert("Dados incorretos!"); }
    }

    async function carregarAgendamentos(tipo) {
        if (!supabase) return alert("Erro de conexão. Recarregue a página.");
        
        document.getElementById('loading').style.display = 'block';
        document.getElementById('lista-agendamentos').innerHTML = "";
        document.getElementById('titulo-pagina').innerText = "Carregando...";

        const { data, error } = await supabase.from('agendamentos').select('*');
        
        document.getElementById('loading').style.display = 'none';
        
        if (error) {
            alert("Erro no banco: " + error.message);
            return;
        }

        let filtrados = data;
        const hoje = new Date().toISOString().split('T')[0];

        if (tipo === 'dia') filtrados = data.filter(a => a.data_agendamento === hoje);
        if (tipo === 'pacotes') filtrados = data.filter(a => a.tipo_plano !== 'avulso');

        document.getElementById('titulo-pagina').innerText = tipo.toUpperCase();
        renderizar(filtrados);
    }

    function renderizar(dados) {
        const container = document.getElementById('lista-agendamentos');
        if (dados.length === 0) {
            container.innerHTML = "<p>Nenhum agendamento encontrado.</p>";
            return;
        }

        dados.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item-card';
            div.innerHTML = `
                <div>
                    <strong>${item.cliente_nome}</strong> (${item.pet_nome})<br>
                    <small>${item.data_agendamento} às ${item.horario} - ${item.tipo_plano}</small>
                </div>
                <div>
                    <button class="btn-acao" style="background:#25d366; color:#fff" onclick="window.open('https://wa.me{item.whatsapp}')">Zap</button>
                    <button class="btn-acao" style="background:#f44336; color:#fff" onclick="excluir('${item.id}')">X</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    async function excluir(id) {
        if(confirm("Excluir definitivamente?")) {
            await supabase.from('agendamentos').delete().eq('id', id);
            carregarAgendamentos('geral');
        }
    }

    function exportarExcel() {
        alert("Gerando Excel...");
        // A lógica de exportação aqui
    }
</script>
</body>
</html>
