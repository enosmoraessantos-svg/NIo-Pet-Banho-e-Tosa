<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM - Nilo Pet</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://unpkg.com"></script>
    <style>
        body { background: linear-gradient(135deg, #1e3a8a, #1e40af); min-height: 100vh; color: white; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .sidebar-btn { @apply w-full text-left p-3 rounded hover:bg-blue-700 transition mb-2; }
    </style>
</head>
<body>
    <!-- TELA DE LOGIN -->
    <div id="login-screen" class="flex items-center justify-center h-screen">
        <div class="glass p-8 rounded-xl shadow-2xl w-96 text-center">
            <h2 class="text-2xl font-bold mb-6">Nilo Pet ADM</h2>
            <input id="user" type="text" placeholder="Usuário" class="w-full p-2 mb-4 rounded bg-white text-black">
            <input id="pass" type="password" placeholder="Senha" class="w-full p-2 mb-4 rounded bg-white text-black">
            <button onclick="logar()" class="w-full bg-blue-600 p-2 rounded font-bold hover:bg-blue-500">Entrar</button>
            <button onclick="esqueciSenha()" class="mt-4 text-sm underline opacity-80">Esqueci a senha</button>
        </div>
    </div>

    <!-- PAINEL PRINCIPAL (Escondido por padrão) -->
    <div id="main-panel" class="hidden flex">
        <!-- Sidebar -->
        <div class="w-64 glass h-screen p-4 flex flex-col">
            <h1 class="text-xl font-bold mb-8 border-b pb-2">Painel Nilo Pet</h1>
            <button onclick="showTab('geral')" class="sidebar-btn">Agendamento Geral</button>
            <button onclick="showTab('dia')" class="sidebar-btn">Agendamento do Dia</button>
            <button onclick="showTab('pacotes')" class="sidebar-btn">Pacotes</button>
            <button onclick="showTab('vagas')" class="sidebar-btn">Gestão de Vagas</button>
            <button onclick="showTab('bloqueio')" class="sidebar-btn">Bloqueio/Desbloqueio</button>
            <button onclick="exportarExcel()" class="sidebar-btn bg-green-700">Exportar Relatório</button>
            <button onclick="location.reload()" class="sidebar-btn mt-auto bg-red-700">Sair</button>
        </div>

        <!-- Conteúdo -->
        <div class="flex-1 p-8 overflow-y-auto">
            <div id="tab-content" class="glass p-6 rounded-xl min-h-full">
                <!-- Conteúdo dinâmico via JS -->
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://supabase.co"; 
        const SB_KEY = "sb_publishable_6SmMDIymguOi59WrVb1QQA_wSykUdUm";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        function logar() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "nilo pet" && p === "nilopet2026") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-panel').classList.remove('hidden');
                showTab('geral');
            } else { alert("Login incorreto!"); }
        }

        function esqueciSenha() {
            const pet = prompt("Qual o nome do pet?");
            if(pet && pet.toLowerCase() === "nilo") alert("Senha: nilopet2026");
        }

        // Função para mostrar abas e carregar dados
        async function showTab(aba) {
            const content = document.getElementById('tab-content');
            content.innerHTML = `<h2 class="text-2xl font-bold mb-4 capitalize">${aba.replace('_',' ')}</h2>`;
            
            if(aba === 'geral') {
                const { data } = await supabaseClient.from('agendamentos').select('*').order('data_agendamento', {ascending: true});
                // Renderizar Tabela com botões Alterar/Excluir/Salvar/WhatsApp
                renderTable(data, content);
            }
            // Adicionar as outras lógicas de abas aqui...
        }

        function renderTable(data, container) {
            let html = `<div class="overflow-x-auto"><table class="w-full text-left text-sm">
                <thead><tr class="border-b"><th>Cliente</th><th>Pet</th><th>Data/Hora</th><th>Serviço</th><th>Ações</th></tr></thead><tbody>`;
            data.forEach(item => {
                html += `<tr class="border-b border-white/10">
                    <td>${item.cliente_nome}</td>
                    <td>${item.pet_nome}</td>
                    <td>${item.data_agendamento} ${item.horario_agendamento}</td>
                    <td>${item.servico}</td>
                    <td class="py-2">
                        <button onclick="msgWpp('${item.whatsapp}', '${item.cliente_nome}', '${item.data_agendamento}')" class="bg-green-600 p-1 rounded">Wpp</button>
                    </td>
                </tr>`;
            });
            html += `</tbody></table></div>`;
            container.innerHTML += html;
        }

        function msgWpp(num, nome, data) {
            const msg = window.encodeURIComponent(`Olá ${nome}, segue os dados do seu agendamento para o dia ${data}...`);
            window.open(`https://wa.me{num}?text=${msg}`);
        }
    </script>
</body>
</html>
