<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM - Nilo Pet</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://cloudflare.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; overflow-x: hidden; }
        .sidebar { width: 260px; height: 100vh; position: fixed; left: 0; top: 0; background: #1e293b; color: white; transition: 0.3s; z-index: 1000; }
        .content { margin-left: 260px; padding: 20px; transition: 0.3s; }
        .menu-item { padding: 15px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 600; border-left: 4px solid transparent; }
        .menu-item:hover { background: #334155; }
        .menu-item.active { background: #334155; border-left-color: #ef4444; color: #ef4444; }
        .card-pet { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 15px; margin-bottom: 15px; }
        .hidden { display: none; }
        .input-edit { background: transparent; border: 1px solid transparent; width: 100%; font-weight: bold; }
        .input-edit:focus { background: #f1f5f9; border-color: #cbd5e1; outline: none; border-radius: 4px; padding: 2px; }
    </style>
</head>
<body>

    <div id="loginArea" class="flex items-center justify-center min-h-screen bg-slate-100">
        <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-2xl text-center">
            <h1 class="text-3xl font-black text-slate-800 uppercase italic">Nilo Pet</h1>
            <input type="password" id="senhaAdm" placeholder="Senha de acesso" class="w-full p-4 border-2 rounded-xl mb-4 text-center">
            <button onclick="logar()" class="w-full bg-red-600 text-white font-black p-4 rounded-xl">ENTRAR NO SISTEMA</button>
        </div>
    </div>

    <div id="painelArea" class="hidden">
        <div class="sidebar" id="sidebar">
            <div class="p-6 border-b border-slate-700"><h2 class="font-black text-xl uppercase italic text-center">Nilo Pet ADM</h2></div>
            <nav class="mt-4">
                <div onclick="mudarFiltro('geral', this)" class="menu-item active">📊 Agendamentos Geral</div>
                <div onclick="mudarFiltro('vagas', this)" class="menu-item text-orange-400">🔒 Gestão de Vagas</div>
                <div onclick="exportarExcel()" class="menu-item text-green-400 mt-10">📥 Exportar Relatório</div>
                <div onclick="location.reload()" class="menu-item text-slate-400 mt-2">🚪 Sair</div>
            </nav>
        </div>

        <div class="content">
            <header class="flex justify-between items-center mb-8">
                <h2 id="tituloPagina" class="text-2xl font-black text-slate-800 uppercase italic">Agendamentos Geral</h2>
                <button onclick="carregarDados()" class="bg-white border p-3 rounded-xl shadow-sm font-bold text-xs uppercase">Sincronizar ↻</button>
            </header>
            <div id="containerCards" class="grid grid-cols-1 gap-4"></div>
        </div>
    </div>

    <script>
        const SB_URL = "https://supabase.co";
        const SB_KEY = "sb_publishable_6SmMDIymguOi59WrVb1QQA_wSykUdUm";
        const headers = { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "application/json", "Prefer": "return=minimal" };
        
        let todosDados = [];
        let filtroAtual = 'geral';

        function logar() {
            if(document.getElementById('senhaAdm').value === 'nilopet2024') {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('painelArea').classList.remove('hidden');
                carregarDados();
            } else { alert("Senha incorreta!"); }
        }

        async function carregarDados() {
            const container = document.getElementById('containerCards');
            container.innerHTML = "Carregando...";
            try {
                const endpoint = filtroAtual === 'vagas' ? "/configuracoes_agenda" : "/agendamentos";
                const res = await fetch(`${SB_URL}${endpoint}?select=*`, { headers });
                todosDados = await res.json();
                renderizar();
            } catch (e) { alert("Erro ao conectar ao banco!"); }
        }

        function renderizar() {
            const container = document.getElementById('containerCards');
            if(filtroAtual === 'vagas') return renderVagas(container);

            container.innerHTML = todosDados.length === 0 ? "Nenhum agendamento encontrado." : "";
            todosDados.forEach(item => {
                const div = document.createElement('div');
                div.className = "card-pet p-5 shadow-sm";
                div.innerHTML = `
                    <div class="flex justify-between border-b pb-3 mb-4">
                        <div class="w-full">
                            <input type="text" value="${item.cliente}" onchange="salvarCli('${item.id}', 'cliente', this.value)" class="input-edit text-lg uppercase italic text-slate-800">
                            <input type="text" value="${item.whatsapp}" onchange="salvarCli('${item.id}', 'whatsapp', this.value)" class="input-edit text-[10px] text-slate-500 uppercase">
                        </div>
                        <button onclick="excluir('${item.id}')" class="bg-slate-100 text-slate-400 px-4 py-2 rounded-lg text-[10px] font-black uppercase hover:bg-red-600 hover:text-white">Excluir</button>
                    </div>
                    <div class="space-y-2">
                        ${(item.pets || []).map(p => `<div class="text-xs font-bold text-red-600 uppercase">🐾 ${p.nome} - ${p.plano}</div>`).join('')}
                    </div>`;
                container.appendChild(div);
            });
        }

        function renderVagas(container) {
            const dias = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];
            container.innerHTML = `<div class="card-pet"><h3 class="font-bold mb-4 uppercase text-sm">Limites de Horários</h3>` + 
            todosDados.map(v => `
                <div class="flex items-center justify-between border-b py-2">
                    <span class="text-[11px] font-bold uppercase w-32">${dias[v.dia_semana]} - ${v.horario}</span>
                    <div class="flex gap-4">
                        <input type="number" value="${v.vagas_banho}" onchange="upVaga(${v.id}, 'vagas_banho', this.value)" class="w-12 border rounded text-xs p-1">
                        <div class="flex items-center gap-1">
                            <input type="checkbox" ${v.bloqueado ? 'checked' : ''} onchange="upVaga(${v.id}, 'bloqueado', this.checked)">
                            <label class="text-[9px] font-bold">FECHAR</label>
                        </div>
                    </div>
                </div>`).join('') + `</div>`;
        }

        async function salvarCli(id, campo, valor) { await fetch(`${SB_URL}/agendamentos?id=eq.${id}`, { method: "PATCH", headers, body: JSON.stringify({ [campo]: valor }) }); }
        async function upVaga(id, campo, valor) { await fetch(`${SB_URL}/configuracoes_agenda?id=eq.${id}`, { method: "PATCH", headers, body: JSON.stringify({ [campo]: valor }) }); }
        async function excluir(id) { if(confirm("Excluir?")) { await fetch(`${SB_URL}/agendamentos?id=eq.${id}`, { method: "DELETE", headers }); carregarDados(); } }
        function mudarFiltro(tipo, el) { 
            filtroAtual = tipo; 
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            el.classList.add('active');
            carregarDados(); 
        }
        function exportarExcel() {
            const ws = XLSX.utils.json_to_sheet(todosDados.map(i => ({ Cliente: i.cliente, Whats: i.whatsapp })));
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Dados");
            XLSX.writeFile(wb, "NiloPet_Relatorio.xlsx");
        }
    </script>
</body>
</html>
