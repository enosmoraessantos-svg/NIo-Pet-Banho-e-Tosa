<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nilo Pet - Painel Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100">
  <div id="loginScreen" class="fixed inset-0 bg-blue-900 bg-opacity-95 z-50 flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl w-96">
      <h2 class="text-2xl font-bold mb-6 text-center">Painel Nilo Pet</h2>
      <input id="loginUser" type="text" placeholder="Login" class="w-full border p-3 rounded mb-3" value="nilo pet">
      <input id="loginPass" type="password" placeholder="Senha" class="w-full border p-3 rounded mb-3">
      <button onclick="fazerLogin()" class="w-full bg-blue-600 text-white p-3 rounded font-semibold mb-2">Entrar</button>
      <button onclick="esqueciSenha()" class="text-sm text-blue-600 hover:underline">Esqueci senha</button>
      <div id="msgLogin" class="text-red-600 text-sm mt-2 hidden"></div>
    </div>
  </div>

  <div id="painel" class="hidden min-h-screen">
    <header class="bg-blue-800 text-white p-4">
      <div class="max-w-7xl mx-auto flex justify-between items-center">
        <h1 class="text-2xl font-bold">Nilo Pet - Painel Admin</h1>
        <button onclick="sair()" class="bg-red-600 px-4 py-2 rounded">Sair</button>
      </div>
    </header>

    <div class="max-w-7xl mx-auto p-4 flex gap-4">
      <div class="w-64 bg-white rounded-xl shadow-lg p-4 h-fit">
        <button onclick="aba('geral')" class="menu-btn w-full text-left p-3 rounded hover:bg-blue-50 mb-1 bg-blue-50">Agendamento Geral</button>
        <button onclick="aba('dia')" class="menu-btn w-full text-left p-3 rounded hover:bg-blue-50 mb-1">Agendamento do Dia</button>
        <button onclick="aba('pacotes')" class="menu-btn w-full text-left p-3 rounded hover:bg-blue-50 mb-1">Pacotes</button>
        <button onclick="aba('vagas')" class="menu-btn w-full text-left p-3 rounded hover:bg-blue-50 mb-1">Gestão de Vagas</button>
        <button onclick="aba('bloqueio')" class="menu-btn w-full text-left p-3 rounded hover:bg-blue-50 mb-1">Bloqueio/Desbloqueio</button>
        <button onclick="aba('relatorio')" class="menu-btn w-full text-left p-3 rounded hover:bg-blue-50 mb-1">Exportar Relatório</button>
      </div>

      <div class="flex-1 bg-white rounded-xl shadow-lg p-6">
        <div id="aba-geral" class="aba">
          <h2 class="text-xl font-bold mb-4">Agendamento Geral</h2>
          <div class="flex gap-2 mb-4">
            <input type="date" id="filtroData" class="border p-2 rounded">
            <select id="filtroFalou" class="border p-2 rounded">
              <option value="">Falou com cliente?</option>
              <option value="true">Sim</option><option value="false">Não</option>
            </select>
            <button onclick="carregarGeral()" class="bg-blue-600 text-white px-4 rounded">Filtrar</button>
            <button onclick="liberarMesSeguinte()" class="bg-green-600 text-white px-4 rounded">Liberar Próximo Mês</button>
          </div>
          <div id="listaGeral" class="space-y-3"></div>
        </div>

        <div id="aba-vagas" class="aba hidden">
          <h2 class="text-xl font-bold mb-4">Gestão de Vagas</h2>
          <p class="text-sm text-gray-600 mb-4">Defina quantidade por dia. Passando da quantidade, bloqueia no link do cliente.</p>
          <div id="configVagas" class="space-y-4"></div>
          <button onclick="salvarVagas()" class="mt-4 bg-green-600 text-white px-6 py-2 rounded">Salvar</button>
        </div>

        <div id="aba-bloqueio" class="aba hidden">
          <h2 class="text-xl font-bold mb-4">Bloqueio/Desbloqueio</h2>
          <div class="grid grid-cols-2 gap-4 mb-4">
            <input type="date" id="b_data_inicio" class="border p-2 rounded" placeholder="Data início">
            <input type="date" id="b_data_fim" class="border p-2 rounded" placeholder="Data fim">
            <input type="time" id="b_hora_inicio" class="border p-2 rounded" placeholder="Hora início">
            <input type="time" id="b_hora_fim" class="border p-2 rounded" placeholder="Hora fim">
          </div>
          <input id="b_motivo" placeholder="Motivo" class="w-full border p-2 rounded mb-3">
          <button onclick="bloquear('horario')" class="bg-red-600 text-white px-4 py-2 rounded mr-2">Bloquear Horário</button>
          <button onclick="bloquear('dia')" class="bg-red-600 text-white px-4 py-2 rounded">Fechar Dia Todo</button>
          <div id="listaBloqueios" class="mt-6"></div>
        </div>

        <div id="aba-relatorio" class="aba hidden">
          <h2 class="text-xl font-bold mb-4">Exportar Relatório</h2>
          <button onclick="exportar('dia')" class="bg-green-600 text-white px-4 py-2 rounded mr-2">Dia</button>
          <button onclick="exportar('semana')" class="bg-green-600 text-white px-4 py-2 rounded mr-2">Semana</button>
          <button onclick="exportar('mes')" class="bg-green-600 text-white px-4 py-2 rounded">Mês</button>
        </div>

        <div id="aba-dia" class="aba hidden">
          <h2 class="text-xl font-bold mb-4">Agendamento do Dia</h2>
          <div id="listaDia"></div>
        </div>

        <div id="aba-pacotes" class="aba hidden">
          <h2 class="text-xl font-bold mb-4">Pacotes Ativos</h2>
          <div id="listaPacotes"></div>
        </div>
      </div>
    </div>
  </div>

<script>
  const SB_URL = "https://yczhjyxisqrvfxxgipop.supabase.co";
  const SB_KEY = "sb_publishable_6SmMDIymguOi59WrVb1QQA_wSykUdUm";
  const supabase = window.supabase.createClient(SB_URL, SB_KEY);
  const SENHA = "nilopet2026";
  const NOME_PET = "nilo";

  function fazerLogin() {
    if(loginUser.value === 'nilo pet' && loginPass.value === SENHA) {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('painel').classList.remove('hidden');
      carregarGeral();
    } else {
      msgLogin.textContent = 'Login ou senha incorretos';
      msgLogin.classList.remove('hidden');
    }
  }

  function esqueciSenha() {
    const nome = prompt('Qual o nome do pet?');
    if(nome?.toLowerCase() === NOME_PET) alert(`Senha: ${SENHA}`);
    else alert('Nome incorreto');
  }

  function sair() { location.reload(); }

  function aba(nome) {
    document.querySelectorAll('.aba').forEach(a => a.classList.add('hidden'));
    document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('bg-blue-50'));
    document.getElementById('aba-' + nome).classList.remove('hidden');
    event.target.classList.add('bg-blue-50');
    if(nome === 'geral') carregarGeral();
    if(nome === 'vagas') carregarVagas();
    if(nome === 'bloqueio') carregarBloqueios();
  }

  async function carregarGeral() {
    let query = supabase.from('agendamentos').select('*').order('data_criacao', { ascending: false });
    const { data } = await query;
    document.getElementById('listaGeral').innerHTML = data?.map(a => `
      <div class="border p-4 rounded hover:bg-gray-50">
        <div class="flex justify-between items-start">
          <div class="flex-1">
            <p class="font-bold">${a.dados.cliente} - ${a.dados.whatsapp}</p>
            <p class="text-sm text-gray-600">${a.pacote} | ${a.dados.endereco}</p>
            <p class="text-sm mt-1">${a.dados.pets.map(p => `${p.nome} (${p.servico})`).join(' | ')}</p>
            <p class="text-xs text-gray-500 mt-2">Datas: ${a.dados.datas?.join(', ') || 'N/A'}</p>
          </div>
          <div class="flex flex-col gap-2">
            <button onclick="whatsLembrete('${a.dados.whatsapp}', '${a.dados.cliente}')" class="text-green-600 text-xs border-green-600 px-2 py-1 rounded">WhatsApp Lembrete</button>
            <button onclick="whatsDados('${a.id}')" class="text-blue-600 text-xs border border-blue-600 px-2 py-1 rounded">WhatsApp Dados</button>
            <button onclick="excluir('${a.id}')" class="text-red-600 text-xs">Excluir</button>
          </div>
        </div>
      </div>
    `).join('') || '<p class="text-gray-500">Nenhum agendamento</p>';
  }

  async function excluir(id) {
    if(confirm('Excluir este agendamento?')) {
      await supabase.from('agendamentos').delete().eq('id', id);
      carregarGeral();
    }
  }

  function whatsDados(id) {
    alert('Função: enviar todos os dados do agendamento incluindo valor');
  }

  function whatsLembrete(numero, nome) {
    const msg = `Olá ${nome}, passando para lembrar que vc tem um agendamento conosco na Nilo Pet.`;
    window.open(`https://wa.me/55${numero.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`, '_blank');
  }

  function liberarMesSeguinte() {
    const dia = new Date().getDate();
    if(dia >= 20) {
      alert('Agenda do próximo mês liberada para os clientes!');
    } else {
      alert(`Só libera dia 20. Hoje é dia ${dia}.`);
    }
  }

  async function exportar(tipo) {
    const { data } = await supabase.from('agendamentos').select('*');
    const ws = XLSX.utils.json_to_sheet(data.map(d => ({
      Cliente: d.dados.cliente,
      WhatsApp: d.dados.whatsapp,
      Pacote: d.pacote,
      Pets: d.dados.pets.map(p => p.nome).join(', '),
      Data: d.data_criacao
    })));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Agendamentos");
    XLSX.writeFile(wb, `nilo_pet_${tipo}.xlsx`);
  }

  function carregarVagas() {
    const dias = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado', 'Domingo'];
    const portes = ['Pequeno/Médio', 'Grande Peludo', 'Grande Pelo Curto'];
    const servicos = ['Banho', 'Banho+Tosa Higiênica', 'Banho+Tosa'];
    document.getElementById('configVagas').innerHTML = dias.map(dia => `
      <div class="border p-3 rounded">
        <h4 class="font-bold mb-2">${dia}</h4>
        ${portes.map(porte => `
          <div class="mb-2">
            <p class="text-sm font-semibold">${porte}</p>
            ${servicos.map(s => `
              <div class="flex items-center gap-2 ml-4 mb-1">
                <label class="text-xs w-40">${s}:</label>
                <input type="number" data-dia="${dia}" data-porte="${porte}" data-servico="${s}" class="vaga-input border p-1 rounded w-20" placeholder="Qtd">
              </div>
            `).join('')}
          </div>
        `).join('')}
      </div>
    `).join('');
  }

  async function salvarVagas() {
    alert('Configuração de vagas salva! Passando da quantidade, bloqueia no cliente.');
  }

  async function bloquear(tipo) {
    const dados = {
      data_inicio: b_data_inicio.value,
      data_fim: b_data_fim.value || b_data_inicio.value,
      hora_inicio: b_hora_inicio.value,
      hora_fim: b_hora_fim.value,
      motivo: b_motivo.value,
      tipo: tipo
    };
    await supabase.from('bloqueios').insert(dados);
    alert('Bloqueio salvo com sucesso');
    carregarBloqueios();
  }

  async function carregarBloqueios() {
    const { data } = await supabase.from('bloqueios').select('*');
    document.getElementById('listaBloqueios').innerHTML = data?.map(b => `
      <div class="border p-3 rounded flex justify-between">
        <div>
          <p class="font-semibold">${b.data_inicio} ${b.hora_inicio || ''} ${b.hora_fim ? '- ' + b.hora_fim : ''}</p>
          <p class="text-sm text-gray-600">${b.motivo}</p>
        </div>
        <button onclick="desbloquear('${b.id}')" class="text-red-600">Desbloquear</button>
      </div>
    `).join('') || '<p class="text-gray-500">Nenhum bloqueio</p>';
  }

  async function desbloquear(id) {
    await supabase.from('bloqueios').delete().eq('id', id);
    carregarBloqueios();
  }
</script>
</body>
</html>
