<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM Pro - Nilo Pet</title>
    <script src="https://tailwindcss.com"></script>
    <!-- Biblioteca para Exportar Excel -->
    <script src="https://cloudflare.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .sidebar { width: 260px; height: 100vh; position: fixed; background: #0f172a; color: white; z-index: 1000; }
        .content { margin-left: 260px; padding: 30px; }
        .menu-item { padding: 15px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 600; transition: 0.2s; border-left: 4px solid transparent; }
        .menu-item:hover { background: #1e293b; }
        .menu-item.active { background: #1e293b; border-left-color: #ef4444; color: #ef4444; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .btn-save { background: #10b981; color: white; padding: 8px 15px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .hidden { display: none; }
        input, select { border: 1px solid #cbd5e1; border-radius: 6px; padding: 5px; outline: none; }
        input:focus { border-color: #ef4444; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="loginArea" class="flex items-center justify-center min-h-screen">
        <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-xl text-center">
            <h1 class="text-3xl font-black text-slate-800 uppercase italic">Nilo Pet ADM</h1>
            <input type="password" id="senhaAdm" placeholder="Senha" class="w-full p-4 border-2 rounded-xl my-4 text-center">
            <button onclick="logar()" class="w-full bg-red-600 text-white font-black p-4 rounded-xl">ENTRAR</button>
        </div>
    </div>

    <!-- PAINEL -->
    <div id="painelArea" class="hidden">
        <div class="sidebar">
            <div class="p-6 border-b border-slate-800"><h2 class="font-black text-xl italic uppercase">Painel Nilo Pet</h2></div>
            <nav class="mt-4">
                <div onclick="mudarFiltro('geral', this)" class="menu-item active">📊 Todos Agendamentos</div>
                <div onclick="mudarFiltro('dia', this)" class="menu-item">📅 Agenda de Hoje</div>
                <div onclick="mudarFiltro('vagas', this)" class="menu-item">🔒 Gestão de Vagas/Bloqueios</div>
                <div onclick="exportarRelatorio()" class="menu-item text-green-400">📥 Exportar Relatório</div>
                <div onclick="location.reload()" class="menu-item text-slate-400 mt-10">🚪 Sair</div>
            </nav>
        </div>

        <div class="content">
            <div class="flex justify-between items-center mb-6">
                <h2 id="tituloPagina" class="text-2xl font-black text-slate-800 uppercase">Agendamentos</h2>
                <button onclick="carregarDados()" class="bg-white px-4 py-2 rounded-lg border font-bold text-xs shadow-sm hover:bg-slate-50">Sincronizar ↻</button>
            </div>

            <div id="containerCards"></div>
        </div>
    </div>

    <script>
        const SB_URL = "https://supabase.co";
        const SB_KEY = "sb_publishable_6SmMDIymguOi59WrVb1QQA_wSykUdUm";
        let todosDados = [];
        let filtroAtual = 'geral';

        function logar() {
            if(document.getElementById('senhaAdm').value === 'nilopet2024') {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('painelArea').classList.remove('hidden');
                carregarDados();
            } else { alert("Senha incorreta!"); }
        }

        async function carregarDados() {
            try {
                const res = await fetch(`${SB_URL}?select=*&order=created_at.desc`, {
                    method: "GET", headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY }
                });
                todosDados = await res.json();
                renderizar();
            } catch (e) { alert("Erro ao carregar dados."); }
        }

        function renderizar() {
            const container = document.getElementById('containerCards');
            container.innerHTML = "";
            const hoje = new Date().toISOString().split('T')[0];

            let filtrados = todosDados;
            if(filtroAtual === 'dia') {
                filtrados = todosDados.filter(item => item.pets.some(p => p.agenda.some(a => a.data === hoje)));
            }

            if(filtroAtual === 'vagas') {
                container.innerHTML = `<div class="card"><h3 class="font-bold">Painel de Bloqueio</h3><p>Configure aqui limites de cães/gatos por horário (Em desenvolvimento).</p></div>`;
                return;
            }

            filtrados.forEach(item => {
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `
                    <div class="flex flex-wrap justify-between gap-4 mb-4 border-b pb-4">
                        <div>
                            <span class="text-[10px] font-bold text-slate-400 uppercase">Cliente</span>
                            <input type="text" value="${item.cliente}" id="edit_nome_${item.id}" class="block font-black text-lg uppercase italic bg-transparent">
                            <span class="text-[10px] font-bold text-slate-400 uppercase">WhatsApp</span>
                            <input type="text" value="${item.whatsapp}" id="edit_whats_${item.id}" class="block text-sm">
                        </div>
                        <div class="flex flex-col gap-2">
                            <button onclick="atualizarCadastro('${item.id}')" class="btn-save">SALVAR ALTERAÇÕES</button>
                            <button onclick="excluir('${item.id}')" class="text-red-500 font-bold text-[10px] uppercase">Apagar Registro</button>
                        </div>
                    </div>
                    <div id="pets_${item.id}" class="space-y-4">
                        ${item.pets.map((pet, pIdx) => `
                            <div class="bg-slate-50 p-4 rounded-lg border">
                                <div class="flex justify-between mb-2">
                                    <input type="text" value="${pet.nome}" id="edit_petname_${item.id}_${pIdx}" class="font-bold text-red-600 uppercase bg-transparent">
                                    <span class="badge bg-slate-200 px-2 py-1 rounded text-[10px] font-bold">${pet.plano}</span>
                                </div>
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                                    ${pet.agenda.map((ag, aIdx) => `
                                        <div class="bg-white p-2 rounded shadow-sm text-center">
                                            <input type="date" value="${ag.data}" class="text-[10px] w-full block">
                                            <input type="time" value="${ag.hora}" class="font-bold text-xs w-full block text-center">
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function atualizarCadastro(id) {
            const novoNome = document.getElementById(`edit_nome_${id}`).value;
            const novoWhats = document.getElementById(`edit_whats_${id}`).value;
            
            try {
                const res = await fetch(`${SB_URL}?id=eq.${id}`, {
                    method: "PATCH",
                    headers: { 
                        "apikey": SB_KEY, 
                        "Authorization": "Bearer " + SB_KEY,
                        "Content-Type": "application/json",
                        "Prefer": "return=minimal"
                    },
                    body: JSON.stringify({ cliente: novoNome, whatsapp: novoWhats })
                });
                if(res.ok) alert("Dados atualizados com sucesso!");
            } catch (e) { alert("Erro ao atualizar."); }
        }

        async function excluir(id) {
            if(!confirm("Apagar permanentemente?")) return;
            await fetch(`${SB_URL}?id=eq.${id}`, {
                method: "DELETE", headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY }
            });
            carregarDados();
        }

        function exportarRelatorio() {
            const worksheet = XLSX.utils.json_to_sheet(todosDados.map(item => ({
                Cliente: item.cliente,
                WhatsApp: item.whatsapp,
                Rua: item.rua,
                Pets: item.pets.map(p => p.nome).join(', '),
                Data_Cadastro: new Date(item.created_at).toLocaleDateString()
            })));
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Agendamentos");
            XLSX.writeFile(workbook, "Relatorio_NiloPet.xlsx");
        }

        function mudarFiltro(tipo, el) {
            filtroAtual = tipo;
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            el.classList.add('active');
            renderizar();
        }
    </script>
</body>
</html>
