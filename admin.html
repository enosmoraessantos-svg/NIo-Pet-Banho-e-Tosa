<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM Nilo Pet - Completo</title>
    <script src="https://jsdelivr.net"></script>
    <script src="https://cloudflare.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --azul: #e3f2fd; --azul-m: #2196f3; --azul-e: #1565c0; }
        body { font-family: 'Poppins', sans-serif; background: var(--azul); margin: 0; display: flex; height: 100vh; }
        #login-screen { position: fixed; inset: 0; background: var(--azul); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .sidebar { width: 250px; background: var(--azul-e); color: #fff; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .sidebar button { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px; border-radius: 8px; cursor: pointer; text-align: left; }
        .sidebar button:hover { background: var(--azul-m); }
        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: var(--azul-m); color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .grid-vagas { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select { padding: 8px; border: 1px solid #ddd; border-radius: 6px; width: 100%; margin-bottom: 10px; }
        .btn-salvar { background: #4caf50; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600; }
    </style>
</head>
<body>

<div id="login-screen">
    <div style="background:#fff; padding:30px; border-radius:15px; text-align:center; width:300px;">
        <h2>Nilo Pet ADM</h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="login()" class="btn-salvar">ENTRAR</button>
    </div>
</div>

<div class="sidebar">
    <h3>NILO PET</h3>
    <button onclick="mudarAba('geral')">Agendamento Geral</button>
    <button onclick="mudarAba('dia')">Agendamento do Dia</button>
    <button onclick="mudarAba('pacotes')">Pacotes</button>
    <button onclick="mudarAba('vagas')">Gestão de Vagas</button>
    <button onclick="mudarAba('bloqueio')">Bloqueio/Desbloqueio</button>
    <button onclick="exportarExcel()" style="background:#2e7d32; margin-top:20px;">Exportar Relatório</button>
    <button onclick="location.reload()" style="background:#c62828; margin-top:auto">Sair</button>
</div>

<div class="main">
    <h2 id="titulo-pagina">Agendamento Geral</h2>
    <div id="conteudo"></div>
</div>

<script>
    const SB_URL = "https://supabase.co";
    const SB_KEY = "sb_publishable_6SmMDIymguOi59WrVb1QQA_wSykUdUm";
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);

    let agendamentos = [];

    function login() {
        if(document.getElementById('user').value === 'nilo pet banho e tosa' && 
           document.getElementById('pass').value === 'nilopetbanhoetosa2026') {
            document.getElementById('login-screen').style.display = 'none';
            mudarAba('geral');
        } else { alert("Erro!"); }
    }

    async function mudarAba(aba) {
        document.getElementById('titulo-pagina').innerText = aba.toUpperCase().replace('_', ' ');
        const container = document.getElementById('conteudo');
        container.innerHTML = "Carregando...";

        if (aba === 'geral' || aba === 'dia' || aba === 'pacotes') {
            const { data } = await supabase.from('agendamentos').select('*').order('data_agendamento');
            agendamentos = data;
            renderTabela(aba);
        } else if (aba === 'vagas') {
            renderVagas();
        } else if (aba === 'bloqueio') {
            renderBloqueio();
        }
    }

    function renderTabela(tipo) {
        let lista = agendamentos;
        if(tipo === 'dia') lista = agendamentos.filter(a => a.data_agendamento === new Date().toISOString().split('T')[0]);
        if(tipo === 'pacotes') lista = agendamentos.filter(a => a.tipo_plano !== 'avulso');

        let html = `<table><thead><tr><th>Cliente/Pet</th><th>Plano/Data</th><th>Ações</th></tr></thead><tbody>`;
        lista.forEach(item => {
            html += `<tr>
                <td><strong>${item.cliente_nome}</strong><br>${item.pet_nome}</td>
                <td>${item.tipo_plano}<br>${item.data_agendamento}</td>
                <td><button onclick="excluir('${item.id}')" style="color:red; border:none; background:none; cursor:pointer;">Excluir</button></td>
            </tr>`;
        });
        document.getElementById('conteudo').innerHTML = html + `</tbody></table>`;
    }

    function renderVagas() {
        document.getElementById('conteudo').innerHTML = `
            <div class="card">
                <h3>Definir Limites de Vagas Diárias</h3>
                <div class="grid-vagas">
                    <div>
                        <label>Porte Pequeno/Médio</label>
                        <input type="number" id="v_peq" placeholder="Ex: 5">
                        <label>Grande Pelo Longo</label>
                        <input type="number" id="v_longo" placeholder="Ex: 2">
                    </div>
                    <div>
                        <label>Grande Pelo Curto</label>
                        <input type="number" id="v_curto" placeholder="Ex: 3">
                        <label>Gatos (Banho)</label>
                        <input type="number" id="v_gato" placeholder="Ex: 2">
                    </div>
                </div>
                <button class="btn-salvar" onclick="salvarVagas()">Salvar Limites</button>
            </div>
        `;
    }

    async function salvarVagas() {
        const dados = {
            peq: document.getElementById('v_peq').value,
            longo: document.getElementById('v_longo').value,
            curto: document.getElementById('v_curto').value,
            gato: document.getElementById('v_gato').value
        };
        await supabase.from('configuracoes').upsert({ id: 'vagas', dados: dados });
        alert("Vagas atualizadas!");
    }

    function renderBloqueio() {
        document.getElementById('conteudo').innerHTML = `
            <div class="card">
                <h3>Bloquear Data ou Horário</h3>
                <label>Data</label>
                <input type="date" id="b_data">
                <label>Motivo</label>
                <input type="text" id="b_motivo" placeholder="Ex: Reforma">
                <label>Tipo de Bloqueio</label>
                <select id="b_tipo">
                    <option value="dia">Dia Inteiro</option>
                    <option value="periodo">Período (Férias)</option>
                </select>
                <button class="btn-salvar" style="background:#e67e22" onclick="alert('Dia bloqueado!')">Efetivar Bloqueio</button>
            </div>
        `;
    }

    async function excluir(id) {
        if(confirm("Excluir?")) {
            await supabase.from('agendamentos').delete().eq('id', id);
            mudarAba('geral');
        }
    }

    function exportarExcel() {
        const ws = XLSX.utils.json_to_sheet(agendamentos);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Agendamentos");
        XLSX.writeFile(wb, "NiloPet_Relatorio.xlsx");
    }
</script>
</body>
</html>
