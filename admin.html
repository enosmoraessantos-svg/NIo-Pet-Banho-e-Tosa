<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADM Nilo Pet - OFICIAL</title>
    <script src="https://jsdelivr.net"></script>
    <script src="https://cloudflare.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --blue: #e3f2fd; --mid: #2196f3; --dark: #1565c0; }
        body { font-family: 'Poppins', sans-serif; background: var(--blue); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--dark); color: white; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .sidebar button { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 8px; cursor: pointer; text-align: left; }
        .sidebar button:hover { background: var(--mid); }
        .main { flex: 1; padding: 25px; overflow-y: auto; background: var(--blue); }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: var(--mid); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .btn-save { background: #4caf50; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; }
        #login-screen { position: fixed; inset: 0; background: var(--blue); display: flex; align-items: center; justify-content: center; z-index: 10000; }
    </style>
</head>
<body>

<div id="login-screen">
    <div style="background:white; padding:40px; border-radius:20px; text-align:center; width:320px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <h2>Nilo Pet ADM</h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="login()" class="btn-save">ENTRAR</button>
        <p onclick="recuperar()" style="font-size: 0.8rem; color: var(--dark); cursor: pointer; margin-top: 10px;">Esqueci a senha</p>
    </div>
</div>

<div class="sidebar">
    <h2>NILO PET</h2>
    <button onclick="aba('geral')">Agendamento Geral</button>
    <button onclick="aba('dia')">Agendamento do Dia</button>
    <button onclick="aba('pacotes')">Pacotes</button>
    <button onclick="aba('vagas')">Gestão de Vagas</button>
    <button onclick="aba('bloqueio')">Bloqueio/Desbloqueio</button>
    <button onclick="exportar()" style="background:#2e7d32; margin-top:10px">Exportar Excel</button>
    <button onclick="location.reload()" style="background:#c62828; margin-top:auto">Sair</button>
</div>

<div class="main">
    <h2 id="title">Painel de Controle</h2>
    <div id="root"></div>
</div>

<script>
    // A URL deve parar no .co
const SB_URL = "https://yczhjyxisqrvfxxgipop.supabase.co"; 
const SB_KEY = "sb_publishable_6SmMDIymguOi59WrVb1QQA_wSykUdUm";

// A inicialização deve ser assim:
const supabaseClient = supabase.createClient(SB_URL, SB_KEY);


    function login() {
        if(document.getElementById('user').value === 'nilo pet banho e tosa' && 
           document.getElementById('pass').value === 'nilopetbanhoetosa2026') {
            document.getElementById('login-screen').style.display = 'none';
            aba('geral');
        } else { alert("Erro de login"); }
    }

    function recuperar() {
        let p = prompt("Qual o nome do pet?");
        if(p === "nilo pet banho e tosa") alert("Senha: nilopetbanhoetosa2026");
    }

    async function aba(nome) {
        const root = document.getElementById('root');
        document.getElementById('title').innerText = nome.toUpperCase();
        root.innerHTML = "Carregando...";

        if(['geral', 'dia', 'pacotes'].includes(nome)) {
            const { data } = await supabase.from('agendamentos').select('*').order('data_agendamento');
            let lista = data;
            if(nome === 'dia') lista = data.filter(d => d.data_agendamento === new Date().toISOString().split('T')[0]);
            if(nome === 'pacotes') lista = data.filter(d => d.tipo_plano !== 'avulso');
            
            let h = `<table><thead><tr><th>Cliente/Pet</th><th>Serviço</th><th>Valor</th><th>Ação</th></tr></thead><tbody>`;
            lista.forEach(i => {
                h += `<tr>
                    <td>${i.cliente_nome}<br><small>${i.pet_nome}</small></td>
                    <td>${i.servico}<br><small>${i.data_agendamento}</small></td>
                    <td>R$ ${i.valor_total || '0'}</td>
                    <td><button onclick="del('${i.id}')" style="color:red;border:none;background:none;cursor:pointer">X</button></td>
                </tr>`;
            });
            root.innerHTML = h + "</tbody></table>";
        }

        if(nome === 'vagas') {
            root.innerHTML = `
                <div class="card">
                    <h3>Pequeno/Médio</h3>
                    <input type="number" id="pm_b" placeholder="Banho">
                    <input type="number" id="pm_t" placeholder="Banho+Tosa">
                    <button class="btn-save" onclick="salvarVagas()">Salvar Todas as Vagas</button>
                </div>`;
        }

        if(nome === 'bloqueio') {
            root.innerHTML = `<div class="card">
                <input type="date" id="b_data">
                <input type="text" id="b_motivo" placeholder="Motivo">
                <button class="btn-save" onclick="alert('Bloqueado')">Bloquear Dia</button>
            </div>`;
        }
    }

    async function del(id) { if(confirm("Excluir?")) { await supabase.from('agendamentos').delete().eq('id', id); aba('geral'); } }

    function exportar() {
        supabase.from('agendamentos').select('*').then(({data}) => {
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "NiloPet");
            XLSX.writeFile(wb, "Relatorio.xlsx");
        });
    }
</script>
</body>
</html>
