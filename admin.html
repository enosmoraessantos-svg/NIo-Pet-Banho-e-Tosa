<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM - Nilo Pet</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; overflow-x: hidden; }
        .sidebar { width: 260px; height: 100vh; position: fixed; left: 0; top: 0; background: #1e293b; color: white; transition: 0.3s; z-index: 1000; }
        .content { margin-left: 260px; padding: 20px; transition: 0.3s; }
        .menu-item { padding: 15px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 600; border-left: 4px solid transparent; }
        .menu-item:hover { background: #334155; }
        .menu-item.active { background: #334155; border-left-color: #ef4444; color: #ef4444; }
        .card-pet { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 15px; margin-bottom: 15px; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .hidden { display: none; }
        @media (max-width: 768px) { .sidebar { left: -260px; } .content { margin-left: 0; } .sidebar.open { left: 0; } }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div id="loginArea" class="flex items-center justify-center min-h-screen bg-slate-100">
        <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-2xl text-center">
            <h1 class="text-3xl font-black text-slate-800 uppercase italic tracking-tighter">Nilo Pet</h1>
            <p class="text-red-600 font-bold text-xs uppercase mb-8">Banho e Tosa</p>
            <input type="password" id="senhaAdm" placeholder="Digite a senha de acesso" class="w-full p-4 border-2 rounded-xl mb-4 outline-none focus:border-red-600 text-center text-lg">
            <button onclick="logar()" class="w-full bg-red-600 text-white font-black p-4 rounded-xl hover:bg-red-700 transition duration-300">ENTRAR NO SISTEMA</button>
        </div>
    </div>

    <!-- ESTRUTURA DO PAINEL (ABRE APÓS LOGIN) -->
    <div id="painelArea" class="hidden">
        <!-- MENU LATERAL -->
        <div class="sidebar" id="sidebar">
            <div class="p-6 border-b border-slate-700">
                <h2 class="font-black text-xl uppercase italic">Nilo Pet ADM</h2>
            </div>
            <nav class="mt-4">
                <div onclick="mudarFiltro('geral', this)" class="menu-item active">📊 Agendamentos Geral</div>
                <div onclick="mudarFiltro('dia', this)" class="menu-item">📅 Agendamentos do Dia</div>
                <div onclick="mudarFiltro('pacotes', this)" class="menu-item">📦 Controle de Pacotes</div>
                <div onclick="bloquearAgenda()" class="menu-item text-orange-400 mt-10">🔒 Bloquear Agenda</div>
                <div onclick="location.reload()" class="menu-item text-slate-400 mt-2">🚪 Sair</div>
            </nav>
        </div>

        <!-- CONTEÚDO PRINCIPAL -->
        <div class="content">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h2 id="tituloPagina" class="text-2xl font-black text-slate-800 uppercase italic">Agendamentos Geral</h2>
                    <p class="text-slate-500 text-sm font-medium">Gerencie os serviços e pagamentos abaixo.</p>
                </div>
                <button onclick="carregarDados()" class="bg-white border p-3 rounded-xl shadow-sm font-bold text-xs uppercase hover:bg-slate-50">Atualizar Dados ↻</button>
            </header>

            <div id="containerCards" class="grid grid-cols-1 gap-4">
                <!-- Os agendamentos aparecem aqui -->
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://supabase.co";
        const SB_KEY = "sb_publishable_6SmMDIymguOi59WrVb1QQA_wSykUdUm";
        
        let todosDados = [];
        let filtroAtual = 'geral';

        function logar() {
            if(document.getElementById('senhaAdm').value === 'nilopet2024') {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('painelArea').classList.remove('hidden');
                carregarDados();
            } else { alert("Senha incorreta!"); }
        }

        async function carregarDados() {
            const container = document.getElementById('containerCards');
            container.innerHTML = "<p class='text-slate-400 font-bold uppercase text-xs'>Sincronizando com Supabase...</p>";
            try {
                const res = await fetch(SB_URL + "?select=*&order=created_at.desc", {
                    method: "GET", headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY }
                });
                todosDados = await res.json();
                renderizar();
            } catch (e) { alert("Erro de conexão!"); }
        }

        function mudarFiltro(tipo, el) {
            filtroAtual = tipo;
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            el.classList.add('active');
            
            const titulos = { geral: "Agendamentos Geral", dia: "Agendamentos do Dia", pacotes: "Controle de Pacotes" };
            document.getElementById('tituloPagina').innerText = titulos[tipo];
            renderizar();
        }

        function renderizar() {
            const container = document.getElementById('containerCards');
            const hoje = new Date().toISOString().split('T')[0];
            
            let filtrados = todosDados;

            if(filtroAtual === 'dia') {
                filtrados = todosDados.filter(item => item.pets.some(p => p.agenda.some(a => a.data === hoje)));
            } else if (filtroAtual === 'pacotes') {
                filtrados = todosDados.filter(item => item.pets.some(p => p.plano !== 'avulso'));
            }

            if(filtrados.length === 0) {
                container.innerHTML = "<p class='text-slate-400'>Nenhum registro encontrado nesta categoria.</p>";
                return;
            }

            container.innerHTML = filtrados.map(item => `
                <div class="card-pet shadow-sm">
                    <div class="flex justify-between items-start border-b pb-3 mb-4">
                        <div>
                            <h3 class="font-black text-lg text-slate-800 uppercase italic">${item.cliente}</h3>
                            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-tight">Rua: ${item.rua} | WhatsApp: ${item.whatsapp}</p>
                        </div>
                        <div class="flex gap-2">
                            <a href="https://wa.me{item.whatsapp}" target="_blank" class="bg-green-500 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase">WhatsApp</a>
                            <button onclick="excluir(${item.id})" class="bg-slate-100 text-slate-400 px-4 py-2 rounded-lg text-[10px] font-black uppercase hover:bg-red-600 hover:text-white">Excluir</button>
                        </div>
                    </div>

                    <div class="space-y-4">
                        ${item.pets.map(p => {
                            const ehPacote = p.plano !== 'avulso';
                            if(filtroAtual === 'pacotes' && !ehPacote) return '';

                            return `
                            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                <div class="flex justify-between items-center mb-3">
                                    <span class="badge ${ehPacote ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}">${p.plano}</span>
                                    <span class="font-black text-red-600 uppercase italic underline">${p.nome}</span>
                                </div>

                                <!-- DATAS -->
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4">
                                    ${p.agenda.map((a, i) => `
                                        <div class="bg-white p-2 rounded border text-[11px] text-center">
                                            <span class="block text-slate-400 font-bold uppercase text-[8px]">${i+1}ª Semana</span>
                                            <span class="font-bold">${a.data.split('-').reverse().join('/')}</span><br>
                                            <span class="font-black text-slate-900">${a.hora}</span>
                                        </div>
                                    `).join('')}
                                </div>

                                <!-- CAMPOS FINANCEIROS (MANUAIS) -->
                                <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mt-4 pt-4 border-t border-slate-200">
                                    ${ehPacote ? `
                                        <div><label class="text-[9px] font-bold text-slate-400 uppercase">Vencimento</label><input type="date" class="w-full"></div>
                                        <div><label class="text-[9px] font-bold text-slate-400 uppercase">Valor Pacote</label><input type="text" placeholder="R$ 0,00" class="w-full"></div>
                                        <div><label class="text-[9px] font-bold text-slate-400 uppercase">Real Pago</label><input type="text" placeholder="R$ 0,00" class="w-full"></div>
                                        <div><label class="text-[9px] font-bold text-slate-400 uppercase">Status</label><select class="w-full"><option>Pendente</option><option>Pago</option></select></div>
                                        <div class="flex items-end"><button class="bg-slate-800 text-white w-full py-2 rounded text-[10px] font-bold uppercase">Salvar</button></div>
                                    ` : `
                                        <div><label class="text-[9px] font-bold text-slate-400 uppercase">Taxa Leva/Trás</label><input type="text" placeholder="R$ 0,00" class="w-full"></div>
                                        <div><label class="text-[9px] font-bold text-slate-400 uppercase">Valor Serviço</label><input type="text" placeholder="R$ 0,00" class="w-full"></div>
                                        <div><label class="text-[9px] font-bold text-slate-400 uppercase">Desconto</label><input type="text" placeholder="R$ 0,00" class="w-full"></div>
                                        <div><label class="text-[9px] font-bold text-slate-400 uppercase">Total Final</label><input type="text" placeholder="R$ 0,00" class="w-full bg-yellow-50 font-bold"></div>
                                        <div><label class="text-[9px] font-bold text-slate-400 uppercase">Status</label><select class="w-full"><option>Pendente</option><option>Pago</option></select></div>
                                    `}
                                </div>
                            </div>
                        `;}).join('')}
                    </div>
                </div>`).join('');
        }

        async function excluir(id) {
            if(!confirm("Deseja apagar este registro permanentemente?")) return;
            await fetch(SB_URL + "?id=eq." + id, {
                method: "DELETE", headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY }
            });
            carregarDados();
        }

        function bloquearAgenda() {
            let m = prompt("Digite o motivo do bloqueio (Recesso, Feriado...):");
            if(m) alert("Bloqueio registrado para a visualização dos clientes.");
        }
    </script>
</body>
</html>
