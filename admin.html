<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nilo Pet - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div id="loginScreen" class="fixed inset-0 bg-blue-900 bg-opacity-95 z-50 flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl w-96 shadow-2xl">
      <h2 class="text-2xl font-bold mb-6 text-center text-blue-800">Painel Nilo Pet</h2>
      <input id="loginUser" type="text" placeholder="Login" class="w-full border p-3 rounded mb-3" value="nilo pet">
      <input id="loginPass" type="password" placeholder="Senha" class="w-full border p-3 rounded mb-3">
      <button onclick="fazerLogin()" class="w-full bg-blue-600 text-white p-3 rounded font-semibold mb-2 hover:bg-blue-700">Entrar</button>
      <button onclick="esqueciSenha()" class="text-sm text-blue-600 hover:underline">Esqueci senha</button>
      <div id="msgLogin" class="text-red-600 text-sm mt-2 hidden"></div>
    </div>
  </div>

  <div id="painel" class="hidden min-h-screen">
    <header class="bg-white shadow-md p-4">
      <div class="max-w-7xl mx-auto flex justify-between items-center">
        <h1 class="text-2xl font-bold text-blue-800">Painel Nilo Pet</h1>
        <button onclick="sair()" class="text-red-600 hover:underline font-semibold">Sair</button>
      </div>
    </header>

    <div class="max-w-7xl mx-auto p-4 flex gap-4">
      <div class="w-64 bg-white rounded-xl shadow-lg p-4 h-fit">
        <button onclick="mostrarAba('geral')" class="menu-btn w-full text-left p-3 rounded hover:bg-blue-50 mb-1 bg-blue-50 font-semibold">Agendamento Geral</button>
        <button onclick="mostrarAba('dia')" class="menu-btn w-full text-left p-3 rounded hover:bg-blue-50 mb-1">Agendamento do Dia</button>
        <button onclick="mostrarAba('pacotes')" class="menu-btn w-full text-left p-3 rounded hover:bg-blue-50 mb-1">Pacotes</button>
        <button onclick="mostrarAba('vagas')" class="menu-btn w-full text-left p-3 rounded hover:bg-blue-50 mb-1">Gestão de Vagas</button>
        <button onclick="mostrarAba('bloqueio')" class="menu-btn w-full text-left p-3 rounded hover:bg-blue-50 mb-1">Bloqueio/Desbloqueio</button>
        <button onclick="mostrarAba('relatorio')" class="menu-btn w-full text-left p-3 rounded hover:bg-blue-50 mb-1">Exportar Relatório</button>
      </div>

      <div class="flex-1 bg-white rounded-xl shadow-lg p-6">
        <div id="aba-geral" class="aba">
          <h2 class="text-xl font-bold mb-4">Agendamento Geral</h2>
          <div class="flex gap-2 mb-4">
            <input type="date" id="filtroData" class="border p-2 rounded">
            <button onclick="carregarGeral()" class="bg-blue-600 text-white px-4 rounded hover:bg-blue-700">Filtrar</button>
          </div>
          <div id="listaGeral" class="space-y-3"></div>
        </div>

        <div id="aba-dia" class="aba hidden"><h2 class="text-xl font-bold mb-4">Agendamento do Dia</h2><div id="listaDia"></div></div>
        <div id="aba-pacotes" class="aba hidden"><h2 class="text-xl font-bold mb-4">Pacotes</h2><div id="listaPacotes"></div></div>
        <div id="aba-vagas" class="aba hidden"><h2 class="text-xl font-bold mb-4">Gestão de Vagas</h2><div id="configVagas"></div></div>
        <div id="aba-bloqueio" class="aba hidden">
          <h2 class="text-xl font-bold mb-4">Bloqueio/Desbloqueio</h2>
          <input type="date" id="b_data" class="border p-2 rounded mb-2">
          <input id="b_motivo" placeholder="Motivo" class="border p-2 rounded mb-2 w-full">
          <button onclick="bloquearDia()" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Fechar Dia</button>
          <div id="listaBloqueios" class="mt-6"></div>
        </div>
        <div id="aba-relatorio" class="aba hidden">
          <h2 class="text-xl font-bold mb-4">Exportar Relatório</h2>
          <button onclick="exportarExcel()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Exportar Excel</button>
        </div>
      </div>
    </div>
  </div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
  const supabase = window.supabase.createClient(
    "https://yczhjyxisqrvfxxgipop.supabase.co",
    "sb_publishable_6SmMDIymguOi59WrVb1QQA_wSykUdUm"
  );
  const SENHA = "nilopet2026";
  const NOME_PET = "nilo";

  window.fazerLogin = function() {
    const user = document.getElementById('loginUser').value;
    const pass = document.getElementById('loginPass').value;
    if(user === 'nilo pet' && pass === SENHA) {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('painel').classList.remove('hidden');
      carregarGeral();
    } else {
      const msg = document.getElementById('msgLogin');
      msg.textContent = 'Login ou senha incorretos';
      msg.classList.remove('hidden');
    }
  }

  window.esqueciSenha = function() {
    const nomePet = prompt('Qual o nome do pet?');
    if(nomePet?.toLowerCase() === NOME_PET) alert(`Sua senha é: ${SENHA}`);
    else alert('Nome incorreto');
  }

  window.sair = function() { location.reload(); }

  window.mostrarAba = function(nome) {
    document.querySelectorAll('.aba').forEach(a => a.classList.add('hidden'));
    document.getElementById('aba-' + nome).classList.remove('hidden');
    document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('bg-blue-50', 'font-semibold'));
    event.target.classList.add('bg-blue-50', 'font-semibold');
  }

  window.carregarGeral = async function() {
    const { data, error } = await supabase.from('agendamentos').select('*').order('data_criacao', {ascending: false});
    if(error) { console.log(error); return; }
    document.getElementById('listaGeral').innerHTML = data?.map(a => `
      <div class="border p-4 rounded-lg">
        <p class="font-bold">${a.cliente} - ${a.whatsapp}</p>
        <p class="text-sm">${a.pacote}</p>
        <button onclick="excluirAgendamento('${a.id}')" class="text-red-600 text-sm hover:underline">Excluir</button>
      </div>
    `).join('') || '<p>Nenhum agendamento</p>';
  }

  window.excluirAgendamento = async function(id) {
    if(confirm('Excluir?')) {
      await supabase.from('agendamentos').delete().eq('id', id);
      carregarGeral();
    }
  }

  window.bloquearDia = async function() {
    const data = document.getElementById('b_data').value;
    const motivo = document.getElementById('b_motivo').value;
    if(!data) { alert('Selecione uma data'); return; }
    await supabase.from('bloqueios').insert({ tipo: 'dia_todo', data_inicio: data, motivo: motivo });
    alert('Dia bloqueado!');
  }

  window.exportarExcel = async function() {
    const { data } = await supabase.from('agendamentos').select('*');
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Agendamentos");
    XLSX.writeFile(wb, `relatorio_nilo_pet.xlsx`);
  }
</script>
</body>
</html>
