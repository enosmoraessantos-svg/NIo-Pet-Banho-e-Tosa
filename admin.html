<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADM Nilo Pet</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; background: #e0f2fe; margin: 0; display: flex; }
        #login { position: fixed; inset: 0; background: #e0f2fe; display: flex; align-items: center; justify-content: center; z-index: 100; }
        nav { width: 220px; background: #1e293b; color: white; height: 100vh; padding: 20px; }
        main { flex: 1; padding: 20px; background: white; overflow-y: auto; }
        button { cursor: pointer; padding: 10px; margin: 5px 0; width: 100%; border-radius: 5px; border: none; background: #0284c7; color: white; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #0284c7; color: white; }
    </style>
</head>
<body>

<div id="login">
    <div style="background:white; padding:30px; border-radius:10px; width:280px shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);">
        <h2 style="text-align:center">Nilo Pet Login</h2>
        <input type="text" id="user" placeholder="Usuário" style="width:100%; margin-bottom:10px; padding:8px;">
        <input type="password" id="pass" placeholder="Senha" style="width:100%; margin-bottom:10px; padding:8px;">
        <button onclick="logar()">Entrar</button>
    </div>
</div>

<nav>
    <h2>Nilo Pet</h2>
    <button onclick="listar()">Agendamento Geral</button>
    <button onclick="alert('Funcionalidade em breve')" style="background:#64748b">Vagas</button>
    <button onclick="location.reload()" style="background:#ef4444">Sair</button>
</nav>

<main>
    <h2 id="status">Selecione uma opção</h2>
    <div id="tabela"></div>
</main>

<script>
    const client = supabase.createClient("https://supabase.co", "sb_publishable_6SmMDIymguOi59WrVb1QQA_wSykUdUm");

    function logar() {
        if(user.value === 'nilo pet' && pass.value === 'nilopet2026') document.getElementById('login').style.display = 'none';
        else alert("Senha errada!");
    }

    async function listar() {
        status.innerText = "Carregando...";
        const { data, error } = await client.from('agendamentos').select('*');
        if(error) return alert("Erro no banco!");
        
        let html = `<table><tr><th>Cliente</th><th>Pet</th><th>Serviço</th><th>Ações</th></tr>`;
        data.forEach(i => {
            html += `<tr><td>${i.cliente_nome}</td><td>${i.pet_nome}</td><td>${i.tipo_servico}</td>
            <td><button onclick="excluir('${i.id}')" style="background:red; padding:4px;">X</button></td></tr>`;
        });
        document.getElementById('tabela').innerHTML = html + `</table>`;
        status.innerText = "Agendamento Geral";
    }

    async function excluir(id) {
        if(confirm("Excluir agendamento?")) {
            await client.from('agendamentos').delete().eq('id', id);
            listar();
        }
    }
</script>
</body>
</html>
