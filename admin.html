<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nilo Pet - Administrativo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://tailwindcss.com"></script>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">
            <h1 class="font-black text-xl uppercase italic text-white">Nilo Pet ADM</h1>
        </div>
        <nav class="menu">
            <button onclick="mudarFiltro('geral', this)" class="menu-item active">📊 Agendamentos Geral</button>
            <button onclick="mudarFiltro('dia', this)" class="menu-item">📅 Agendamentos do Dia</button>
            <button onclick="mudarFiltro('pacotes', this)" class="menu-item">📦 Controle de Pacotes</button>
            <button onclick="mudarFiltro('vagas', this)" class="menu-item text-orange-400">🔒 Gestão de Vagas</button>
            <button onclick="exportarRelatorio()" class="menu-item text-green-400 mt-4 border-t border-slate-700 pt-4">📄 Exportar Relatório</button>
            <button onclick="location.reload()" class="menu-item text-slate-400">↻ Atualizar Página</button>
        </nav>
    </aside>

    <main class="content">
        <header class="header">
            <h2 id="tituloPagina" class="text-2xl font-black text-slate-800 uppercase italic">Agendamentos Geral</h2>
            <button onclick="novoAgendamento()" class="btn-novo">+ NOVO AGENDAMENTO</button>
        </header>

        <div id="containerCards" class="grid-container">
            <!-- Os cards entrarão aqui via JS -->
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
