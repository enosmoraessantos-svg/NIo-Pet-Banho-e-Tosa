<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Nilo Pet - Agendamento Oficial</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background-color: #f0f9ff; font-family: sans-serif; color: #1e293b; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin: 15px; padding: 25px; border: 1px solid #e2e8f0; }
        input, select, textarea { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #e2e8f0; margin-bottom: 12px; font-size: 16px; color: black; }
        .btn-next { background-color: #dc2626; color: white; width: 100%; padding: 18px; border-radius: 12px; font-weight: 800; font-size: 18px; border: none; cursor: pointer; }
        .btn-back-large { background-color: #64748b; color: white; width: 100%; padding: 18px; border-radius: 12px; font-weight: 800; font-size: 18px; border: none; cursor: pointer; margin-top: 10px; }
        .btn-cancel-final { background-color: #ef4444; color: white; width: 100%; padding: 15px; border-radius: 12px; font-weight: 800; margin-top: 10px; cursor: pointer; }
        .step-content { display: none; }
        .step-content.active { display: block; }
        .pet-box { border: 2px solid #e2e8f0; padding: 15px; border-radius: 15px; margin-bottom: 15px; background: #f8fafc; }
        .label-req { display: block; font-size: 10px; margin-bottom: 4px; text-transform: uppercase; font-weight: 900; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="bg-white p-6 text-center border-b shadow-sm">
        <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter italic">Nilo Pet</h1>
        <p class="text-red-600 font-bold text-xs uppercase">Banho e Tosa</p>
    </div>

    <form id="niloForm">
        <!-- ETAPA 1: INÍCIO E CLIENTE -->
        <div id="step1" class="step-content active">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline text-sm">Etapa 1: O que deseja fazer?</h2>
                <select id="acaoInicial" onchange="toggleAcao()">
                    <option value="">Selecione...</option>
                    <option value="agendar">NOVO AGENDAMENTO</option>
                    <option value="cancelar_avulso">CANCELAR SERVIÇO AVULSO</option>
                    <option value="cancelar_pacote">CANCELAR PACOTE</option>
                </select>

                <div id="camposAgendar" class="hidden">
                    <label class="label-req">Nome do Cliente *</label>
                    <input type="text" id="nomeCliente" placeholder="Seu nome completo">
                    
                    <label class="label-req">WhatsApp (11 dígitos) *</label>
                    <input type="tel" id="whatsapp" placeholder="11999998888" maxlength="11">
                    
                    <label class="label-req">Endereço (Rua e Número) *</label>
                    <div class="flex gap-2">
                        <input type="text" id="rua" placeholder="Ex: Rua das Flores, 123" class="flex-grow">
                        <input type="text" value="Sol Nascente" readonly class="w-32 bg-slate-100 font-bold text-slate-500 text-center border-none text-[10px] mb-3">
                    </div>
                    
                    <button type="button" onclick="validaPasso1()" class="btn-next mt-4">PRÓXIMO</button>
                </div>

                <!-- CANCELAMENTOS -->
                <div id="camposCancelAvulso" class="hidden">
                    <label class="label-req">Data Agendada *</label><input type="date" id="cancelData">
                    <label class="label-req">Nome do Cliente *</label><input type="text" id="cancelNome">
                    <label class="label-req">Nome do Pet *</label><input type="text" id="cancelPet">
                    <button type="button" onclick="msgCancel('avulso')" class="btn-cancel-final">CANCELAR AGENDAMENTO</button>
                </div>

                <div id="camposCancelPacote" class="hidden">
                    <label class="label-req">Nome do Cliente *</label><input type="text" id="cancelPacoteNome">
                    <label class="label-req">Nome do Pet *</label><input type="text" id="cancelPetPacote">
                    <label class="label-req">Tipo de Pacote *</label>
                    <select id="tipoPacoteCancel">
                        <option value="basico">Básico</option>
                        <option value="basico_tosa">Básico com Tosa</option>
                        <option value="premium">Premium</option>
                    </select>
                    <button type="button" onclick="msgCancel('pacote')" class="btn-cancel-final">CANCELAR PACOTE COMPLETO</button>
                </div>
            </div>
        </div>

        <!-- ETAPA 2: DADOS DO PET -->
        <div id="step2" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline text-sm">Etapa 2: Dados do Pet</h2>
                <label class="label-req">Quantos pets deseja agendar? (Máx 4)</label>
                <select id="qtdPets" onchange="renderPets()">
                    <option value="1">1 Pet</option><option value="2">2 Pets</option>
                    <option value="3">3 Pets</option><option value="4">4 Pets</option>
                </select>
                <div id="petsContainer"></div>
                <button type="button" onclick="next(3)" class="btn-next">PRÓXIMO</button>
                <button type="button" onclick="next(1)" class="btn-back-large">VOLTAR</button>
            </div>
        </div>

        <!-- ETAPA 3: SERVIÇOS E PACOTES -->
        <div id="step3" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline text-sm">Etapa 3: Escolha o Plano</h2>
                <select id="tipoPlano">
                    <option value="avulso">AVULSO (Escolher na hora)</option>
                    <option value="basico">PACOTE BÁSICO (1 Banho + 1 Banho/Tosa Higiênica)</option>
                    <option value="basico_tosa">BÁSICO COM TOSA (1 Banho + 1 Banho/Tosa)</option>
                    <option value="premium">PREMIUM (3 Banhos + 1 Banho/Tosa Higiênica)</option>
                </select>
                <p class="text-[10px] text-slate-500 italic mt-2">* Respeitando as regras de carga horária do Nilo Pet.</p>
                <button type="button" onclick="next(4)" class="btn-next mt-4">ESCOLHER DATA E HORA</button>
                <button type="button" onclick="next(2)" class="btn-back-large">VOLTAR</button>
            </div>
        </div>

        <!-- ETAPA 4: CALENDÁRIO E REGRAS -->
        <div id="step4" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline text-sm">Etapa 4: Data e Horário</h2>
                <label class="label-req">Selecione a Data *</label>
                <input type="date" id="dataAgendamento" onchange="atualizaHorarios()">
                
                <label class="label-req">Horários Disponíveis (Baseado nas Regras Nilo Pet) *</label>
                <select id="horarioAgendamento">
                    <option value="">Selecione a data primeiro...</option>
                </select>

                <div id="resumo" class="mt-4 p-3 bg-green-50 rounded text-xs hidden"></div>

                <button type="button" onclick="finalizar()" class="btn-next mt-4">CONFIRMAR ✅</button>
                <button type="button" onclick="next(3)" class="btn-back-large">VOLTAR</button>
            </div>
        </div>
    </form>

    <script>
        // Lógica de Navegação
        function next(n) {
            document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
            document.getElementById('step'+n).classList.add('active');
            if(n===2) renderPets();
            if(n===4) configurarCalendario();
            window.scrollTo(0,0);
        }

        function toggleAcao() {
            const acao = document.getElementById('acaoInicial').value;
            document.getElementById('camposAgendar').classList.toggle('hidden', acao !== 'agendar');
            document.getElementById('camposCancelAvulso').classList.toggle('hidden', acao !== 'cancelar_avulso');
            document.getElementById('camposCancelPacote').classList.toggle('hidden', acao !== 'cancelar_pacote');
        }

        function validaPasso1() {
            const nome = document.getElementById('nomeCliente').value;
            const zap = document.getElementById('whatsapp').value;
            if(!nome || zap.length < 11) return alert("Preencha nome e WhatsApp com 11 dígitos!");
            next(2);
        }

        // Renderização Dinâmica de Pets
        function renderPets() {
            const qtd = document.getElementById('qtdPets').value;
            const container = document.getElementById('petsContainer');
            container.innerHTML = '';
            for(let i=1; i<=qtd; i++) {
                container.innerHTML += `
                    <div class="pet-box">
                        <p class="font-black text-red-600 mb-2 italic">PET #${i}</p>
                        <label class="label-req">Espécie</label>
                        <select id="especiePet${i}" onchange="renderPorte(${i})">
                            <option value="cachorro">Cachorro</option>
                            <option value="gato">Gato</option>
                        </select>
                        <label class="label-req">Nome do Pet</label>
                        <input type="text" id="nomePet${i}" placeholder="Nome do animal">
                        <div id="porteContainer${i}">
                            <label class="label-req">Porte</label>
                            <select id="portePet${i}">
                                <option value="pequeno">Pequeno</option>
                                <option value="medio">Médio</option>
                                <option value="grande_curto">Grande (Pelo Curto)</option>
                                <option value="grande_peludo">Grande (Peludo)</option>
                            </select>
                        </div>
                        <label class="label-req">Possui Alergia?</label>
                        <select id="alergia${i}">
                            <option value="nao">Não</option>
                            <option value="sim">Sim</option>
                        </select>
                        <textarea id="obs${i}" placeholder="Observações/Alergias"></textarea>
                    </div>
                `;
            }
        }

        function renderPorte(idx) {
            const especie = document.getElementById('especiePet'+idx).value;
            document.getElementById('porteContainer'+idx).classList.toggle('hidden', especie === 'gato');
        }

        // Lógica de Calendário (Regra do dia 20)
        function configurarCalendario() {
            const inputData = document.getElementById('dataAgendamento');
            const hoje = new Date();
            const diaAtual = hoje.getDate();
            
            // Min: Hoje
            inputData.min = hoje.toISOString().split('T')[0];
            
            // Max: Se antes do dia 20, só o mês atual. Se depois, libera próximo mês.
            let anoMax = hoje.getFullYear();
            let mesMax = hoje.getMonth() + (diaAtual >= 20 ? 2 : 1);
            if(mesMax > 12) { mesMax = 1; anoMax++; }
            
            const ultimoDia = new Date(anoMax, mesMax, 0).getDate();
            inputData.max = `${anoMax}-${String(mesMax).padStart(2,'0')}-${ultimoDia}`;
        }

        // Lógica de Horários por Regra de Negócio
        function atualizaHorarios() {
            const dataSel = new Date(document.getElementById('dataAgendamento').value);
            const diaSemana = dataSel.getUTCDay(); // 0 Dom, 3 Qua, 4 Qui, 5 Sex, 6 Sab
            const selectHora = document.getElementById('horarioAgendamento');
            selectHora.innerHTML = '<option value="">Selecione...</option>';

            const rules = {
                quartaSabado: ["09:00", "10:00", "11:00", "13:30", "14:30", "15:30", "16:00"],
                domingo: ["09:00", "10:00", "11:00", "12:00"]
            };

            let horarios = [];
            if(diaSemana >= 3 && diaSemana <= 6) horarios = rules.quartaSabado;
            else if(diaSemana === 0) horarios = rules.domingo;
            else {
                alert("Nilo Pet funciona de Quarta a Sábado e Domingo.");
                return;
            }

            horarios.forEach(h => {
                let info = "";
                if(h === "10:00") info = " (Pets Grande Pelo Curto)";
                if(h === "15:30" || (diaSemana===0 && h==="12:00")) info = " (Pets Grande Peludo)";
                if(h === "16:00") info = " (Gatos)";
                
                const opt = document.createElement('option');
                opt.value = h;
                opt.text = h + info;
                selectHora.add(opt);
            });
        }

        function msgCancel(tipo) {
            if(tipo === 'avulso') {
                alert("Seu agendamento foi cancelado. Caso precise agendar novamente é só fazer seu agendamento.");
            } else {
                alert("Cancelando uma data do pacote, seu pacote será cancelado por completo e você terá que refazer todo o seu agendamento. Entre em contato com nossos atendentes para mudar sua data pelo WhatsApp.");
            }
            location.reload();
        }

        function finalizar() {
            if(!document.getElementById('horarioAgendamento').value) return alert("Selecione um horário!");
            
            const msg = "AGENDAMENTO CONFIRMADO!\n\nLogo mais nossa equipe entrará em contato para passar valores. De imediato, envie uma foto do pet para acelerar o processo.";
            alert(msg);
            // Aqui enviariamos os dados para o Supabase
            location.reload();
        }
    </script>
</body>
</html>
