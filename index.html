<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nilo Pet - Agendamento</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background-color: #e0f2fe; color: #ff0000; font-family: 'Arial Black', sans-serif; }
        .border-black-bold { border: 3px solid #000000; }
        .step { display: none; }
        .step.active { display: block; }
        input, select, textarea { border: 2px solid #000000 !important; color: #ff0000 !important; font-weight: bold; background: white; }
        label { color: #ff0000; text-transform: uppercase; font-size: 0.8rem; }
        .btn-next { background-color: #ff0000; color: #ffffff; border: 2px solid #000000; transition: transform 0.1s; }
        .btn-next:active { transform: scale(0.95); }
        .slot-card { border: 2px solid #000000; background: white; cursor: pointer; margin-bottom: 8px; padding: 10px; }
        input:checked + .slot-card { background-color: #ff0000; color: white; }
        input:checked + .slot-card p { color: white; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto border-black-bold bg-[#e0f2fe] min-h-screen p-6 shadow-[10px_10px_0px_0px_rgba(0,0,0,1)]">
        
        <header class="text-center border-b-4 border-black pb-4 mb-6">
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">NILO PET</h1>
            <p class="text-sm font-bold">BANHO E TOSA - SOL NASCENTE</p>
        </header>

        <form id="niloForm">
            
            <!-- ETAPA 1: CLIENTE -->
            <div id="step1" class="step active">
                <h2 class="text-xl font-black mb-4 underline">ETAPA 1: SEUS DADOS</h2>
                <div class="space-y-4">
                    <div>
                        <label>NOME COMPLETO *</label>
                        <input type="text" id="nome" required class="w-full p-2">
                    </div>
                    <div>
                        <label>WHATSAPP (11 DÍGITOS) *</label>
                        <input type="tel" id="tel" required maxlength="11" placeholder="11912345678" class="w-full p-2">
                    </div>
                    <div>
                        <label>ENDEREÇO (SÓ SOL NASCENTE) *</label>
                        <input type="text" id="end" required placeholder="Rua, Número" class="w-full p-2">
                    </div>
                </div>
                <button type="button" onclick="mudarEtapa(2)" class="btn-next w-full mt-8 p-4 font-black">PROXIMO >>></button>
            </div>

            <!-- ETAPA 2: PETS -->
            <div id="step2" class="step">
                <h2 class="text-xl font-black mb-4 underline">ETAPA 2: OS PETS</h2>
                <label>QUANTOS PETS? (MÁX 4)</label>
                <select id="qtdPets" onchange="gerarPets()" class="w-full p-2 mb-6">
                    <option value="1">1 PET</option>
                    <option value="2">2 PETS</option>
                    <option value="3">3 PETS</option>
                    <option value="4">4 PETS</option>
                </select>
                
                <div id="petsContainer" class="space-y-4"></div>

                <div class="flex gap-2 mt-8">
                    <button type="button" onclick="mudarEtapa(1)" class="w-1/3 border-2 border-black p-4 font-black">VOLTAR</button>
                    <button type="button" onclick="mudarEtapa(3)" class="btn-next w-2/3 p-4 font-black">PROXIMO >>></button>
                </div>
            </div>

            <!-- ETAPA 3: REGRAS DE HORÁRIOS -->
            <div id="step3" class="step">
                <h2 class="text-xl font-black mb-4 underline">ETAPA 3: TIPO E DATA</h2>
                
                <label>TIPO DE PACOTE</label>
                <select id="pacote" class="w-full p-2 mb-4">
                    <option value="avulso">AVULSO (BANHO, HIGIÊNICA OU TOSA)</option>
                    <option value="basico">BÁSICO (1 BANHO + 1 HIGIÊNICA)</option>
                    <option value="basico_tosa">BÁSICO COM TOSA (1 BANHO + 1 TOSA)</option>
                    <option value="premium">PREMIUM (3 BANHOS + 1 HIGIÊNICA)</option>
                </select>

                <label>ESCOLHA A DATA</label>
                <input type="date" id="data" onchange="carregarHorarios()" class="w-full p-2 mb-4">

                <div id="horariosGrid" class="mt-4">
                    <p class="text-center font-bold">SELECIONE UMA DATA VÁLIDA</p>
                </div>

                <div class="flex gap-2 mt-8">
                    <button type="button" onclick="mudarEtapa(2)" class="w-1/3 border-2 border-black p-4 font-black">VOLTAR</button>
                    <button type="button" onclick="finalizar()" class="btn-next w-2/3 p-4 font-black">FINALIZAR AGENDAMENTO</button>
                </div>
            </div>

            <!-- ETAPA 4: CONFIRMAÇÃO -->
            <div id="step4" class="step text-center">
                <div class="border-4 border-black p-6 bg-white">
                    <h2 class="text-2xl font-black mb-4 italic">AGENDAMENTO CONFIRMADO!</h2>
                    <p class="mb-6 font-bold uppercase">Logo mais nossa equipe entrará em contato para passar valores de imediato envie um foto do pet para acelerar o processo.</p>
                    
                    <div id="areaCancelamento" class="mt-8 border-t-2 border-black pt-4">
                        <!-- O Botão inteligente aparece aqui -->
                    </div>
                </div>
            </div>

        </form>
    </div>

    <script>
        // --- LOGICA DE CALENDÁRIO ---
        const inputData = document.getElementById('data');
        const hoje = new Date();
        inputData.min = hoje.toISOString().split('T')[0];
        
        // Bloqueio do mês seguinte se for antes do dia 20
        if (hoje.getDate() < 20) {
            const ultimoDia = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0);
            inputData.max = ultimoDia.toISOString().split('T')[0];
        }

        function mudarEtapa(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step'+n).classList.add('active');
            if(n === 2) gerarPets();
        }

        function gerarPets() {
            const qtd = document.getElementById('qtdPets').value;
            const container = document.getElementById('petsContainer');
            container.innerHTML = '';
            for(let i=1; i<=qtd; i++) {
                container.innerHTML += `
                <div class="border-2 border-black p-3 bg-white/50">
                    <p class="font-black underline mb-2">PET #${i}</p>
                    <input type="text" placeholder="NOME DO PET *" required class="w-full p-2 mb-2">
                    <select class="w-full p-2 mb-2">
                        <option>CACHORRO</option>
                        <option>GATO</option>
                    </select>
                    <select class="w-full p-2 mb-2">
                        <option>PEQUENO</option>
                        <option>MÉDIO</option>
                        <option>GRANDE PELO CURTO</option>
                        <option>GRANDE PELUDO</option>
                    </select>
                    <div class="flex items-center gap-2">
                        <label>ALERGIA?</label>
                        <select onchange="this.nextElementSibling.classList.toggle('hidden')" class="p-1">
                            <option>NÃO</option>
                            <option>SIM</option>
                        </select>
                        <input type="text" placeholder="OBSERVAÇÃO" class="hidden flex-1 p-1">
                    </div>
                </div>`;
            }
        }

        function carregarHorarios() {
            const dataSel = new Date(inputData.value + 'T00:00:00');
            const dia = dataSel.getDay(); // 0 Dom, 3 Qua, 6 Sab
            const grid = document.getElementById('horariosGrid');
            grid.innerHTML = '';

            let slots = [];
            if (dia >= 3 && dia <= 6) { // Quarta a Sábado
                slots = [
                    {h:'09:00', d:'3 Banhos/Higiênica + 1 Tosa'},
                    {h:'10:00', d:'3 Banhos/Higiênica + 1 Grande Curto (Só Banho)'},
                    {h:'11:00', d:'3 Banhos/Higiênica + 1 Tosa'},
                    {h:'13:30', d:'4 Banhos/Higiênica'},
                    {h:'14:30', d:'3 Banhos/Higiênica + 1 Tosa'},
                    {h:'15:30', d:'3 Banhos/Higiênica + 1 Grande Peludo (Só Banho)'},
                    {h:'16:00', d:'3 Banhos/Higiênica + 1 Gato (Só Banho)'}
                ];
            } else if (dia === 0) { // Domingo
                slots = [
                    {h:'09:00', d:'3 Banhos/Higiênica + 1 Tosa'},
                    {h:'10:00', d:'3 Banhos/Higiênica + 1 Grande Curto (Só Banho)'},
                    {h:'11:00', d:'3 Banhos/Higiênica + 1 Tosa'},
                    {h:'12:00', d:'3 Banhos/Higiênica + 1 Grande Peludo (Só Banho)'}
                ];
            } else {
                grid.innerHTML = '<p class="font-black text-center border-2 border-black p-2 bg-yellow-300">NILO PET FECHADO (SEG E TER)</p>';
                return;
            }

            slots.forEach(s => {
                grid.innerHTML += `
                <label>
                    <input type="radio" name="hora" value="${s.h}" class="hidden">
                    <div class="slot-card">
                        <div class="flex justify-between font-black italic"><span>${s.h}</span><span>DISPONÍVEL</span></div>
                        <p class="text-[10px] uppercase font-bold text-black">${s.d}</p>
                    </div>
                </label>`;
            });
        }

        function finalizar() {
            if(!document.querySelector('input[name="hora"]:checked')) return alert('ESCOLHA UM HORÁRIO!');
            
            const tipo = document.getElementById('pacote').value;
            const btnArea = document.getElementById('areaCancelamento');
            
            // Lógica Surpresa do Botão de Cancelamento
            if(tipo === 'avulso') {
                btnArea.innerHTML = `<button type="button" onclick="alert('AVULSO: Cancelamento solicitado! A vaga foi aberta.')" class="w-full border-2 border-black p-2 font-black bg-white hover:bg-black hover:text-white">CANCELAR AGENDAMENTO AVULSO</button>`;
            } else {
                btnArea.innerHTML = `<button type="button" onclick="alert('PACOTE: Para cancelar pacotes, fale com o suporte para manter seus créditos!')" class="w-full border-2 border-black p-2 font-black bg-black text-yellow-400">CANCELAR / REAGENDAR PACOTE</button>`;
            }
            
            mudarEtapa(4);
        }
    </script>
</body>
</html>
