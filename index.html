<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nilo Pet - Agendamento</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 min-h-screen">
  <div class="max-w-3xl mx-auto p-4">
    <header class="bg-white rounded-xl shadow-md p-6 mb-6 text-center">
      <h1 class="text-3xl font-bold text-blue-800">Nilo Pet Banho e Tosa</h1>
      <p class="text-gray-600">Teste - Etapa 1</p>
    </header>

    <div class="bg-white rounded-xl shadow-lg p-6">
      <h3 class="font-semibold mb-4">1. Seus dados</h3>
      <input id="c_nome" type="text" placeholder="Nome completo" class="w-full border p-3 rounded mb-3">
      <button onclick="alert('Funcionou! Nome: ' + document.getElementById('c_nome').value)" class="w-full bg-blue-600 text-white p-3 rounded font-semibold">Testar Botão</button>
    </div>
  </div>
</body>
</html>
