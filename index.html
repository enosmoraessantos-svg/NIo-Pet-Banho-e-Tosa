<script>
  const SUPABASE_URL = "https://yczhjyxisqrvfxxgipop.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."; // COLA A KEY ANON AQUI
  
  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function irEtapa1() {
    document.getElementById('etapa1').style.display = 'block';
    document.getElementById('etapa2').style.display = 'none';
    document.getElementById('etapa3').style.display = 'none';
    document.getElementById('etapa4').style.display = 'none';
    document.getElementById('etapaAtual').innerText = '1';
  }

  function irEtapa2() {
    const nome = document.getElementById('c_nome').value.trim();
    const qtd = document.getElementById('c_qtd_pets').value;
    const whats = document.getElementById('c_whatsapp').value.trim();
    const end = document.getElementById('c_endereco').value.trim();
    
    if (!nome || !qtd || !whats || !end) {
      alert('Preencha todos os campos');
      return;
    }
    
    document.getElementById('etapa1').style.display = 'none';
    document.getElementById('etapa2').style.display = 'block';
    document.getElementById('etapaAtual').innerText = '2';
  }

  function irEtapa3() {
    const pacote = document.getElementById('c_pacote').value;
    if (!pacote) {
      alert('Selecione um pacote');
      return;
    }
    
    const qtd = parseInt(document.getElementById('c_qtd_pets').value);
    let html = '';
    for(let i = 0; i < qtd; i++) {
      html += `<div class="border p-4 rounded mb-4 bg-blue-50">
        <h4 class="font-semibold mb-2">Pet ${i+1}</h4>
        <select class="pet_especie w-full border p-2 rounded mb-2">
          <option value="">Espécie</option><option>Cachorro</option><option>Gato</option>
        </select>
        <input placeholder="Nome do pet" class="pet_nome w-full border p-2 rounded mb-2">
        <select class="pet_porte w-full border p-2 rounded mb-2">
          <option value="">Porte</option><option>Pequeno/Médio</option>
          <option>Grande Peludo</option><option>Grande Pelo Curto</option>
        </select>
        <select class="pet_servico w-full border p-2 rounded mb-2">
          <option value="">Serviço</option><option>Banho</option>
          <option>Banho + Tosa Higiênica</option><option>Banho + Tosa</option>
        </select>
      </div>`;
    }
    document.getElementById('petsContainer').innerHTML = html;
    
    document.getElementById('etapa2').style.display = 'none';
    document.getElementById('etapa3').style.display = 'block';
    document.getElementById('etapaAtual').innerText = '3';
  }

  function irEtapa4() {
    let ok = true;
    document.querySelectorAll('#petsContainer select, #petsContainer input').forEach(i => { 
      if(!i.value) ok = false; 
    });
    if(!ok) {
      alert('Preencha todos os dados dos pets');
      return;
    }
    
    document.getElementById('resumo').innerHTML = `
      <p><b>Cliente:</b> ${document.getElementById('c_nome').value}</p>
      <p><b>WhatsApp:</b> ${document.getElementById('c_whatsapp').value}</p>
      <p><b>Pacote:</b> ${document.getElementById('c_pacote').value}</p>
    `;
    
    document.getElementById('etapa3').style.display = 'none';
    document.getElementById('etapa4').style.display = 'block';
    document.getElementById('etapaAtual').innerText = '4';
  }

  async function salvar() {
    const pets = [];
    document.querySelectorAll('#petsContainer > div').forEach(div => {
      pets.push({
        especie: div.querySelector('.pet_especie').value,
        nome: div.querySelector('.pet_nome').value,
        porte: div.querySelector('.pet_porte').value,
        servico: div.querySelector('.pet_servico').value
      });
    });

    const { error } = await client.from('agendamentos').insert({
      cliente: document.getElementById('c_nome').value,
      whatsapp: document.getElementById('c_whatsapp').value,
      endereco: document.getElementById('c_endereco').value + ', Sol Nascente',
      qtd_pets: parseInt(document.getElementById('c_qtd_pets').value),
      pacote: document.getElementById('c_pacote').value,
      pets: pets,
      status: 'confirmado'
    });
    
    if(!error) {
      document.getElementById('etapa4').style.display = 'none';
      document.getElementById('sucesso').style.display = 'block';
    } else { 
      alert('Erro ao salvar: ' + error.message);
    }
  }
</script>
