<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nilo Pet - Agendamento</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        
        body { 
            background-color: #e0f2fe; /* Azul claro solicitado */
            color: #dc2626; /* Vermelho solicitado */
            font-family: 'Lexend', sans-serif;
            margin: 0;
            padding: 0;
        }

        .container-nilo {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            border-left: 6px solid black;
            border-right: 6px solid black;
            padding: 20px;
        }

        .input-nilo {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            border: 3px solid black;
            color: black !important;
            margin-bottom: 20px;
            border-radius: 0px;
            background: #f8fafc;
        }

        .btn-proximo {
            width: 100%;
            background: #dc2626;
            color: white;
            font-weight: 900;
            font-size: 22px;
            padding: 22px;
            border: 4px solid black;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 6px 6px 0px 0px rgba(0,0,0,1);
            margin-top: 10px;
        }

        .btn-proximo:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px 0px rgba(0,0,0,1);
        }

        .etapa { display: none; }
        .active { display: block; animation: slideIn 0.3s ease-out; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        label { font-weight: 900; text-transform: uppercase; font-size: 14px; display: block; margin-bottom: 5px; }
        
        .progresso {
            background: #fee2e2;
            height: 12px;
            border: 2px solid black;
            margin-bottom: 30px;
        }
        .barra { background: #dc2626; height: 100%; transition: width 0.3s; }
    </style>
</head>
<body>

    <div class="container-nilo">
        <!-- CABEÇALHO -->
        <div class="text-center mb-6">
            <h1 class="text-4xl font-black italic tracking-tighter uppercase leading-none">Nilo Pet</h1>
            <p class="font-bold text-black border-b-4 border-black pb-2 inline-block w-full">BANHO E TOSA</p>
        </div>

        <div class="progresso"><div id="barraProgresso" class="barra" style="width: 25%;"></div></div>

        <form id="formAgendamento">
            
            <!-- ETAPA 1: TUTOR -->
            <div id="step1" class="etapa active">
                <label>Nome do Tutor *</label>
                <input type="text" id="nomeTutor" placeholder="Ex: João Silva" class="input-nilo" required>

                <label>WhatsApp (11 dígitos) *</label>
                <input type="tel" id="telTutor" placeholder="11988887777" class="input-nilo" required>

                <label>Endereço Completo (Rua e Número) *</label>
                <div class="relative">
                    <input type="text" id="ruaTutor" placeholder="Rua das Flores, 123" class="input-nilo" required>
                    <div class="bg-black text-white p-2 text-sm font-bold mt-[-20px] mb-6">Bairro: SOL NASCENTE (Obrigatório)</div>
                </div>

                <button type="button" onclick="nextStep(2)" class="btn-proximo">Continuar ➔</button>
            </div>

            <!-- ETAPA 2: PETS -->
            <div id="step2" class="etapa">
                <h3 class="font-black text-2xl mb-4 text-black uppercase underline">Dados do Pet</h3>
                
                <label>Espécie</label>
                <select id="especie" class="input-nilo">
                    <option>Cachorro</option>
                    <option>Gato</option>
                </select>

                <label>Nome do Pet *</label>
                <input type="text" id="nomePet" placeholder="Ex: Thor" class="input-nilo">

                <label>Porte do Pet</label>
                <select id="porte" class="input-nilo">
                    <option>Pequeno</option>
                    <option>Médio</option>
                    <option>Grande (Pelo Curto)</option>
                    <option>Grande (Peludo)</option>
                </select>

                <label>Possui Alergia?</label>
                <input type="text" id="alergia" placeholder="Não / Sim (quais?)" class="input-nilo">

                <div class="grid grid-cols-2 gap-2">
                    <button type="button" onclick="nextStep(1)" class="p-4 border-4 border-black font-black text-black">VOLTAR</button>
                    <button type="button" onclick="nextStep(3)" class="btn-proximo !mt-0">PRÓXIMO</button>
                </div>
            </div>

            <!-- ETAPA 3: SERVIÇOS -->
            <div id="step3" class="etapa">
                <h3 class="font-black text-2xl mb-4 text-black uppercase underline">Escolha o Serviço</h3>
                
                <div class="space-y-3">
                    <label class="block p-4 border-4 border-black bg-slate-50 cursor-pointer">
                        <input type="radio" name="servico" value="Avulso" checked> <span class="ml-2 text-black font-black uppercase">Avulso (Banho/Tosa)</span>
                    </label>
                    <label class="block p-4 border-4 border-black bg-slate-50 cursor-pointer">
                        <input type="radio" name="servico" value="Básico"> <span class="ml-2 text-black font-black uppercase text-red-600 italic font-black">Pacote Básico</span>
                    </label>
                    <label class="block p-4 border-4 border-black bg-slate-50 cursor-pointer">
                        <input type="radio" name="servico" value="Premium"> <span class="ml-2 text-black font-black uppercase text-red-600 italic font-black">Pacote Premium ⭐</span>
                    </label>
                </div>

                <div class="grid grid-cols-2 gap-2 mt-6">
                    <button type="button" onclick="nextStep(2)" class="p-4 border-4 border-black font-black text-black">VOLTAR</button>
                    <button type="button" onclick="nextStep(4)" class="btn-proximo !mt-0">PRÓXIMO</button>
                </div>
            </div>

            <!-- ETAPA 4: DATA -->
            <div id="step4" class="etapa">
                <h3 class="font-black text-2xl mb-4 text-black uppercase underline">Finalizar</h3>
                
                <label>Escolha o Dia:</label>
                <input type="date" id="data" class="input-nilo font-bold">

                <label>Horário Disponível:</label>
                <select id="horarios" class="input-nilo font-bold">
                    <option>09:00</option>
                    <option>10:00 (Grande Curto)</option>
                    <option>11:00</option>
                    <option>13:30</option>
                    <option>14:30</option>
                    <option>15:30 (Grande Peludo)</option>
                    <option>16:00 (Gato)</option>
                </select>

                <div class="bg-yellow-200 border-4 border-black p-4 text-black text-sm mb-6 font-bold">
                    ⚠️ SURPRESA: Se precisar cancelar, avise 2h antes e ganhe desconto na próxima!
                </div>

                <button type="button" onclick="finalizar()" class="btn-proximo bg-black !border-red-600">CONFIRMAR AGENDAMENTO</button>
            </div>
        </form>
    </div>

    <script>
        function nextStep(n) {
            document.querySelectorAll('.etapa').forEach(e => e.classList.remove('active'));
            document.getElementById('step'+n).classList.add('active');
            document.getElementById('barraProgresso').style.width = (n*25) + '%';
            window.scrollTo(0,0);
        }

        function finalizar() {
            alert("✅ AGENDAMENTO CONFIRMADO!\n\nLogo mais nossa equipe entrará em contato para passar valores.\n\nENVIE UMA FOTO DO SEU PET IMEDIATAMENTE PARA ACELERAR.");
        }

        // Bloqueio de datas passadas
        document.getElementById('data').min = new Date().toISOString().split("T")[0];
    </script>
</body>
</html>
