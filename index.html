<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nilo Pet - Agendamento</title>
    <style>
        body { 
            background-color: blue; 
            color: red; 
            font-family: Arial, sans-serif; 
            font-weight: bold;
            padding: 20px;
        }
        .container {
            border: 5px solid black;
            padding: 20px;
            max-width: 500px;
            margin: auto;
            background-color: blue;
        }
        input, select, textarea {
            width: 100%;
            margin: 10px 0;
            border: 2px solid black;
            padding: 8px;
            color: red;
            background: white;
        }
        button {
            background-color: black;
            color: red;
            border: none;
            padding: 15px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1em;
        }
        .pet-item { border-bottom: 2px solid black; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Nilo Pet Banho e Tosa</h1>
    
    <label>Nome do Cliente (Obrigatório):</label>
    <input type="text" id="nomeCliente" required>

    <label>WhatsApp (11 dígitos):</label>
    <input type="tel" id="whatsapp" placeholder="119XXXXXXXX" maxlength="11">

    <label>Endereço (Apenas Sol Nascente):</label>
    <input type="text" value="Bairro Sol Nascente" readonly>
    <input type="text" id="rua" placeholder="Rua e Número" required>

    <label>Tipo de Serviço/Pacote:</label>
    <select id="tipoServico">
        <option value="Avulso">Avulso</option>
        <option value="Basico">Básico (1 banho + 1 tosa higiênica)</option>
        <option value="BasicoTosa">Básico com Tosa (1 banho + 1 tosa)</option>
        <option value="Premium">Premium (3 banhos + 1 tosa higiênica)</option>
    </select>

    <div id="petsContainer">
        <h3>Dados do Pet (Máximo 4)</h3>
        <div class="pet-item">
            <input type="text" placeholder="Nome do Pet" required>
            <select>
                <option>Cachorro</option>
                <option>Gato (Só Banho)</option>
            </select>
            <select>
                <option>Pequeno</option>
                <option>Médio</option>
                <option>Grande Pelo Curto</option>
                <option>Grande Peludo</option>
            </select>
            <label>Alergia?</label>
            <input type="text" placeholder="Sim/Não - Observações">
        </div>
    </div>

    <label>Dia e Horário:</label>
    <input type="date" id="dataAgendamento">
    <select id="horario">
        <!-- Lógica de horários será filtrada aqui -->
        <option>09:00</option>
        <option>10:00</option>
        <option>11:00</option>
        <option>13:30</option>
        <option>14:30</option>
        <option>15:30</option>
        <option>16:00</option>
    </select>

    <button onclick="finalizar()">FINALIZAR AGENDAMENTO</button>
</div>

<script>
    function finalizar() {
        const msg = "Agendamento confirmado! Logo mais nossa equipe entrará em contato para passar valores. De imediato envie uma foto do pet para acelerar o processo.";
        alert(msg);
        // Aqui enviaria os dados para o seu Painel ADM e abriria o Whats
        window.open("https://wa.me, quero confirmar meu agendamento no Nilo Pet!");
    }
</script>

</body>
</html>
