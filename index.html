<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nilo Pet - Agendamento</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 min-h-screen">
  <div class="max-w-3xl mx-auto p-4">
    <header class="bg-white rounded-xl shadow-md p-6 mb-6 text-center">
      <h1 class="text-3xl font-bold text-blue-800">Nilo Pet Banho e Tosa</h1>
      <p class="text-gray-600">Agende online em 4 etapas</p>
    </header>

    <div class="bg-white rounded-xl shadow-lg p-6">
      <div class="text-sm mb-4">Etapa <span id="etapaAtual">1</span> de 4</div>
      
      <div id="etapa1" class="etapa">
        <h3 class="font-semibold mb-4">1. Seus dados</h3>
        <input id="c_nome" placeholder="Nome completo" class="w-full border p-3 rounded mb-3">
        <select id="c_qtd_pets" class="w-full border p-3 rounded mb-3">
          <option value="">Quantos pets?</option>
          <option value="1">1</option><option value="2">2</option>
          <option value="3">3</option><option value="4">4</option>
        </select>
        <input id="c_whatsapp" placeholder="WhatsApp" class="w-full border p-3 rounded mb-3">
        <input id="c_endereco" placeholder="Endereço completo" class="w-full border p-3 rounded mb-3">
        <input value="Bairro: Sol Nascente" class="w-full border p-3 rounded mb-4 bg-gray-100" disabled>
        <button onclick="proximaEtapa(2)" class="w-full bg-blue-600 text-white p-3 rounded font-semibold hover:bg-blue-700">Próximo</button>
      </div>

      <div id="etapa2" class="etapa hidden">
        <h3 class="font-semibold mb-4">2. Escolha o Pacote</h3>
        <select id="c_pacote" class="w-full border p-3 rounded mb-4" onchange="mostrarCamposPacote()">
          <option value="">Selecione</option>
          <option value="Avulso">Avulso</option>
          <option value="Básico">Básico</option>
          <option value="Básico com Tosa">Básico com Tosa</option>
          <option value="Premium">Premium</option>
        </select>
        <div id="camposPacote"></div>
        <div class="flex gap-2 mt-4">
          <button onclick="proximaEtapa(1)" class="w-1/2 bg-gray-300 p-3 rounded">Voltar</button>
          <button onclick="proximaEtapa(3)" class="w-1/2 bg-blue-600 text-white p-3 rounded">Próximo</button>
        </div>
      </div>

      <div id="etapa3" class="etapa hidden">
        <h3 class="font-semibold mb-4">3. Dados dos Pets</h3>
        <div id="petsContainer"></div>
        <div class="flex gap-2 mt-4">
          <button onclick="proximaEtapa(2)" class="w-1/2 bg-gray-300 p-3 rounded">Voltar</button>
          <button onclick="proximaEtapa(4)" class="w-1/2 bg-blue-600 text-white p-3 rounded">Próximo</button>
        </div>
      </div>

      <div id="etapa4" class="etapa hidden">
        <h3 class="font-semibold mb-4">4. Confirmar</h3>
        <div id="resumoAgendamento" class="bg-gray-50 p-4 rounded mb-4 text-sm"></div>
        <div class="flex gap-2">
          <button onclick="proximaEtapa(3)" class="w-1/2 bg-gray-300 p-3 rounded">Voltar</button>
          <button onclick="finalizarAgendamento()" class="w-1/2 bg-green-600 text-white p-3 rounded font-bold">Confirmar</button>
        </div>
      </div>

      <div id="msgSucesso" class="hidden text-center p-6">
        <h3 class="text-2xl font-bold text-green-600 mb-2">Agendado!</h3>
        <p class="mb-4">Em breve nossa equipe vai entrar em contato.</p>
        <p class="font-semibold">De imediato mande foto do seu pet para adiantar o atendimento.</p>
      </div>
    </div>
  </div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
  const supabase = window.supabase.createClient(
    "https://yczhjyxisqrvfxxgipop.supabase.co",
    "sb_publishable_6SmMDIymguOi59WrVb1QQA_wSykUdUm"
  );
  
  let etapa = 1, dadosAgendamento = {};

  window.proximaEtapa = function(n) {
    if(n > etapa && !validarEtapa()) { alert('Preencha todos os campos'); return; }
    document.querySelectorAll('.etapa').forEach(e => e.classList.add('hidden'));
    document.getElementById(`etapa${n}`).classList.remove('hidden');
    etapa = n; document.getElementById('etapaAtual').textContent = n;
    if(n === 3) gerarCamposPets();
    if(n === 4) mostrarResumo();
  }

  function validarEtapa() {
    if(etapa === 1) return c_nome.value && c_qtd_pets.value && c_whatsapp.value && c_endereco.value;
    if(etapa === 2) return c_pacote.value;
    return true;
  }

  window.mostrarCamposPacote = function() {
    const tipo = c_pacote.value;
    let html = '<input type="date" class="w-full border p-2 rounded mb-2" required><input type="time" class="w-full border p-2 rounded" required>';
    if(tipo === 'Básico' || tipo === 'Básico com Tosa') {
      html = '<input type="date" class="w-full border p-2 rounded mb-2" required><input type="date" class="w-full border p-2 rounded" required>';
    }
    camposPacote.innerHTML = html;
  }

  function gerarCamposPets() {
    const qtd = parseInt(c_qtd_pets.value); let html = '';
    for(let i = 0; i < qtd; i++) {
      html += `<div class="border p-4 rounded mb-4 bg-blue-50">
        <h4 class="font-semibold mb-2">Pet ${i+1}</h4>
        <select class="pet_especie w-full border p-2 rounded mb-2"><option value="">Espécie</option><option>Cachorro</option><option>Gato</option></select>
        <input placeholder="Nome do pet" class="pet_nome w-full border p-2 rounded mb-2">
        <select class="pet_porte w-full border p-2 rounded mb-2"><option value="">Porte</option><option>Pequeno/Médio</option><option>Grande Peludo</option><option>Grande Pelo Curto</option></select>
        <select class="pet_servico w-full border p-2 rounded mb-2"><option value="">Serviço</option><option>Banho</option><option>Banho + Tosa Higiênica</option><option>Banho + Tosa</option></select>
        <select class="pet_alergia w-full border p-2 rounded"><option value="">Alergia?</option><option>Não</option><option>Sim</option></select>
      </div>`;
    }
    petsContainer.innerHTML = html;
  }

  function mostrarResumo() {
    dadosAgendamento = {
      cliente: c_nome.value, qtd_pets: c_qtd_pets.value,
      whatsapp: c_whatsapp.value, endereco: c_endereco.value + ', Sol Nascente',
      pacote: c_pacote.value, pets: []
    };
    document.querySelectorAll('#petsContainer > div').forEach(div => {
      dadosAgendamento.pets.push({
        especie: div.querySelector('.pet_especie').value,
        nome: div.querySelector('.pet_nome').value,
        porte: div.querySelector('.pet_porte').value,
        servico: div.querySelector('.pet_servico').value,
        alergia: div.querySelector('.pet_alergia').value
      });
    });
    resumoAgendamento.innerHTML = `<p><b>Cliente:</b> ${dadosAgendamento.cliente}</p><p><b>Pacote:</b> ${dadosAgendamento.pacote}</p>`;
  }

  window.finalizarAgendamento = async function() {
    const { error } = await supabase.from('agendamentos').insert({
      cliente: dadosAgendamento.cliente,
      whatsapp: dadosAgendamento.whatsapp,
      endereco: dadosAgendamento.endereco,
      qtd_pets: parseInt(dadosAgendamento.qtd_pets),
      pacote: dadosAgendamento.pacote,
      pets: dadosAgendamento.pets,
      status: 'confirmado'
    });
    if(!error) {
      document.querySelectorAll('.etapa').forEach(e => e.classList.add('hidden'));
      msgSucesso.classList.remove('hidden');
    } else { 
      alert('Erro: ' + error.message); 
      console.log(error);
    }
  }
</script>
</body>
</html>
