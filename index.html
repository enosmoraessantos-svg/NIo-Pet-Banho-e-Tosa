<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nilo Pet</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background-color: #e0f2fe; color: #ff0000; font-family: sans-serif; font-weight: bold; overflow-x: hidden; }
        .bloco { border: 2px solid #000; padding: 12px; margin-bottom: 10px; background-color: #e0f2fe; }
        input, select, textarea { border: 1.5px solid #000; width: 100%; padding: 6px; margin-top: 2px; margin-bottom: 8px; color: #000; font-weight: normal; font-size: 14px; }
        .btn-proximo { background-color: #fff; border: 2px solid #000; color: #ff0000; padding: 8px; cursor: pointer; text-transform: uppercase; font-weight: 900; width: 100%; font-size: 14px; }
        .etapa { display: none; }
        .etapa.ativa { display: block; }
        label { font-size: 12px; text-transform: uppercase; }
        .card-pet { background: #fff; border: 1px solid #000; padding: 8px; margin-top: 5px; }
    </style>
</head>
<body class="p-2">

    <div class="max-w-md mx-auto">
        <h1 class="text-xl text-center border-b-2 border-black mb-3 pb-1 italic">NILO PET BANHO E TOSA</h1>

        <!-- ETAPA 1 -->
        <div id="etapa1" class="etapa ativa bloco">
            <label>NOME COMPLETO *</label>
            <input type="text" id="nome_cliente">
            
            <label>WHATSAPP (11 DÍGITOS) *</label>
            <input type="text" id="whatsapp" maxlength="11" placeholder="11999999999">
            
            <label>ENDEREÇO (SÓ SOL NASCENTE) *</label>
            <textarea id="endereco" rows="2"></textarea>
            
            <button class="btn-proximo" onclick="irPara(2)">PRÓXIMOS: PETS</button>
        </div>

        <!-- ETAPA 2 -->
        <div id="etapa2" class="etapa bloco">
            <label>QUANTIDADE DE PETS (1-4)</label>
            <select id="qtd_pets" onchange="gerarCamposPets()">
                <option value="1">1 PET</option>
                <option value="2">2 PETS</option>
                <option value="3">3 PETS</option>
                <option value="4">4 PETS</option>
            </select>
            
            <div id="container_pets" class="max-h-[250px] overflow-y-auto pr-1"></div>
            
            <button class="btn-proximo mt-2" onclick="irPara(3)">PRÓXIMO: SERVIÇO</button>
        </div>

        <!-- ETAPA 3 -->
        <div id="etapa3" class="etapa bloco">
            <label>TIPO DE PACOTE OU AVULSO</label>
            <select id="tipo_servico" onchange="mostrarServicos()">
                <option value="">ESCOLHA...</option>
                <option value="avulso">AVULSO</option>
                <option value="basico">BÁSICO (1B + 1TH)</option>
                <option value="basico_tosa">BÁSICO COM TOSA (1B + 1T)</option>
                <option value="premium">PREMIUM (3B + 1TH)</option>
            </select>

            <div id="servicos_avulsos" class="hidden">
                <label>QUAL SERVIÇO AVULSO?</label>
                <select id="servico_final">
                    <option>BANHO</option>
                    <option>BANHO + TOSA HIGIÊNICA</option>
                    <option>BANHO + TOSA</option>
                </select>
            </div>

            <button class="btn-proximo mt-2" onclick="irPara(4)">PRÓXIMO: DATA</button>
        </div>

        <!-- ETAPA 4 -->
        <div id="etapa4" class="etapa bloco">
            <label>DATA (QUA A DOM)</label>
            <input type="date" id="data_agenda" onchange="carregarHorarios()">
            
            <div id="lista_horarios" class="grid grid-cols-2 gap-2 mt-2"></div>
            
            <button class="btn-proximo mt-4 bg-red-600 !text-white border-none" onclick="finalizar()">CONFIRMAR</button>
        </div>

        <!-- MENSAGEM FINAL -->
        <div id="final" class="etapa bloco text-center">
            <p class="text-lg mb-2">AGENDAMENTO CONFIRMADO!</p>
            <p class="text-sm mb-3">EQUIPE ENTRARÁ EM CONTATO PARA PASSAR VALORES.</p>
            <p class="border-2 border-black p-2 bg-white text-black text-xs font-black">ENVIE UMA FOTO DO PET AGORA PARA ACELERAR.</p>
            <button class="mt-4 text-[10px] text-black underline uppercase" onclick="location.reload()">Cancelar / Voltar</button>
        </div>
    </div>

    <script>
        function irPara(n) {
            document.querySelectorAll('.etapa').forEach(e => e.classList.remove('ativa'));
            document.getElementById('etapa' + n).classList.add('ativa');
            if(n === 2) gerarCamposPets();
            if(n === 4) limitarCalendario();
        }

        function gerarCamposPets() {
            const qtd = document.getElementById('qtd_pets').value;
            const container = document.getElementById('container_pets');
            container.innerHTML = '';
            for(let i=1; i<=qtd; i++) {
                container.innerHTML += `
                <div class="card-pet">
                    <p class="text-[10px] text-black">PET #${i}</p>
                    <input type="text" placeholder="NOME DO PET" required>
                    <div class="flex gap-1">
                        <select class="text-xs"><option>CÃO</option><option>GATO</option></select>
                        <select class="text-xs"><option>PEQ</option><option>MÉD</option><option>G. CURTO</option><option>G. PELUDO</option></select>
                    </div>
                </div>`;
            }
        }

        function mostrarServicos() {
            const tipo = document.getElementById('tipo_servico').value;
            document.getElementById('servicos_avulsos').style.display = (tipo === 'avulso') ? 'block' : 'none';
        }

        function limitarCalendario() {
            const campo = document.getElementById('data_agenda');
            const hoje = new Date();
            campo.min = hoje.toISOString().split("T")[0];
            if (hoje.getDate() < 20) {
                const ultimoDia = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0);
                campo.max = ultimoDia.toISOString().split("T")[0];
            }
        }

        function carregarHorarios() {
            const lista = document.getElementById('lista_horarios');
            lista.innerHTML = '';
            const horarios = ["09:00", "10:00", "11:00", "13:30", "14:30", "15:30", "16:00"];
            horarios.forEach(h => {
                lista.innerHTML += `<button class="border border-black p-1 text-xs bg-white" onclick="this.style.background='red'; this.style.color='white'">${h}</button>`;
            });
        }

        function finalizar() {
            document.querySelectorAll('.etapa').forEach(e => e.classList.remove('ativa'));
            document.getElementById('final').classList.add('ativa');
        }
    </script>
</body>
</html>
