<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Nilo Pet - Agendamento Oficial</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { background-color: #f0f9ff; font-family: sans-serif; color: #1e293b; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin: 15px; padding: 25px; border: 1px solid #e2e8f0; }
        input, select { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #e2e8f0; margin-bottom: 12px; font-size: 16px; color: black; }
        .btn-next { background-color: #dc2626; color: white; width: 100%; padding: 18px; border-radius: 12px; font-weight: 800; font-size: 18px; border: none; }
        .btn-cancel { background-color: #64748b; color: white; width: 100%; padding: 12px; border-radius: 10px; font-weight: 700; margin-top: 10px; }
        .step-content { display: none; }
        .step-content.active { display: block; }
        .pet-box { border: 2px solid #e2e8f0; padding: 15px; border-radius: 15px; margin-bottom: 15px; background: #f8fafc; }
        .label-req { display: block; text-xs: font-black; margin-bottom: 4px; text-transform: uppercase; font-weight: 900; }
    </style>
</head>
<body>

    <div class="bg-white p-6 text-center border-b shadow-sm">
        <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter italic">Nilo Pet</h1>
        <p class="text-red-600 font-bold text-xs uppercase">Banho e Tosa</p>
    </div>

    <form id="niloForm">
        <!-- ETAPA 1: CLIENTE -->
        <div id="step1" class="step-content active">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline">Etapa 1: Dados do Cliente</h2>
                <label class="label-req">Nome do Cliente *</label>
                <input type="text" id="nome" required placeholder="Nome completo">
                
                <label class="label-req">WhatsApp (11 dígitos) *</label>
                <input type="tel" id="whatsapp" required placeholder="11999998888" maxlength="11" oninput="this.value = this.value.replace(/[^0-9]/g, '')">

                <label class="label-req">Rua e Número *</label>
                <div class="flex gap-2">
                    <input type="text" id="rua" required placeholder="Ex: Rua das Flores, 123" class="flex-grow">
                    <input type="text" value="Sol Nascente" readonly class="w-32 bg-slate-100 font-bold text-slate-400 text-center border-none">
                </div>
                <button type="button" onclick="validaPasso1()" class="btn-next mt-4">PRÓXIMO</button>
                <button type="button" class="btn-cancel">CANCELAR AGENDAMENTO</button>
            </div>
        </div>

        <!-- ETAPA 2: PETS -->
        <div id="step2" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline">Etapa 2: Dados do Pet</h2>
                <label class="label-req">Quantos pets deseja agendar? (Max 4)</label>
                <select id="qtd" onchange="renderPets()">
                    <option value="1">1 Pet</option><option value="2">2 Pets</option>
                    <option value="3">3 Pets</option><option value="4">4 Pets</option>
                </select>

                <div id="petsContainer"></div>

                <button type="button" onclick="next(3)" class="btn-next">PRÓXIMO</button>
                <button type="button" onclick="next(1)" class="btn-cancel bg-slate-400">VOLTAR</button>
            </div>
        </div>

        <!-- ETAPA 3: SERVIÇOS -->
        <div id="step3" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline">Etapa 3: Serviços e Pacotes</h2>
                <label class="label-req">Escolha o Tipo de Serviço:</label>
                <select id="tipo" onchange="renderServicos()">
                    <option value="avulso">AVULSO (Individual)</option>
                    <option value="basico">BÁSICO (2 Datas)</option>
                    <option value="basico_tosa">BÁSICO + TOSA (2 Datas)</option>
                    <option value="premium">PREMIUM (4 Datas)</option>
                </select>

                <div id="boxServico" class="p-4 border-2 border-red-100 rounded-xl bg-red-50 text-sm mb-6"></div>

                <button type="button" onclick="next(4)" class="btn-next">ESCOLHER HORÁRIOS</button>
                <button type="button" onclick="next(2)" class="btn-cancel bg-slate-400">VOLTAR</button>
            </div>
        </div>

        <!-- ETAPA 4: HORÁRIOS -->
        <div id="step4" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline">Etapa 4: Agendar Horário</h2>
                <div id="datasContainer"></div>

                <button type="button" onclick="finish()" class="btn-next mt-6">CONFIRMAR AGENDAMENTO ✅</button>
                <button type="button" onclick="next(3)" class="btn-cancel bg-slate-400">VOLTAR</button>
            </div>
        </div>
    </form>

    <script>
        function next(n) {
            document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
            document.getElementById('step'+n).classList.add('active');
            if(n === 2 && document.getElementById('petsContainer').innerHTML === '') renderPets();
            if(n === 3) renderServicos();
            if(n === 4) renderDatas();
            window.scrollTo(0,0);
        }

        function validaPasso1() {
            const w = document.getElementById('whatsapp').value;
            if(w.length !== 11) return alert("WhatsApp deve ter exatamente 11 dígitos!");
            if(!document.getElementById('nome').value || !document.getElementById('rua').value) return alert("Preencha todos os campos obrigatórios!");
            next(2);
        }

        function renderPets() {
            const qtd = document.getElementById('qtd').value;
            const container = document.getElementById('petsContainer');
            container.innerHTML = '';
            for(let i=1; i<=qtd; i++) {
                container.innerHTML += `
                <div class="pet-box">
                    <label class="label-req">ESPÉCIE DO PET ${i}</label>
                    <select onchange="const p = this.parentElement.querySelector('.porte-div'); const a = this.parentElement.querySelector('.aviso-gato'); if(this.value==='Gato'){p.style.display='none'; a.style.display='block';}else{p.style.display='block'; a.style.display='none';}">
                        <option value="Cachorro">Cachorro</option><option value="Gato">Gato</option>
                    </select>
                    <label class="label-req">NOME DO PET ${i} *</label>
                    <input type="text" required placeholder="Ex: Bob">
                    <div class="porte-div">
                        <label class="label-req">PORTE</label>
                        <select><option>Pequeno</option><option>Médio</option><option>Grande Pelo Curto</option><option>Grande Peludo</option></select>
                    </div>
                    <div class="aviso-gato hidden bg-black text-white p-2 text-[10px] font-bold mb-3">GATO: SÓ BANHO</div>
                    <label class="label-req text-[10px]">POSSUI ALERGIA?</label>
                    <select onchange="this.nextElementSibling.classList.toggle('hidden', this.value === 'Não')"><option>Não</option><option>Sim</option></select>
                    <input type="text" class="hidden mt-2" placeholder="Descreva a alergia">
                </div>`;
            }
        }

        function renderServicos() {
            const t = document.getElementById('tipo').value;
            const b = document.getElementById('boxServico');
            if(t === 'avulso') {
                b.innerHTML = `<label class="label-req">Escolha o serviço avulso:</label><select><option>Banho</option><option>Banho + Tosa Higiênica</option><option>Banho + Tosa</option></select>`;
            } else if(t === 'basico') {
                b.innerHTML = `<p class="font-bold text-red-600 uppercase">Básico:</p><p class="text-xs">• 1 Banho e 1 Banho + Tosa Higiênica</p>`;
            } else if(t === 'basico_tosa') {
                b.innerHTML = `<p class="font-bold text-red-600 uppercase">Básico com Tosa:</p><p class="text-xs">• 1 Banho e 1 Banho + Tosa</p>`;
            } else {
                b.innerHTML = `<p class="font-bold text-red-600 uppercase">Premium:</p><p class="text-xs">• 3 Banhos e 1 Banho + Tosa Higiênica (Opcional: 5 semanas e 1 banho)</p>`;
            }
        }

        function renderDatas() {
            const t = document.getElementById('tipo').value;
            const container = document.getElementById('datasContainer');
            container.innerHTML = '';
            let loop = t === 'premium' ? 4 : (t.includes('basico') ? 2 : 1);
            for(let i=1; i<=loop; i++) {
                container.innerHTML += `<div class="mb-6 p-4 border-b"><label class="label-req">Data ${i}:</label><input type="date" onchange="carregaHorarios(this)"><label class="label-req">Horário Disponível:</label><select class="h-select"><option>Escolha o dia acima</option></select></div>`;
            }
        }

        function carregaHorarios(el) {
            const d = new Date(el.value + 'T00:00:00');
            const hj = new Date();
            const combo = el.nextElementSibling.nextElementSibling;
            combo.innerHTML = '';
            if(d.getMonth() > hj.getMonth() && hj.getDate() < 20) { alert("Agenda do mês seguinte só abre no dia 20!"); el.value = ""; return; }
            const dia = d.getDay();
            let h = [];
            if(dia >= 3 && dia <= 6) { // Qua-Sab
                h = ["09:00 - 3 Banhos/Higiênica e 1 Tosa", "10:00 - 3 Banhos/Higiênica e 1 Pet Grande Curto", "11:00 - 3 Banhos/Higiênica e 1 Tosa", "13:30 - 4 Banhos/Higiênica", "14:30 - 3 Banhos/Higiênica e 1 Tosa", "15:30 - 3 Banhos/Higiênica e 1 Pet Grande Peludo", "16:00 - 3 Banhos/Higiênica e 1 Gato"];
            } else if(dia === 0) { // Dom
                h = ["09:00 - 3 Banhos/Higiênica e 1 Tosa", "10:00 - 3 Banhos/Higiênica e 1 Pet Grande Curto", "11:00 - 3 Banhos/Higiênica e 1 Tosa", "12:00 - 3 Banhos/Higiênica e 1 Pet Grande Peludo"];
            } else { alert("Fechado! Atendemos de Qua a Dom."); el.value = ""; return; }
            h.forEach(t => { let o = document.createElement('option'); o.text = t; combo.add(o); });
        }

        function finish() {
            alert("AGENDAMENTO CONFIRMADO!\n\nLogo mais nossa equipe entrará em contato para passar valores.\n\nDE IMEDIATO ENVIE UMA FOTO DO PET PARA ACELERAR O PROCESSO.");
        }
    </script>
</body>
</html>
