<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Nilo Pet - Agendamento Oficial</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background-color: #f0f9ff; font-family: sans-serif; color: #1e293b; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin: 15px; padding: 25px; border: 1px solid #e2e8f0; }
        input, select, textarea { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #e2e8f0; margin-bottom: 12px; font-size: 16px; color: black; }
        .btn-next { background-color: #dc2626; color: white; width: 100%; padding: 18px; border-radius: 12px; font-weight: 800; font-size: 18px; border: none; cursor: pointer; }
        .btn-cancel { background-color: #64748b; color: white; width: 100%; padding: 12px; border-radius: 10px; font-weight: 700; margin-top: 10px; cursor: pointer; text-align: center; display: block; }
        .step-content { display: none; }
        .step-content.active { display: block; }
        .pet-box { border: 2px solid #e2e8f0; padding: 15px; border-radius: 15px; margin-bottom: 15px; background: #f8fafc; }
        .label-req { display: block; font-size: 10px; margin-bottom: 4px; text-transform: uppercase; font-weight: 900; }
        .hidden { display: none; }
        .badge-regra { background: #fee2e2; color: #991b1b; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

    <div class="bg-white p-6 text-center border-b shadow-sm">
        <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter italic">Nilo Pet</h1>
        <p class="text-red-600 font-bold text-xs uppercase">Banho e Tosa</p>
    </div>

    <form id="niloForm">
        <!-- ETAPA 1: CLIENTE -->
        <div id="step1" class="step-content active">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline text-sm">Etapa 1: Identificação</h2>
                <label class="label-req">Nome do Cliente *</label>
                <input type="text" id="nomeCliente" required placeholder="Nome completo">
                
                <label class="label-req">WhatsApp (11 dígitos) *</label>
                <input type="tel" id="whatsapp" required placeholder="11999998888" maxlength="11">

                <label class="label-req">Endereço (Apenas Sol Nascente) *</label>
                <div class="flex gap-2">
                    <input type="text" id="rua" required placeholder="Rua e Número" class="flex-grow">
                    <input type="text" value="Sol Nascente" readonly class="w-32 bg-slate-100 font-bold text-slate-500 text-center border-none text-xs">
                </div>
                <button type="button" onclick="validaPasso1()" class="btn-next mt-4">PRÓXIMO</button>
                <button type="button" onclick="surpresaCancelar()" class="btn-cancel">CANCELAR</button>
            </div>
        </div>

        <!-- ETAPA 2: PETS -->
        <div id="step2" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline text-sm">Etapa 2: Seus Pets</h2>
                <label class="label-req">Quantos pets hoje? (Max 4)</label>
                <select id="qtdPets" onchange="renderPets()">
                    <option value="1">1 Pet</option><option value="2">2 Pets</option>
                    <option value="3">3 Pets</option><option value="4">4 Pets</option>
                </select>
                <div id="petsContainer"></div>
                <button type="button" onclick="next(3)" class="btn-next">PRÓXIMO</button>
                <button type="button" onclick="next(1)" class="btn-cancel bg-slate-400">VOLTAR</button>
            </div>
        </div>

        <!-- ETAPA 3: SERVIÇOS -->
        <div id="step3" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline text-sm">Etapa 3: Plano de Cuidados</h2>
                <label class="label-req">Tipo de Agendamento:</label>
                <select id="tipoPlano" onchange="renderServicos()">
                    <option value="avulso">AVULSO</option>
                    <option value="basico">PACOTE BÁSICO</option>
                    <option value="basico_tosa">BÁSICO COM TOSA</option>
                    <option value="premium">PACOTE PREMIUM</option>
                </select>
                <div id="boxServico"></div>
                <button type="button" onclick="next(4)" class="btn-next">ESCOLHER HORÁRIOS</button>
                <button type="button" onclick="next(2)" class="btn-cancel bg-slate-400">VOLTAR</button>
            </div>
        </div>

        <!-- ETAPA 4: HORÁRIOS -->
        <div id="step4" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline text-sm">Etapa 4: Datas e Horários</h2>
                <div id="datasContainer"></div>
                <button type="button" onclick="finish()" class="btn-next mt-6">FINALIZAR AGENDAMENTO ✅</button>
                <button type="button" onclick="surpresaCancelar()" class="btn-cancel">CANCELAR AGENDAMENTO</button>
            </div>
        </div>
    </form>

    <script>
        function next(n) {
            document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
            document.getElementById('step'+n).classList.add('active');
            if(n===2) renderPets();
            if(n===3) renderServicos();
            if(n===4) renderDatas();
            window.scrollTo(0,0);
        }

        function validaPasso1() {
            if(document.getElementById('whatsapp').value.length !== 11 || !document.getElementById('nomeCliente').value) {
                return alert("Nome e WhatsApp (11 dígitos) obrigatórios!");
            }
            next(2);
        }

        function renderPets() {
            const qtd = document.getElementById('qtdPets').value;
            const container = document.getElementById('petsContainer');
            container.innerHTML = '';
            for(let i=1; i<=qtd; i++) {
                container.innerHTML += `
                <div class="pet-box">
                    <p class="text-xs font-black text-red-600 mb-2 uppercase italic">Pet #${i}</p>
                    <label class="label-req">Espécie</label>
                    <select class="especie-select" onchange="checkGato(this)">
                        <option value="Cachorro">Cachorro</option><option value="Gato">Gato</option>
                    </select>
                    <label class="label-req">Nome do Pet *</label>
                    <input type="text" class="pet-nome" required placeholder="Ex: Bob">
                    <div class="porte-area">
                        <label class="label-req">Porte</label>
                        <select class="pet-porte">
                            <option value="pequeno">Pequeno</option><option value="medio">Médio</option>
                            <option value="g_curto">Grande Pelo Curto</option><option value="g_peludo">Grande Peludo</option>
                        </select>
                    </div>
                    <label class="label-req">Possui Alergia?</label>
                    <select onchange="this.nextElementSibling.classList.toggle('hidden', this.value==='Não')">
                        <option>Não</option><option>Sim</option>
                    </select>
                    <textarea class="hidden mt-2 h-20" placeholder="Observações de alergia..."></textarea>
                </div>`;
            }
        }

        function checkGato(el) {
            const porte = el.parentElement.querySelector('.porte-area');
            el.value === 'Gato' ? porte.classList.add('hidden') : porte.classList.remove('hidden');
        }

        function renderServicos() {
            const t = document.getElementById('tipoPlano').value;
            const b = document.getElementById('boxServico');
            if(t === 'avulso') {
                b.innerHTML = `<label class="label-req">Escolha o serviço:</label>
                <select id="servicoFinal"><option>Banho</option><option>Banho + Tosa Higiênica</option><option>Banho + Tosa</option></select>`;
            } else {
                let desc = {
                    'basico': '1 Banho + 1 Banho com Tosa Higiênica',
                    'basico_tosa': '1 Banho + 1 Banho com Tosa Geral',
                    'premium': '3 Banhos + 1 Banho com Tosa Higiênica'
                };
                b.innerHTML = `<div class="p-3 bg-red-100 rounded-lg font-bold text-red-700 text-xs uppercase italic border-2 border-red-200">${desc[t]}</div>`;
            }
        }

        function renderDatas() {
            const t = document.getElementById('tipoPlano').value;
            const container = document.getElementById('datasContainer');
            const num = (t === 'avulso') ? 1 : (t === 'premium' ? 4 : 2);
            container.innerHTML = '';
            for(let i=1; i<=num; i++) {
                container.innerHTML += `
                <div class="mb-6 p-4 border-2 border-red-50 rounded-xl bg-white shadow-sm">
                    <p class="badge-regra italic">AGENDAMENTO ${i}</p>
                    <label class="label-req">Escolha a Data</label>
                    <input type="date" class="data-input" onchange="atualizarHorarios(this, ${i})">
                    <div class="horarios-list grid grid-cols-2 gap-2"></div>
                </div>`;
            }
        }

        function atualizarHorarios(input, index) {
            const data = new Date(input.value + 'T00:00:00');
            const diaSemana = data.getDay();
            const lista = input.nextElementSibling;
            lista.innerHTML = '';

            let horarios = (diaSemana >= 3 && diaSemana <= 6) ? ["09:00", "10:00", "11:00", "13:30", "14:30", "15:30", "16:00"] : (diaSemana === 0 ? ["09:00", "10:00", "11:00", "12:00"] : []);

            if(horarios.length === 0) return lista.innerHTML = '<p class="text-red-500 font-bold text-[10px] col-span-2">FECHADO (Atendemos Qua a Sáb e Dom)</p>';

            horarios.forEach(h => {
                let info = getRegraTexto(diaSemana, h);
                lista.innerHTML += `
                    <label class="flex flex-col p-2 border rounded cursor-pointer hover:bg-red-50">
                        <input type="radio" name="h_${index}" value="${h}" required>
                        <span class="font-bold text-sm text-center">${h}</span>
                        <span class="text-[7px] leading-tight text-gray-500 text-center uppercase font-black">${info}</span>
                    </label>`;
            });
        }

        function getRegraTexto(dia, hora) {
            if(dia === 0) { // Dom
                if(hora === "09:00" || hora === "11:00") return "3 Banhos/TH + 1 Tosa";
                if(hora === "10:00") return "3 Banhos/TH + 1 Grande Curto";
                if(hora === "12:00") return "3 Banhos/TH + 1 Grande Peludo";
            } else { // Qua a Sáb
                if(["09:00", "11:00", "14:30"].includes(hora)) return "3 Banhos/TH + 1 Tosa";
                if(hora === "10:00") return "3 Banhos/TH + 1 Grande Curto";
                if(hora === "13:30") return "4 Banhos ou TH";
                if(hora === "15:30") return "3 Banhos/TH + 1 Grande Peludo";
                if(hora === "16:00") return "3 Banhos/TH + 1 Gato";
            }
            return "";
        }

        function surpresaCancelar() {
            const t = document.getElementById('tipoPlano').value;
            const nome = document.getElementById('nomeCliente').value || "[Nome]";
            const pets = Array.from(document.querySelectorAll('.pet-nome')).map(p => p.value).join(", ") || "[Pet]";
            const dataInput = document.querySelector('.data-input')?.value || "[Data]";
            const horaInput = document.querySelector('input[type="radio"]:checked')?.value || "[Hora]";

            if (t === 'avulso') {
                if(confirm("CANCELAMENTO AVULSO\n\nData: "+dataInput+"\nCliente: "+nome+"\nPet: "+pets+"\nHorário: "+horaInput+"\n\nDeseja realmente cancelar este serviço avulso?")) {
                    document.getElementById('niloForm').reset();
                    next(1);
                }
            } else {
                if(confirm("CANCELAMENTO DE PACOTE\n\nAo cancelar esta data você irá cancelar todo seu pacote. Se for a troca de data fale com os atendentes para seguir com os demais agendamentos do pacote.\n\nDeseja cancelar?")) {
                    document.getElementById('niloForm').reset();
                    next(1);
                }
            }
        }

        function finish() {
            const nome = document.getElementById('nomeCliente').value;
            alert("AGENDAMENTO CONFIRMADO!\n\n" + nome + ", logo mais nossa equipe entrará em contato para passar valores. De imediato envie uma foto do pet para acelerar o processo.");
        }
    </script>
</body>
</html>
