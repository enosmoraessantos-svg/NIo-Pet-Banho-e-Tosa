<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nilo Pet - Agendamento Passo a Passo</title>
    <style>
        body { 
            background: linear-gradient(135deg, #e0f2ff 0%, #b3d9ff 100%);
            color: #d90000; font-family: 'Arial Black', sans-serif; padding: 20px; min-height: 100vh;
        }
        .container {
            border: 4px solid #000; padding: 30px; max-width: 500px; margin: auto;
            background: white; border-radius: 20px; box-shadow: 10px 10px 0px #000;
        }
        .passo { display: none; } /* Esconde os passos por padrão */
        .passo.ativo { display: block; } /* Mostra apenas o passo atual */
        
        .progresso { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .ponto { width: 20px; height: 20px; border: 2px solid black; border-radius: 50%; background: #ccc; }
        .ponto.completo { background: #d90000; }

        input, select, textarea {
            width: 100%; border: 2px solid #000; padding: 12px; color: #d90000;
            font-weight: bold; border-radius: 10px; margin-top: 10px; box-sizing: border-box;
        }
        button {
            background: #000; color: #d90000; border: none; padding: 15px;
            width: 100%; cursor: pointer; font-weight: bold; border-radius: 10px; margin-top: 15px;
        }
        .btn-voltar { background: #ccc; color: #000; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; font-size: 20px;">🐾 NILO PET 🐾</h1>
    
    <!-- Indicador de progresso -->
    <div class="progresso">
        <div class="ponto completo" id="p1"></div>
        <div class="ponto" id="p2"></div>
        <div class="ponto" id="p3"></div>
        <div class="ponto" id="p4"></div>
    </div>

    <!-- PASSO 1: QUEM É VOCÊ? -->
    <div class="passo ativo" id="step1">
        <label>NOME COMPLETO:</label>
        <input type="text" id="nome" placeholder="Seu nome">
        <label>WHATSAPP (11 DÍGITOS):</label>
        <input type="tel" id="zap" placeholder="11999999999">
        <button onclick="mudarPasso(2)">PRÓXIMO 🐾</button>
    </div>

    <!-- PASSO 2: SOBRE O PET -->
    <div class="passo" id="step2">
        <label>QUANTOS PETS? (MÁX 4)</label>
        <input type="number" id="qtd" value="1" min="1" max="4">
        <label>ESPÉCIE E PORTE:</label>
        <select>
            <option>Cachorro Pequeno</option>
            <option>Cachorro Médio</option>
            <option>Grande Pelo Curto</option>
            <option>Grande Peludo</option>
            <option>Gato (Só banho)</option>
        </select>
        <button onclick="mudarPasso(3)">PRÓXIMO 🐾</button>
        <button class="btn-voltar" onclick="mudarPasso(1)">VOLTAR</button>
    </div>

    <!-- PASSO 3: SERVIÇO -->
    <div class="passo" id="step3">
        <label>TIPO DE SERVIÇO:</label>
        <select id="servico">
            <option>Avulso (Escolha na hora)</option>
            <option>Básico (Banho + Higiênica)</option>
            <option>Básico com Tosa</option>
            <option>Premium (3 Banhos + 1 Higiênica)</option>
        </select>
        <button onclick="mudarPasso(4)">PRÓXIMO 🐾</button>
        <button class="btn-voltar" onclick="mudarPasso(2)">VOLTAR</button>
    </div>

    <!-- PASSO 4: DATA E FINALIZAR -->
    <div class="passo" id="step4">
        <label>ESCOLHA O DIA:</label>
        <input type="date" id="data">
        <label>HORÁRIO DISPONÍVEL:</label>
        <select id="hora">
            <option>09:00</option>
            <option>10:00</option>
            <option>11:00</option>
            <option>13:30</option>
            <option>14:30</option>
            <option>15:30</option>
        </select>
        <button style="background: #d90000; color: white;" onclick="finalizar()">FINALIZAR AGENDAMENTO ✅</button>
        <button class="btn-voltar" onclick="mudarPasso(3)">VOLTAR</button>
    </div>
</div>

<script>
    function mudarPasso(n) {
        // Esconde todos os passos
        document.querySelectorAll('.passo').forEach(p => p.classList.remove('ativo'));
        // Mostra o passo atual
        document.getElementById('step' + n).classList.add('ativo');
        // Atualiza as bolinhas de progresso
        for(let i=1; i<=4; i++) {
            document.getElementById('p'+i).classList.toggle('completo', i <= n);
        }
    }

    function finalizar() {
        alert("✅ Agendamento confirmado! Logo mais nossa equipe entrará em contato para passar valores. De imediato envie uma foto do pet para acelerar o processo.");
        window.open("https://wa.me, finalizei meu agendamento no Nilo Pet!");
    }
</script>

</body>
</html>
