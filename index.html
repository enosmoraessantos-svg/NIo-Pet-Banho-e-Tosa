<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Nilo Pet - Agendamento Oficial</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background-color: #f0f9ff; font-family: sans-serif; color: #1e293b; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin: 15px; padding: 25px; border: 1px solid #e2e8f0; }
        input, select, textarea { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #e2e8f0; margin-bottom: 12px; font-size: 16px; color: black; }
        .btn-next { background-color: #dc2626; color: white; width: 100%; padding: 18px; border-radius: 12px; font-weight: 800; font-size: 18px; border: none; cursor: pointer; }
        .btn-back-large { background-color: #64748b; color: white; width: 100%; padding: 18px; border-radius: 12px; font-weight: 800; font-size: 18px; border: none; cursor: pointer; margin-top: 10px; }
        .btn-cancel-final { background-color: #ef4444; color: white; width: 100%; padding: 15px; border-radius: 12px; font-weight: 800; margin-top: 10px; cursor: pointer; }
        .step-content { display: none; }
        .step-content.active { display: block; }
        .pet-box { border: 2px solid #e2e8f0; padding: 15px; border-radius: 15px; margin-bottom: 15px; background: #f8fafc; }
        .label-req { display: block; font-size: 10px; margin-bottom: 4px; text-transform: uppercase; font-weight: 900; }
        .hidden { display: none; }
        .info-bloqueada { background: #f1f5f9; padding: 10px; border-radius: 8px; border-left: 4px solid #dc2626; font-size: 12px; margin-bottom: 10px; color: #475569; }
    </style>
</head>
<body>

    <div class="bg-white p-6 text-center border-b shadow-sm">
        <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter italic">Nilo Pet</h1>
        <p class="text-red-600 font-bold text-xs uppercase">Banho e Tosa</p>
    </div>

    <form id="niloForm">
        <!-- ETAPA 1 -->
        <div id="step1" class="step-content active">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline text-sm">Etapa 1: O que deseja fazer?</h2>
                <select id="acaoInicial" onchange="toggleAcao()">
                    <option value="">Selecione...</option>
                    <option value="agendar">NOVO AGENDAMENTO</option>
                    <option value="cancelar_avulso">CANCELAR SERVIÇO AVULSO</option>
                    <option value="cancelar_pacote">CANCELAR PACOTE</option>
                </select>

                <div id="camposAgendar" class="hidden">
                    <label class="label-req">Nome do Cliente *</label>
                    <input type="text" id="nomeCliente" placeholder="Nome completo">
                    <label class="label-req">WhatsApp (11 dígitos) *</label>
                    <input type="tel" id="whatsapp" placeholder="11999998888" maxlength="11">
                    <label class="label-req">Endereço (Rua e Número) *</label>
                    <div class="flex gap-2">
                        <input type="text" id="rua" placeholder="Ex: Rua das Flores, 123" class="flex-grow">
                        <input type="text" value="Sol Nascente" readonly class="w-32 bg-slate-100 font-bold text-slate-500 text-center border-none text-[10px] mb-3">
                    </div>
                    <button type="button" onclick="validaPasso1()" class="btn-next mt-4">PRÓXIMO</button>
                </div>

                <div id="camposCancelAvulso" class="hidden">
                    <label class="label-req">Data Agendada *</label><input type="date" id="cancelData">
                    <label class="label-req">Nome do Cliente *</label><input type="text" id="cancelNome">
                    <label class="label-req">Nome do Pet *</label><input type="text" id="cancelPet">
                    <button type="button" onclick="msgCancel('avulso')" class="btn-cancel-final">CANCELAR AGENDAMENTO</button>
                </div>

                <div id="camposCancelPacote" class="hidden">
                    <label class="label-req">Nome do Cliente *</label><input type="text" id="cancelPacoteNome">
                    <label class="label-req">Nome do Pet *</label><input type="text" id="cancelPetPacote">
                    <label class="label-req">Tipo de Pacote *</label>
                    <select id="tipoPacoteCancel">
                        <option value="basico">Básico</option>
                        <option value="basico_tosa">Básico com Tosa</option>
                        <option value="premium">Premium</option>
                    </select>
                    <button type="button" onclick="msgCancel('pacote')" class="btn-cancel-final">CANCELAR PACOTE COMPLETO</button>
                </div>
            </div>
        </div>

        <!-- ETAPA 2 -->
        <div id="step2" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline text-sm">Etapa 2: Dados do Pet</h2>
                <label class="label-req">Quantos pets deseja agendar?</label>
                <select id="qtdPets" onchange="renderPets()">
                    <option value="1">1 Pet</option><option value="2">2 Pets</option>
                    <option value="3">3 Pets</option><option value="4">4 Pets</option>
                </select>
                <div id="petsContainer"></div>
                <button type="button" onclick="next(3)" class="btn-next">PRÓXIMO</button>
                <button type="button" onclick="next(1)" class="btn-back-large">VOLTAR</button>
            </div>
        </div>

        <!-- ETAPA 3 -->
        <div id="step3" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline text-sm">Etapa 3: Serviços e Pacotes</h2>
                <label class="label-req">Escolha o Plano</label>
                <select id="tipoPlano" onchange="atualizaInfoServico()">
                    <option value="avulso">AVULSO (Cliente escolhe o serviço)</option>
                    <option value="basico">PACOTE BÁSICO</option>
                    <option value="basico_tosa">PACOTE BÁSICO COM TOSA</option>
                    <option value="premium">PACOTE PREMIUM</option>
                </select>

                <div id="areaAvulso">
                    <label class="label-req">Selecione o Serviço *</label>
                    <select id="servicoAvulso">
                        <option value="banho">BANHO</option>
                        <option value="banho_tosa_higienica">BANHO + TOSA HIGIÊNICA</option>
                        <option value="banho_tosa">BANHO + TOSA</option>
                    </select>
                </div>

                <div id="areaPacote" class="hidden">
                    <label class="label-req">Regras do Pacote (Não editável)</label>
                    <div id="infoTextoPacote" class="info-bloqueada"></div>
                </div>

                <button type="button" onclick="next(4)" class="btn-next mt-4">PRÓXIMO</button>
                <button type="button" onclick="next(2)" class="btn-back-large">VOLTAR</button>
            </div>
        </div>

        <!-- ETAPA 4 -->
        <div id="step4" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline text-sm">Etapa 4: Horários</h2>
                <label class="label-req">Data *</label>
                <input type="date" id="dataAgendamento" onchange="filtraHorarios()">
                <label class="label-req">Horários Disponíveis *</label>
                <select id="horarioAgendamento"></select>
                <button type="button" onclick="finalizar()" class="btn-next mt-4">CONFIRMAR ✅</button>
                <button type="button" onclick="next(3)" class="btn-back-large">VOLTAR</button>
            </div>
        </div>
    </form>

    <script>
        function toggleAcao() {
            const acao = document.getElementById('acaoInicial').value;
            document.getElementById('camposAgendar').classList.toggle('hidden', acao !== 'agendar');
            document.getElementById('camposCancelAvulso').classList.toggle('hidden', acao !== 'cancelar_avulso');
            document.getElementById('camposCancelPacote').classList.toggle('hidden', acao !== 'cancelar_pacote');
        }

        function next(n) {
            document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
            document.getElementById('step'+n).classList.add('active');
            if(n===2 && !document.getElementById('petsContainer').innerHTML) renderPets();
            if(n===4) configCalendario();
            window.scrollTo(0,0);
        }

        function renderPets() {
            const qtd = document.getElementById('qtdPets').value;
            const container = document.getElementById('petsContainer');
            container.innerHTML = '';
            for(let i=1; i<=qtd; i++) {
                container.innerHTML += `
                    <div class="pet-box">
                        <p class="font-bold text-red-600 text-xs mb-2">PET #${i}</p>
                        <select id="especie${i}" onchange="togglePorte(${i})"><option value="cachorro">Cachorro</option><option value="gato">Gato</option></select>
                        <input type="text" id="nomePet${i}" placeholder="Nome do Pet *">
                        <div id="divPorte${i}">
                            <select id="porte${i}">
                                <option value="pequeno">Pequeno</option><option value="medio">Médio</option>
                                <option value="grande_curto">Grande pelo curto</option><option value="grande_peludo">Grande peludo</option>
                            </select>
                        </div>
                        <select id="alergia${i}"><option value="nao">Não possui alergia</option><option value="sim">Possui Alergia</option></select>
                        <textarea id="obs${i}" placeholder="Observação de alergia..."></textarea>
                    </div>`;
            }
        }

        function togglePorte(i) { document.getElementById('divPorte'+i).classList.toggle('hidden', document.getElementById('especie'+i).value === 'gato'); }

        function atualizaInfoServico() {
            const plano = document.getElementById('tipoPlano').value;
            const areaAvulso = document.getElementById('areaAvulso');
            const areaPacote = document.getElementById('areaPacote');
            const info = document.getElementById('infoTextoPacote');

            if(plano === 'avulso') {
                areaAvulso.classList.remove('hidden'); areaPacote.classList.add('hidden');
            } else {
                areaAvulso.classList.add('hidden'); areaPacote.classList.remove('hidden');
                if(plano === 'basico') info.innerHTML = "<b>Semana 1:</b> Banho<br><b>Semana 2:</b> Banho + Tosa Higiênica";
                if(plano === 'basico_tosa') info.innerHTML = "<b>Semana 1:</b> Banho<br><b>Semana 2:</b> Banho + Tosa";
                if(plano === 'premium') info.innerHTML = "<b>Semana 1 a 3:</b> Banhos<br><b>Semana 4:</b> Banho + Tosa Higiênica<br><b>Semana 5:</b> Banho (Opcional)";
            }
        }

        function configCalendario() {
            const input = document.getElementById('dataAgendamento');
            const hoje = new Date();
            input.min = hoje.toISOString().split('T')[0];
            let dataMax = new Date(hoje.getFullYear(), hoje.getMonth() + (hoje.getDate() >= 20 ? 2 : 1), 0);
            input.max = dataMax.toISOString().split('T')[0];
        }

        function filtraHorarios() {
            const data = new Date(document.getElementById('dataAgendamento').value);
            const dia = data.getUTCDay(); // 0 Dom, 3 Qua, 4 Qui, 5 Sex, 6 Sab
            const select = document.getElementById('horarioAgendamento');
            select.innerHTML = '';
            
            const hComum = ["09:00", "10:00", "11:00", "13:30", "14:30", "15:30", "16:00"];
            const hDom = ["09:00", "10:00", "11:00", "12:00"];

            if(dia < 3 && dia !== 0) { alert("Funcionamento: Quarta a Domingo"); return; }
            
            const lista = (dia === 0) ? hDom : hComum;
            lista.forEach(h => {
                let opt = document.createElement('option');
                opt.value = h; opt.text = h; select.add(opt);
            });
        }

        function msgCancel(t) {
            alert(t === 'avulso' ? "Seu agendamento foi cancelado caso precise agendar novamente é só fazer seu agendamento." : "cancelando uma data do pacote o seu pacote será cancelado por completo e vc terá que refazer todo o seu agendamento, entre em contato com nossos atendentes para mudar sua data pelo WhatsApp.");
            location.reload();
        }

        function finalizar() {
            alert("agendamento confirmado logo mais nossa equipe entrar em contato para passar valores de imediato envie um foto do pet para acelerar o processo.");
            location.reload();
        }

        function validaPasso1() {
            if(!document.getElementById('nomeCliente').value || document.getElementById('whatsapp').value.length < 11) {
                alert("Nome e WhatsApp (11 dígitos) obrigatórios!");
                return;
            }
            next(2);
        }
    </script>
</body>
</html>
