<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nilo Pet - Agendamento</title>
    <style>
        body { 
            background-color: #e0f2ff; /* Azul bem claro */
            color: #ff0000; /* Vermelho */
            font-family: 'Arial Black', sans-serif;
            padding: 20px;
        }
        .container {
            border: 4px solid #000000; /* Borda preta */
            padding: 20px;
            max-width: 600px;
            margin: auto;
            background-color: #e0f2ff;
        }
        h1 { text-align: center; border-bottom: 3px solid black; padding-bottom: 10px; }
        input, select, textarea {
            width: 100%;
            margin: 10px 0;
            border: 2px solid #000000;
            padding: 10px;
            color: #ff0000;
            background: white;
            font-weight: bold;
            box-sizing: border-box;
        }
        label { display: block; margin-top: 15px; text-transform: uppercase; font-size: 14px; }
        button {
            background-color: #000000;
            color: #ff0000;
            border: none;
            padding: 15px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2em;
            margin-top: 20px;
        }
        .cancel-btn { background-color: #ff0000; color: white; margin-top: 10px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h1>NILO PET BANHO E TOSA</h1>
    
    <label>Nome do Cliente*</label>
    <input type="text" id="nome" placeholder="Seu nome completo" required>

    <label>WhatsApp (11 dígitos)*</label>
    <input type="tel" id="zap" placeholder="11999999999" maxlength="11" required>

    <label>Endereço (Bairro Sol Nascente)*</label>
    <input type="text" value="Sol Nascente" readonly>
    <input type="text" id="rua" placeholder="Rua e número" required>

    <label>Serviço ou Pacote</label>
    <select id="pacote">
        <option value="avulso">Avulso</option>
        <option value="basico">Básico (1 Banho + 1 Tosa Higiênica)</option>
        <option value="basico_tosa">Básico com Tosa (1 Banho + 1 Tosa)</option>
        <option value="premium">Premium (3 Banhos + 1 Tosa Higiênica)</option>
    </select>

    <label>Quantidade de Pets (Máx 4)</label>
    <input type="number" id="qtd" min="1" max="4" value="1">

    <label>Espécie e Porte</label>
    <select id="especie">
        <option>Cachorro - Pequeno</option>
        <option>Cachorro - Médio</option>
        <option>Cachorro - Grande Pelo Curto</option>
        <option>Cachorro - Grande Peludo</option>
        <option>Gato - Só Banho</option>
    </select>

    <label>Alergias / Observações</label>
    <textarea id="obs" rows="2" placeholder="Possui alergia? Algum cuidado especial?"></textarea>

    <label>Escolha o Dia e Horário</label>
    <input type="date" id="data">
    <select id="hora">
        <option>09:00</option>
        <option>10:00</option>
        <option>11:00</option>
        <option>12:00 (Apenas Domingo)</option>
        <option>13:30</option>
        <option>14:30</option>
        <option>15:30</option>
        <option>16:00</option>
    </select>

    <button onclick="enviarAgendamento()">CONFIRMAR AGENDAMENTO</button>
    <button class="cancel-btn" onclick="cancelar()">CANCELAR SERVIÇO</button>
</div>

<script>
    function enviarAgendamento() {
        alert("Agendamento confirmado! Logo mais nossa equipe entrará em contato para passar valores. De imediato envie uma foto do pet para acelerar o processo.");
        window.open("https://wa.me! Fiz um agendamento para o Nilo Pet.");
    }

    function cancelar() {
        const surpresa = confirm("Que pena! Se você reagendar agora para a próxima semana, garantimos um mimo para seu pet! Deseja falar com a gente?");
        if(surpresa) window.open("https://wa.me de cancelar/reagendar meu serviço.");
    }
</script>
</body>
</html>
