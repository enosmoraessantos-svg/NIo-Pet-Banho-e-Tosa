<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Nilo Pet - Agendamento Oficial</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { background-color: #f0f9ff; font-family: sans-serif; color: #1e293b; }
        .step-circle { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #cbd5e1; display: flex; align-items: center; justify-content: center; font-weight: bold; background: white; color: #64748b; }
        .step-circle.active { background-color: #dc2626; color: white; border-color: #dc2626; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin: 15px; padding: 25px; border: 1px solid #e2e8f0; }
        input, select { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #e2e8f0; margin-bottom: 15px; font-size: 16px; }
        input:focus { border-color: #dc2626; outline: none; }
        .btn-next { background-color: #dc2626; color: white; width: 100%; padding: 18px; border-radius: 12px; font-weight: 800; font-size: 18px; border: none; }
        .btn-cancel { background-color: #64748b; color: white; width: 100%; padding: 12px; border-radius: 10px; font-weight: 700; margin-top: 10px; }
        .step-content { display: none; }
        .step-content.active { display: block; }
    </style>
</head>
<body>

    <div class="bg-white p-6 text-center border-b shadow-sm">
        <i class="fas fa-paw text-red-600 text-3xl mb-2"></i>
        <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Nilo Pet</h1>
        <p class="text-red-600 font-bold text-sm">Banho e Tosa</p>
    </div>

    <!-- Barra de Progresso -->
    <div class="flex justify-center items-center gap-4 my-6">
        <div class="step-circle active" id="c1">1</div><div class="h-1 w-8 bg-slate-200"></div>
        <div class="step-circle" id="c2">2</div><div class="h-1 w-8 bg-slate-200"></div>
        <div class="step-circle" id="c3">3</div><div class="h-1 w-8 bg-slate-200"></div>
        <div class="step-circle" id="c4">4</div>
    </div>

    <form id="niloForm">
        <!-- ETAPA 1: CLIENTE -->
        <div id="step1" class="step-content active">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase">Etapa 1: Dados do Cliente</h2>
                <label class="block text-xs font-black mb-1">NOME DO CLIENTE (OBRIGATÓRIO)</label>
                <input type="text" id="nome" required placeholder="Nome completo">
                
                <label class="block text-xs font-black mb-1">WHATSAPP (11 DÍGITOS EXATOS)</label>
                <input type="tel" id="whatsapp" required placeholder="11900000000" maxlength="11" oninput="this.value = this.value.replace(/[^0-9]/g, '')">

                <label class="block text-xs font-black mb-1 text-red-600">ENDEREÇO COMPLETO (SOL NASCENTE)</label>
                <div class="flex gap-2">
                    <input type="text" id="rua" required placeholder="Rua e Número" class="flex-grow">
                    <input type="text" value="Sol Nascente" readonly class="w-32 bg-slate-100 text-slate-500 font-bold">
                </div>

                <button type="button" onclick="validaPasso1()" class="btn-next">PRÓXIMO</button>
                <button type="button" class="btn-cancel">CANCELAR SERVIÇO</button>
            </div>
        </div>

        <!-- ETAPA 2: PETS -->
        <div id="step2" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase">Etapa 2: Dados do Pet</h2>
                <label class="block text-xs font-black mb-1">QUANTIDADE DE PETS (MÁX 4)</label>
                <select id="qtd" onchange="renderPets()">
                    <option value="1">1 Pet</option><option value="2">2 Pets</option>
                    <option value="3">3 Pets</option><option value="4">4 Pets</option>
                </select>

                <div id="petsContainer">
                    <div class="p-4 border rounded-xl mb-4 bg-slate-50">
                        <label class="block text-xs font-black mb-1">ESPÉCIE</label>
                        <select onchange="togglePorte(this)">
                            <option value="Cachorro">Cachorro</option>
                            <option value="Gato">Gato</option>
                        </select>
                        <label class="block text-xs font-black mb-1">NOME DO PET (OBRIGATÓRIO)</label>
                        <input type="text" required>
                        <div class="porte-div">
                            <label class="block text-xs font-black mb-1">PORTE</label>
                            <select>
                                <option>Pequeno</option><option>Médio</option>
                                <option>Grande Pelo Curto</option><option>Grande Peludo</option>
                            </select>
                        </div>
                        <label class="block text-xs font-black mb-1">ALERGIA?</label>
                        <select onchange="this.nextElementSibling.classList.toggle('hidden', this.value === 'Não')">
                            <option>Não</option><option>Sim</option>
                        </select>
                        <input type="text" class="hidden mt-2" placeholder="Qual alergia?">
                    </div>
                </div>

                <button type="button" onclick="next(3)" class="btn-next">PRÓXIMO</button>
                <button type="button" onclick="next(1)" class="btn-cancel bg-slate-400">VOLTAR</button>
            </div>
        </div>

        <!-- ETAPA 3: SERVIÇOS -->
        <div id="step3" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase">Etapa 3: Serviços e Pacotes</h2>
                <label class="block text-xs font-black mb-1">TIPO DE AGENDAMENTO</label>
                <select id="tipo" onchange="renderServicos()">
                    <option value="avulso">AVULSO</option>
                    <option value="basico">BÁSICO</option>
                    <option value="basico_tosa">BÁSICO COM TOSA</option>
                    <option value="premium">PREMIUM</option>
                </select>

                <div id="boxServico" class="p-4 border-2 border-red-100 rounded-xl bg-red-50 text-sm mb-6">
                    <label class="block text-xs font-black mb-2">ESCOLHA O SERVIÇO AVULSO:</label>
                    <select>
                        <option>Banho</option>
                        <option>Banho + Tosa Higiênica</option>
                        <option>Banho + Tosa</option>
                    </select>
                </div>

                <button type="button" onclick="next(4)" class="btn-next">ESCOLHER HORÁRIO</button>
                <button type="button" onclick="next(2)" class="btn-cancel bg-slate-400">VOLTAR</button>
                <button type="button" class="btn-cancel mt-4">CANCELAR PACOTE</button>
            </div>
        </div>

        <!-- ETAPA 4: HORÁRIOS -->
        <div id="step4" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase">Etapa 4: Agendar Horário</h2>
                <label class="block text-xs font-black mb-1">ESCOLHA A DATA</label>
                <input type="date" id="data" onchange="carregaHorarios(this.value)">

                <label class="block text-xs font-black mb-1">HORÁRIOS DISPONÍVEIS (REGRAS NILO PET)</label>
                <select id="h-select">
                    <option>Selecione o dia primeiro</option>
                </select>

                <button type="button" onclick="finish()" class="btn-next mt-6 shadow-xl">CONFIRMAR AGENDAMENTO ✅</button>
                <button type="button" onclick="next(3)" class="btn-cancel bg-slate-400">VOLTAR</button>
            </div>
        </div>
    </form>

    <script>
        function next(n) {
            document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.step-circle').forEach((c, i) => c.classList.toggle('active', i < n));
            document.getElementById('step'+n).classList.add('active');
            window.scrollTo(0,0);
        }

        function validaPasso1() {
            const w = document.getElementById('whatsapp').value;
            if(w.length !== 11) return alert("WhatsApp deve ter exatamente 11 dígitos!");
            if(!document.getElementById('nome').value || !document.getElementById('rua').value) return alert("Preencha todos os campos obrigatórios!");
            next(2);
        }

        function togglePorte(el) {
            el.parentElement.querySelector('.porte-div').classList.toggle('hidden', el.value === 'Gato');
        }

        function renderServicos() {
            const t = document.getElementById('tipo').value;
            const b = document.getElementById('boxServico');
            if(t === 'avulso') {
                b.innerHTML = `<label class='text-xs font-black mb-2'>ESCOLHA O SERVIÇO:</label><select><option>Banho</option><option>Banho + Tosa Higiênica</option><option>Banho + Tosa</option></select>`;
            } else if(t === 'basico') {
                b.innerHTML = `<p class='font-bold text-red-600'>PACOTE BÁSICO:</p><p class='text-xs'>• 1 Banho e 1 Banho + Tosa Higiênica</p>`;
            } else if(t === 'basico_tosa') {
                b.innerHTML = `<p class='font-bold text-red-600'>PACOTE BÁSICO COM TOSA:</p><p class='text-xs'>• 1 Banho e 1 Banho + Tosa</p>`;
            } else {
                b.innerHTML = `<p class='font-bold text-red-600'>PACOTE PREMIUM:</p><p class='text-xs'>• 3 Banhos e 1 Banho + Tosa Higiênica (5ª semana opcional)</p>`;
            }
        }

        function carregaHorarios(val) {
            const d = new Date(val + 'T00:00:00');
            const hj = new Date();
            const combo = document.getElementById('h-select');
            combo.innerHTML = '';

            // Bloqueio Dia 20
            if(d.getMonth() > hj.getMonth() && hj.getDate() < 20) {
                alert("Agenda do mês seguinte disponível só após dia 20!");
                document.getElementById('data').value = ""; return;
            }

            const dia = d.getDay();
            let h = [];
            if(dia >= 3 && dia <= 6) { // Qua-Sab
                h = ["09:00 - 3 Banhos ou 3 B. + Tosa Higiênica e 1 Tosa", "10:00 - 3 Banhos ou 3 B. + Tosa Higiênica e 1 Pet Grande Curto (Só Banho)", "11:00 - 3 Banhos ou 3 B. + Tosa Higiênica e 1 Tosa", "13:30 - 4 Banhos ou 4 B. + Tosa Higiênica", "14:30 - 3 Banhos ou 3 B. + Tosa Higiênica e 1 Tosa", "15:30 - 3 Banhos ou 3 B. + Tosa Higiênica e 1 Pet Grande Peludo (Só Banho)", "16:00 - 3 Banhos ou 3 B. + Tosa Higiênica e 1 Gato (Só Banho)"];
            } else if(dia === 0) { // Dom
                h = ["09:00 - 3 Banhos ou 3 B. + Tosa Higiênica e 1 Tosa", "10:00 - 3 Banhos ou 3 B. + Tosa Higiênica e 1 Pet Grande Curto (Só Banho)", "11:00 - 3 Banhos ou 3 B. + Tosa Higiênica e 1 Tosa", "12:00 - 3 Banhos ou 3 B. + Tosa Higiênica e 1 Pet Grande Peludo (Só Banho)"];
            } else {
                alert("Atendemos apenas de Quarta a Domingo!");
                document.getElementById('data').value = ""; return;
            }
            h.forEach(txt => { let o = document.createElement('option'); o.text = txt; combo.add(o); });
        }

        function finish() {
            alert("AGENDAMENTO CONFIRMADO!\n\nLogo mais nossa equipe entrará em contato para passar valores.\n\nENVIE UMA FOTO DO SEU PET AGORA PARA ACELERAR O PROCESSO.");
        }
    </script>
</body>
</html>
