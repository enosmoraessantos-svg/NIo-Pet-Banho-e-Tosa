<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nilo Pet - Agendamento</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
</head>
<body class="bg-blue-50 min-h-screen">
  <div class="max-w-3xl mx-auto p-4">
    <header class="bg-white rounded-xl shadow-md p-6 mb-6 text-center">
      <h1 class="text-3xl font-bold text-blue-800">Nilo Pet Banho e Tosa</h1>
      <p class="text-gray-600">Agende online em 4 etapas</p>
    </header>

    <div class="bg-white rounded-xl shadow-lg p-6">
      <div class="text-sm mb-4">Etapa <span id="etapaAtual">1</span> de 4</div>
      
      <div id="etapa1">
        <h3 class="font-semibold mb-4">1. Seus dados</h3>
        <input id="c_nome" type="text" placeholder="Nome completo" class="w-full border p-3 rounded mb-3">
        <select id="c_qtd_pets" class="w-full border p-3 rounded mb-3">
          <option value="">Quantos pets deseja agendar?</option>
          <option value="1">1</option><option value="2">2</option>
          <option value="3">3</option><option value="4">4</option>
        </select>
        <input id="c_whatsapp" type="text" placeholder="WhatsApp (11) 99999-9999" class="w-full border p-3 rounded mb-3">
        <input id="c_endereco" type="text" placeholder="Endereço completo" class="w-full border p-3 rounded mb-3">
        <input value="Bairro: Sol Nascente" class="w-full border p-3 rounded mb-4 bg-gray-100" disabled>
        <button onclick="irEtapa2()" class="w-full bg-blue-600 text-white p-3 rounded font-semibold">Próximo</button>
      </div>

      <div id="etapa2" style="display:none;">
        <h3 class="font-semibold mb-4">2. Escolha o Pacote</h3>
        <select id="c_pacote" class="w-full border p-3 rounded mb-4">
          <option value="">Selecione o pacote</option>
          <option value="Avulso">Avulso</option>
          <option value="Básico">Básico</option>
          <option value="Básico com Tosa">Básico com Tosa</option>
          <option value="Premium">Premium</option>
        </select>
        <div class="flex gap-2 mt-4">
          <button onclick="irEtapa1()" class="w-1/2 bg-gray-300 p-3 rounded">Voltar</button>
          <button onclick="irEtapa3()" class="w-1/2 bg-blue-600 text-white p-3 rounded">Próximo</button>
        </div>
      </div>

      <div id="etapa3" style="display:none;">
        <h3 class="font-semibold mb-4">3. Dados dos Pets</h3>
        <div id="petsContainer"></div>
        <div class="flex gap-2 mt-4">
          <button onclick="irEtapa2()" class="w-1/2 bg-gray-300 p-3 rounded">Voltar</button>
          <button onclick="irEtapa4()" class="w-1/2 bg-blue-600 text-white p-3 rounded">Próximo</button>
        </div>
      </div>

      <div id="etapa4" style="display:none;">
        <h3 class="font-semibold mb-4">4. Confirmar</h3>
        <div id="resumo" class="bg-gray-50 p-4 rounded mb-4"></div>
        <div class="flex gap-2">
          <button onclick="irEtapa3()" class="w-1/2 bg-gray-300 p-3 rounded">Voltar</button>
          <button onclick="salvar()" class="w-1/2 bg-green-600 text-white p-3 rounded font-bold">Confirmar</button>
        </div>
      </div>

      <div id="sucesso" style="display:none;" class="text-center p-6">
        <h3 class="text-2xl font-bold text-green-600 mb-2">Agendado!</h3>
        <p>Em breve entraremos em contato.</p>
      </div>
    </div>
  </div>

<script>
  // Aguarda o script do Supabase carregar
  window.addEventListener('load', function() {
    if (typeof supabase === 'undefined') {
      alert('Erro: Supabase não carregou. Recarregue a página.');
      return;
    }
    
    const SUPABASE_URL = "https://yczhjyxisqrvfxxgipop.supabase.co";
    const SUPABASE_KEY = "COLOQUE_SUA_KEY_ANON_AQUI"; 
    
    window.client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  });

  function irEtapa1() {
    document.getElementById('etapa1').style.display = 'block';
    document.getElementById('etapa2').style.display = 'none';
    document.getElementById('etapa3').style.display = 'none';
    document.getElementById('etapa4').style.display = 'none';
    document.getElementById('etapaAtual').innerText = '1';
  }

  function irEtapa2() {
    const nome = document.getElementById('c_nome').value.trim();
    const qtd = document.getElementById('c_qtd_pets').value;
    const whats = document.getElementById('c_whatsapp').value.trim();
    const end = document.getElementById('c_endereco').value.trim();
    
    if (!nome || !qtd || !whats || !end) {
      alert('Preencha todos os campos');
      return;
    }
    
    document.getElementById('etapa1').style.display = 'none';
    document.getElementById('etapa2').style.display = 'block';
    document.getElementById('etapaAtual').innerText = '2';
  }

  function irEtapa3() {
    const pacote = document.getElementById('c_pacote').value;
    if (!pacote) {
      alert('Selecione um pacote');
      return;
    }
    
    const qtd = parseInt(document.getElementById('c_qtd_pets').value);
    let html = '';
    for(let i = 0; i < qtd; i++) {
      html += `<div class="border p-4 rounded mb-4 bg-blue-50">
        <h4 class="font-semibold mb-2">Pet ${i+1}</h4>
        <select class="pet_especie w-full border p-2 rounded mb-2">
          <option value="">Espécie</option><option>Cachorro</option><option>Gato</option>
        </select>
        <input placeholder="Nome do pet" class="pet_nome w-full border p-2 rounded mb-2">
        <select class="pet_porte w-full border p-2 rounded mb-2">
          <option value="">Porte</option><option>Pequeno/Médio</option>
          <option>Grande Peludo</option><option>Grande Pelo Curto</option>
        </select>
        <select class="pet_servico w-full border p-2 rounded mb-2">
          <option value="">Serviço</option><option>Banho</option>
          <option>Banho + Tosa Higiênica</option><option>Banho + Tosa</option>
        </select>
      </div>`;
    }
    document.getElementById('petsContainer').innerHTML = html;
    
    document.getElementById('etapa2').style.display = 'none';
    document.getElementById('etapa3').style.display = 'block';
    document.getElementById('etapaAtual').innerText = '3';
  }

  function irEtapa4() {
    let ok = true;
    document.querySelectorAll('#petsContainer select, #petsContainer input').forEach(i => { 
      if(!i.value) ok = false; 
    });
    if(!ok) {
      alert('Preencha todos os dados dos pets');
      return;
    }
    
    document.getElementById('resumo').innerHTML = `
      <p><b>Cliente:</b> ${document.getElementById('c_nome').value}</p>
      <p><b>WhatsApp:</b> ${document.getElementById('c_whatsapp').value}</p>
      <p><b>Pacote:</b> ${document.getElementById('c_pacote').value}</p>
    `;
    
    document.getElementById('etapa3').style.display = 'none';
    document.getElementById('etapa4').style.display = 'block';
    document.getElementById('etapaAtual').innerText = '4';
  }

  async function salvar() {
    if(!window.client) {
      alert('Aguarde o Supabase carregar e tente novamente');
      return;
    }
    
    const pets = [];
    document.querySelectorAll('#petsContainer > div').forEach(div => {
      pets.push({
        especie: div.querySelector('.pet_especie').value,
        nome: div.querySelector('.pet_nome').value,
        porte: div.querySelector('.pet_porte').value,
        servico: div.querySelector('.pet_servico').value
      });
    });

    const { error } = await window.client.from('agendamentos').insert({
      cliente: document.getElementById('c_nome').value,
      whatsapp: document.getElementById('c_whatsapp').value,
      endereco: document.getElementById('c_endereco').value + ', Sol Nascente',
      qtd_pets: parseInt(document.getElementById('c_qtd_pets').value),
      pacote: document.getElementById('c_pacote').value,
      pets: pets,
      status: 'confirmado'
    });
    
    if(!error) {
      document.getElementById('etapa4').style.display = 'none';
      document.getElementById('sucesso').style.display = 'block';
    } else { 
      alert('Erro ao salvar: ' + error.message);
    }
  }
</script>
</body>
</html>
