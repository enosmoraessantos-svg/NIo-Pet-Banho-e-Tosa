<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendamento - Nilo Pet</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
  <div class="max-w-lg mx-auto bg-white rounded-xl shadow-md p-6">
    <h1 class="text-2xl font-bold text-center mb-6">Agendar Banho & Tosa</h1>

    <form id="formAgendamento" class="space-y-4">
      <div>
        <label class="block text-sm font-medium">Seu nome</label>
        <input type="text" id="cliente" required class="mt-1 w-full border rounded-md p-2">
      </div>

      <div>
        <label class="block text-sm font-medium">WhatsApp</label>
        <input type="tel" id="whatsapp" required placeholder="(11) 99999-9999" class="mt-1 w-full border rounded-md p-2">
      </div>

      <div>
        <label class="block text-sm font-medium">Endereço completo</label>
        <input type="text" id="endereco" required placeholder="Rua, número, bairro" class="mt-1 w-full border rounded-md p-2">
      </div>

      <div>
        <label class="block text-sm font-medium">Nome do Pet</label>
        <input type="text" id="nomePet" required class="mt-1 w-full border rounded-md p-2">
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium">Espécie</label>
          <select id="especie" required class="mt-1 w-full border rounded-md p-2">
            <option value="Cachorro">Cachorro</option>
            <option value="Gato">Gato</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium">Porte</label>
          <select id="porte" required class="mt-1 w-full border rounded-md p-2">
            <option value="Pequeno/Médio">Pequeno/Médio</option>
            <option value="Grande Peludo">Grande Peludo</option>
            <option value="Grande Pelo Curto">Grande Pelo Curto</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium">Serviço</label>
        <select id="servico" required class="mt-1 w-full border rounded-md p-2">
          <option value="Banho">Banho</option>
          <option value="Banho + Tosa Higiênica">Banho + Tosa Higiênica</option>
          <option value="Banho + Tosa">Banho + Tosa</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium">Data desejada</label>
        <input type="date" id="data" required class="mt-1 w-full border rounded-md p-2">
      </div>

      <button type="submit" id="btnEnviar" class="w-full bg-blue-600 text-white font-bold py-3 rounded-md hover:bg-blue-700">
        Confirmar Agendamento
      </button>

      <p id="msg" class="text-center text-sm mt-4"></p>
    </form>
  </div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

  // COLE SUAS CREDENCIAIS AQUI
  const SUPABASE_URL = 'https://yczhjyxisqrvfxxgipop.supabase.co'
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljemhqeXhpc3FydmZ4eGdpcG9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjg2OTQsImV4cCI6MjA5MDg0NDY5NH0.aYeASSFKHOxW912U8Iuu13wfnS60xmuUTRaZk42Vdv0";

  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

  const form = document.getElementById('formAgendamento')
  const msg = document.getElementById('msg')
  const btn = document.getElementById('btnEnviar')

  form.addEventListener('submit', async (e) => {
    e.preventDefault()
    btn.disabled = true
    btn.innerText = 'Enviando...'
    msg.innerText = ''

    // Monta o objeto do pet no formato jsonb que sua tabela exige
    const petInfo = [{
      nome: document.getElementById('nomePet').value,
      especie: document.getElementById('especie').value,
      porte: document.getElementById('porte').value,
      servico: document.getElementById('servico').value
    }]

    const dataSelecionada = document.getElementById('data').value

    // Objeto final casado com sua tabela agendamentos
    const agendamento = {
      cliente: document.getElementById('cliente').value,
      whatsapp: document.getElementById('whatsapp').value,
      endereco: document.getElementById('endereco').value,
      qtd_pets: 1, // Fixo em 1 por enquanto
      pacote: 'Avulso', // Fixo em Avulso por enquanto
      pets: petInfo, // Array de pets em jsonb
      datas_agendadas: [dataSelecionada], // Array de datas em jsonb
      servico: document.getElementById('servico').value, // Campo extra pra facilitar busca
      status: 'confirmado'
    }

    const { data, error } = await supabase.from('agendamentos').insert(agendamento)

    if (error) {
      console.error(error)
      msg.className = 'text-center text-sm mt-4 text-red-600'
      msg.innerText = 'Erro ao agendar: ' + error.message
      btn.disabled = false
      btn.innerText = 'Confirmar Agendamento'
    } else {
      msg.className = 'text-center text-sm mt-4 text-green-600'
      msg.innerText = 'Agendamento confirmado com sucesso!'
      form.reset()
      btn.innerText = 'Agendado!'
    }
  })
</script>
</body>
</html>
