<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Nilo Pet - Agendamento Oficial</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background-color: #f0f9ff; font-family: sans-serif; color: #1e293b; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin: 15px; padding: 25px; border: 1px solid #e2e8f0; }
        input, select, textarea { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #e2e8f0; margin-bottom: 12px; font-size: 16px; color: black; }
        .btn-next { background-color: #dc2626; color: white; width: 100%; padding: 18px; border-radius: 12px; font-weight: 800; font-size: 18px; border: none; cursor: pointer; }
        .btn-back-large { background-color: #64748b; color: white; width: 100%; padding: 18px; border-radius: 12px; font-weight: 800; font-size: 18px; border: none; cursor: pointer; margin-top: 10px; }
        .btn-cancel-final { background-color: #ef4444; color: white; width: 100%; padding: 15px; border-radius: 12px; font-weight: 800; margin-top: 10px; cursor: pointer; }
        .step-content { display: none; }
        .step-content.active { display: block; }
        .pet-box { border: 2px solid #e2e8f0; padding: 15px; border-radius: 15px; margin-bottom: 15px; background: #f8fafc; }
        .label-req { display: block; font-size: 10px; margin-bottom: 4px; text-transform: uppercase; font-weight: 900; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="bg-white p-6 text-center border-b shadow-sm">
        <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter italic">Nilo Pet</h1>
        <p class="text-red-600 font-bold text-xs uppercase">Banho e Tosa</p>
    </div>

    <form id="niloForm">
        <!-- ETAPA 1 -->
        <div id="step1" class="step-content active">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline text-sm">Etapa 1: Início</h2>
                <select id="acaoInicial" onchange="toggleAcao()">
                    <option value="">Selecione...</option>
                    <option value="agendar">NOVO AGENDAMENTO</option>
                    <option value="cancelar_avulso">CANCELAR SERVIÇO AVULSO</option>
                    <option value="cancelar_pacote">CANCELAR PACOTE</option>
                </select>

                <div id="camposAgendar" class="hidden">
                    <label class="label-req">Nome do Cliente *</label>
                    <input type="text" id="nomeCliente" placeholder="Nome completo">
                    <label class="label-req">WhatsApp (11 dígitos) *</label>
                    <input type="tel" id="whatsapp" placeholder="11999998888" maxlength="11">
                    <label class="label-req">Endereço *</label>
                    <div class="flex gap-2">
                        <input type="text" id="rua" placeholder="Rua e Número" class="flex-grow">
                        <input type="text" value="Sol Nascente" readonly class="w-32 bg-slate-100 font-bold text-slate-500 text-center border-none text-[10px] mb-3">
                    </div>
                    <button type="button" onclick="validaPasso1()" class="btn-next mt-4">PRÓXIMO</button>
                </div>

                <div id="camposCancelAvulso" class="hidden">
                    <label class="label-req">Data *</label><input type="date" id="cancelData">
                    <label class="label-req">Nome Cliente *</label><input type="text" id="cancelNome">
                    <label class="label-req">Nome Pet *</label><input type="text" id="cancelPet">
                    <button type="button" onclick="msgCancel('avulso')" class="btn-cancel-final">CONFIRMAR CANCELAMENTO</button>
                </div>

                <div id="camposCancelPacote" class="hidden">
                    <label class="label-req">Nome Cliente *</label><input type="text" id="cancelPacoteNome">
                    <label class="label-req">Nome Pet *</label><input type="text" id="cancelPetPacote">
                    <button type="button" onclick="msgCancel('pacote')" class="btn-cancel-final">CONFIRMAR CANCELAMENTO</button>
                </div>
            </div>
        </div>

        <!-- ETAPA 2 -->
        <div id="step2" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline text-sm">Etapa 2: Dados do Pet</h2>
                <select id="qtdPets" onchange="renderPets()">
                    <option value="1">1 Pet</option><option value="2">2 Pets</option>
                    <option value="3">3 Pets</option><option value="4">4 Pets</option>
                </select>
                <div id="petsContainer"></div>
                <button type="button" onclick="next(3)" class="btn-next">PRÓXIMO</button>
                <button type="button" onclick="next(1)" class="btn-back-large">VOLTAR</button>
            </div>
        </div>

        <!-- ETAPA 3 -->
        <div id="step3" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline text-sm">Etapa 3: Serviços</h2>
                <div id="servicosPorPetContainer"></div>
                <button type="button" onclick="next(4)" class="btn-next">ESCOLHER HORÁRIOS</button>
                <button type="button" onclick="next(2)" class="btn-back-large">VOLTAR</button>
            </div>
        </div>

        <!-- ETAPA 4 -->
        <div id="step4" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline text-sm">Etapa 4: Horários</h2>
                <div id="datasHorariosContainer"></div>
                <button type="button" onclick="finalizar()" class="btn-next mt-4">CONFIRMAR ✅</button>
                <button type="button" onclick="next(3)" class="btn-back-large">VOLTAR</button>
            </div>
        </div>
    </form>

    <script>
        function toggleAcao() {
            const v = document.getElementById('acaoInicial').value;
            document.getElementById('camposAgendar').classList.toggle('hidden', v !== 'agendar');
            document.getElementById('camposCancelAvulso').classList.toggle('hidden', v !== 'cancelar_avulso');
            document.getElementById('camposCancelPacote').classList.toggle('hidden', v !== 'cancelar_pacote');
        }

        function next(n) {
            document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
            document.getElementById('step'+n).classList.add('active');
            if(n===2 && !document.getElementById('petsContainer').innerHTML) renderPets();
            if(n===3) renderServicos();
            if(n===4) renderEtapa4();
            window.scrollTo(0,0);
        }

        function syncName(i) {
            const val = document.getElementById(`nomePet${i}`).value;
            document.getElementById(`lblPet${i}`).innerText = val ? val.toUpperCase() : `NOME DO PET`;
        }

        function renderPets() {
            const q = document.getElementById('qtdPets').value;
            const c = document.getElementById('petsContainer');
            c.innerHTML = '';
            for(let i=1; i<=q; i++) {
                c.innerHTML += `
                <div class="pet-box">
                    <p class="font-black text-red-600 mb-2 text-[10px]" id="lblPet${i}">NOME DO PET</p>
                    <input type="text" id="nomePet${i}" placeholder="Nome do pet *" oninput="syncName(${i})">
                    <label class="label-req">Espécie</label>
                    <select id="especie${i}" onchange="togglePorte(${i})"><option value="cachorro">Cachorro</option><option value="gato">Gato</option></select>
                    <div id="divPorte${i}">
                        <label class="label-req">Porte</label>
                        <select id="porte${i}"><option value="pequeno">Pequeno</option><option value="medio">Médio</option><option value="grande_curto">Grande pelo curto</option><option value="grande_peludo">Grande peludo</option></select>
                    </div>
                    <select id="alergia${i}"><option value="nao">Não possui Alergia</option><option value="sim">Sim</option></select>
                    <textarea id="obs${i}" placeholder="Obs"></textarea>
                </div>`;
            }
        }

        function togglePorte(i) { document.getElementById('divPorte'+i).classList.toggle('hidden', document.getElementById('especie'+i).value === 'gato'); }

        function renderServicos() {
            const q = document.getElementById('qtdPets').value;
            const container = document.getElementById('servicosPorPetContainer');
            container.innerHTML = '';
            for(let i=1; i<=q; i++) {
                const nomePet = document.getElementById(`nomePet${i}`)?.value || 'Pet ' + i;
                container.innerHTML += `
                <div class="pet-box">
                    <p class="font-bold text-xs uppercase mb-2 text-red-600">${nomePet}</p>
                    <select id="planoPet${i}" onchange="toggleOpcoesServico(${i})">
                        <option value="avulso">AVULSO</option>
                        <option value="basico">PACOTE BÁSICO</option>
                        <option value="basico_tosa">PACOTE BÁSICO COM TOSA</option>
                        <option value="premium">PACOTE PREMIUM</option>
                    </select>
                    <div id="boxAvulso${i}">
                        <select id="servicoPet${i}"><option value="banho">BANHO</option><option value="banho_higi">BANHO + TOSA HIGIÊNICA</option><option value="banho_tosa">BANHO + TOSA</option></select>
                    </div>
                </div>`;
            }
        }

        function toggleOpcoesServico(i) { document.getElementById(`boxAvulso${i}`).classList.toggle('hidden', document.getElementById(`planoPet${i}`).value !== 'avulso'); }

        function renderEtapa4() {
            const q = document.getElementById('qtdPets').value;
            const container = document.getElementById('datasHorariosContainer');
            container.innerHTML = '';
            const hoje = new Date();
            const diaHoje = hoje.getDate();

            for(let i=1; i<=q; i++) {
                const nomePet = document.getElementById(`nomePet${i}`)?.value || 'Pet ' + i;
                const plano = document.getElementById(`planoPet${i}`).value;
                let semanas = (plano === 'premium') ? 5 : (plano.includes('basico') ? 2 : 1);

                container.innerHTML += `<p class="font-black text-xs text-red-600 uppercase mt-4 mb-2">${nomePet}</p>`;
                for(let s=1; s<=semanas; s++) {
                    container.innerHTML += `
                    <div class="pet-box !mb-2">
                        <label class="label-req">${plano === 'avulso' ? 'Data' : 'Semana ' + s}</label>
                        <input type="date" id="data_p${i}_s${s}" onchange="loadHours(${i}, ${s})">
                        <select id="hora_p${i}_s${s}"><option value="">Selecione a data...</option></select>
                    </div>`;
                    const input = document.getElementById(`data_p${i}_s${s}`);
                    input.min = hoje.toISOString().split('T');
                    let mesMax = hoje.getMonth() + (diaHoje >= 20 ? 2 : 1);
                    let anoMax = hoje.getFullYear();
                    if(mesMax > 11) { mesMax -= 12; anoMax++; }
                    input.max = new Date(anoMax, mesMax, 0).toISOString().split('T');
                }
            }
        }

        function loadHours(p, s) {
            const dtInput = document.getElementById(`data_p${p}_s${s}`).value;
            const dt = new Date(dtInput + 'T00:00:00');
            const dia = dt.getDay();
            const sel = document.getElementById(`hora_p${p}_s${s}`);
            const esp = document.getElementById(`especie${p}`).value;
            const por = document.getElementById(`porte${p}`).value;
            const serv = document.getElementById(`servicoPet${p}`).value;
            const plano = document.getElementById(`planoPet${p}`).value;

            sel.innerHTML = '<option value="">Selecione...</option>';
            if (dia < 3 && dia !== 0) return alert("Atendimento de Quarta a Domingo!");

            const listaGeral = (dia === 0) ? ["09:00", "10:00", "11:00", "12:00"] : ["09:00", "10:00", "11:00", "13:30", "14:30", "15:30", "16:00"];

            listaGeral.forEach(h => {
                let block = false;
                const isTosa = (serv === 'banho_tosa' || plano === 'basico_tosa');

                // REGRAS QUARTA A SÁBADO
                if(dia !== 0) {
                    if (isTosa && !["09:00", "11:00", "14:30"].includes(h)) block = true;
                    if (por === 'grande_curto' && h !== "10:00") block = true;
                    if (h === "10:00" && por !== 'grande_curto') block = true;
                    if (h === "13:30" && isTosa) block = true;
                    if (por === 'grande_peludo' && h !== "15:30") block = true;
                    if (h === "15:30" && por !== 'grande_peludo') block = true;
                    if (esp === 'gato' && h !== "16:00") block = true;
                    if (h === "16:00" && esp !== 'gato') block = true;
                } 
                // REGRAS DOMINGO
                else {
                    if (isTosa && !["09:00", "11:00"].includes(h)) block = true;
                    if (por === 'grande_curto' && h !== "10:00") block = true;
                    if (h === "10:00" && por !== 'grande_curto') block = true;
                    if (por === 'grande_peludo' && h !== "12:00") block = true;
                    if (h === "12:00" && por !== 'grande_peludo') block = true;
                }

                if (!block) {
                    let o = document.createElement('option');
                    o.value = h; o.text = h; sel.add(o);
                }
            });
        }

        function msgCancel(t) { alert("cancelado com sucesso."); location.reload(); }
        function finalizar() { alert("agendamento confirmado logo mais nossa equipe entrar em contato para passar valores de imediato envie um foto do pet para acelerar o processo."); location.reload(); }
        function validaPasso1() { if(!document.getElementById('nomeCliente').value || document.getElementById('whatsapp').value.length < 11) return alert("Preencha corretamente!"); next(2); }
    </script>
</body>
</html>
