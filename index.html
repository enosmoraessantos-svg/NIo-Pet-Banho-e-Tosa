<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nilo Pet - Agendamento Profissional</title>
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0f9ff; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 24px; border: 2px solid #000; box-shadow: 8px 8px 0px 0px #000; }
        .step-content { display: none; transition: all 0.3s ease; }
        .step-content.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input, select { border-radius: 12px !important; border: 2px solid #e2e8f0; transition: all 0.2s; color: #1e293b; }
        input:focus { border-color: #dc2626; ring: 2px; ring-color: #fca5a5; outline: none; }
        .progress-bar { height: 8px; border-radius: 4px; background: #e2e8f0; overflow: hidden; }
        .progress-fill { height: 100%; background: #dc2626; transition: width 0.4s ease; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="max-w-xl w-full glass-card p-6 md:p-10">
        <!-- HEADER -->
        <header class="text-center mb-8">
            <div class="inline-block bg-red-600 text-white px-4 py-1 rounded-full text-xs font-bold mb-2 uppercase tracking-widest">Agendamento Online</div>
            <h1 class="text-3xl font-extrabold text-slate-900 leading-tight">Nilo Pet <span class="text-red-600">Banho e Tosa</span></h1>
            <div class="mt-6">
                <div class="progress-bar"><div id="progressFill" class="progress-fill" style="width: 25%"></div></div>
                <p id="stepIndicator" class="text-xs font-bold text-slate-500 mt-2 uppercase tracking-tighter">Etapa 1 de 4: Seus Dados</p>
            </div>
        </header>

        <form id="niloForm">
            <!-- ETAPA 1: CLIENTE -->
            <div id="step1" class="step-content active">
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">Nome do Tutor</label>
                        <input type="text" id="nome" placeholder="Digite seu nome completo" class="w-full p-4 bg-slate-50 focus:bg-white">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-1">WhatsApp (DDD)</label>
                            <input type="tel" id="whatsapp" placeholder="(11) 99999-9999" class="w-full p-4 bg-slate-50">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-1">Bairro</label>
                            <input type="text" value="Sol Nascente" disabled class="w-full p-4 bg-slate-100 font-semibold text-slate-500 cursor-not-allowed">
                        </div>
                    </div>
                    <button type="button" onclick="goToStep(2)" class="w-full bg-red-600 hover:bg-red-700 text-white font-extrabold p-5 rounded-2xl shadow-lg transition-all transform active:scale-95 uppercase tracking-wide">Continuar</button>
                </div>
            </div>

            <!-- ETAPA 2: PETS -->
            <div id="step2" class="step-content">
                <div class="space-y-4">
                    <div class="p-5 border-2 border-slate-100 rounded-2xl bg-slate-50">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold text-slate-800">Informações do Pet</h3>
                            <span class="text-[10px] bg-slate-200 px-2 py-1 rounded-md font-bold text-slate-600 uppercase">Pet 01</span>
                        </div>
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <select id="especie" class="p-3">
                                <option>Cachorro</option>
                                <option>Gato</option>
                            </select>
                            <input type="text" placeholder="Nome do Pet" class="p-3">
                        </div>
                        <select id="porte" class="w-full p-3 mb-3">
                            <option>Porte Pequeno</option>
                            <option>Porte Médio</option>
                            <option>Grande (Pelo Curto)</option>
                            <option>Grande (Peludo)</option>
                        </select>
                        <input type="text" placeholder="Alguma alergia ou observação?" class="w-full p-3">
                    </div>
                    <div class="flex gap-3">
                        <button type="button" onclick="goToStep(1)" class="w-1/3 border-2 border-black font-bold rounded-2xl p-4 hover:bg-slate-100">Voltar</button>
                        <button type="button" onclick="goToStep(3)" class="w-2/3 bg-red-600 text-white font-extrabold rounded-2xl p-4 shadow-lg uppercase">Próximo</button>
                    </div>
                </div>
            </div>

            <!-- ETAPA 3: SERVIÇOS -->
            <div id="step3" class="step-content">
                <div class="grid grid-cols-1 gap-3">
                    <label class="relative flex items-center p-4 border-2 border-slate-200 rounded-2xl cursor-pointer hover:border-red-600 transition group">
                        <input type="radio" name="plan" class="hidden" checked>
                        <div class="flex flex-col">
                            <span class="font-bold text-slate-800">Serviço Avulso</span>
                            <span class="text-xs text-slate-500">Banho, Tosa ou Higiênica na hora</span>
                        </div>
                    </label>
                    <label class="relative flex items-center p-4 border-2 border-slate-200 rounded-2xl cursor-pointer hover:border-red-600 transition">
                        <input type="radio" name="plan" class="hidden">
                        <div class="flex flex-col">
                            <span class="font-bold text-slate-800 italic uppercase text-red-600">Pacote Premium ⭐</span>
                            <span class="text-xs text-slate-500 text-black">3 Banhos + 1 Tosa Higiênica</span>
                        </div>
                    </label>
                </div>
                <div class="flex gap-3 mt-6">
                    <button type="button" onclick="goToStep(2)" class="w-1/3 border-2 border-black font-bold rounded-2xl p-4">Voltar</button>
                    <button type="button" onclick="goToStep(4)" class="w-2/3 bg-red-600 text-white font-extrabold rounded-2xl p-4 shadow-lg uppercase">Próximo</button>
                </div>
            </div>

            <!-- ETAPA 4: CALENDÁRIO -->
            <div id="step4" class="step-content">
                <div class="space-y-4">
                    <input type="date" id="calendar" class="w-full p-4 font-bold bg-slate-50 rounded-2xl">
                    <div id="timeGrid" class="grid grid-cols-3 gap-2">
                        <!-- Horários dinâmicos via JS -->
                    </div>
                    <div class="bg-blue-50 p-4 rounded-2xl border-l-4 border-blue-500">
                        <p class="text-[11px] text-blue-800 leading-snug font-medium">
                            🚨 <strong>Dica Nilo:</strong> Envie a foto do seu pet após a confirmação para agilizarmos a avaliação do porte!
                        </p>
                    </div>
                    <button type="button" onclick="finish()" class="w-full bg-slate-900 text-white font-black p-5 rounded-2xl shadow-xl hover:bg-black transition-all uppercase tracking-tighter text-lg">Confirmar Agendamento</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        function goToStep(step) {
            document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            
            const progress = (step / 4) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            const texts = ["", "Seus Dados", "Sobre o Pet", "Escolha o Plano", "Horário"];
            document.getElementById('stepIndicator').innerText = "Etapa " + step + " de 4: " + texts[step];
        }

        function finish() {
            alert("✅ AGENDAMENTO CONFIRMADO!\n\nLogo mais nossa equipe entrará em contato para passar valores.\n\nENVIE UMA FOTO DO SEU PET AGORA PARA ACELERAR O PROCESSO.");
        }
    </script>
</body>
</html>
