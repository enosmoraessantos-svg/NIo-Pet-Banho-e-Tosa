<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nilo Pet - Agendamento</title>
    <style>
        :root { --vermelho: #ff0000; --preto: #000000; --azul-bebe: #f0f8ff; }
        body { 
            background: var(--azul-bebe) url('SUA_LOGO_AQUI.png') no-repeat center fixed;
            background-size: 40%; color: var(--vermelho); font-family: 'Arial Black', sans-serif;
            padding: 15px; margin: 0;
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(240, 248, 255, 0.85); z-index: -1; }
        .card { background: white; border: 5px solid var(--preto); max-width: 500px; margin: 10px auto; padding: 20px; box-shadow: 10px 10px 0px var(--preto); border-radius: 15px; }
        .etapa { display: none; } .etapa.ativa { display: block; }
        h1 { text-align: center; font-size: 18px; border-bottom: 4px solid var(--preto); padding-bottom: 10px; margin-top: 0; }
        label { display: block; margin-top: 15px; font-size: 12px; text-transform: uppercase; }
        input, select, textarea { width: 100%; border: 3px solid var(--preto); padding: 10px; color: var(--vermelho); font-weight: bold; margin-top: 5px; box-sizing: border-box; border-radius: 8px; background: white; }
        button { background: var(--preto); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 15px; border-radius: 8px; text-transform: uppercase; }
        .pet-box { border: 3px solid var(--preto); padding: 15px; margin-top: 15px; background: #fff; border-radius: 10px; }
        .sessao-pacote { background: #eee; padding: 10px; border: 1px solid black; margin-top: 10px; border-radius: 5px; font-size: 11px; }
    </style>
</head>
<body>

<div class="card">
    <h1>NILO PET BANHO E TOSA</h1>

    <!-- ETAPA 1 -->
    <div class="etapa ativa" id="e1">
        <label>NOME DO CLIENTE*</label><input type="text" id="nome_cli" required>
        <label>WHATSAPP (11 DÍGITOS)*</label><input type="tel" id="tel" maxlength="11" required>
        <label>BAIRRO (SOL NASCENTE)*</label><input type="text" value="Sol Nascente" readonly style="background:#eee">
        <button onclick="irPara(2)">PRÓXIMO 🐾</button>
    </div>

    <!-- ETAPA 2 -->
    <div class="etapa" id="e2">
        <label>QUANTIDADE DE PETS (MÁX 4)</label>
        <select id="qtd_pets" onchange="renderizarPets()"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option></select>
        <div id="lista_pets"></div>
        <button onclick="irPara(3)">PRÓXIMO 🐾</button>
    </div>

    <!-- ETAPA 3: SERVIÇOS E DATAS DOS PACOTES -->
    <div class="etapa" id="e3">
        <div id="container_servicos"></div>
        <button onclick="verificarDestino()">PRÓXIMO 🐾</button>
        <button style="background:#666" onclick="irPara(2)">VOLTAR</button>
    </div>

    <!-- ETAPA 4: DATA APENAS PARA AVULSO -->
    <div class="etapa" id="e4">
        <h2>Data do Banho Avulso</h2>
        <label>ESCOLHA O DIA:</label><input type="date" id="data_avulso" onchange="validarData(this)">
        <label>HORÁRIO:</label><select id="hora_avulso"></select>
        <button style="background:var(--vermelho)" onclick="finalizar()">FINALIZAR ✅</button>
    </div>
</div>

<script>
    function irPara(n) {
        document.querySelectorAll('.etapa').forEach(e => e.classList.remove('ativa'));
        document.getElementById('e' + n).classList.add('ativa');
        if(n === 2) renderizarPets();
        if(n === 3) renderizarEscolhaServicos();
    }

    function renderizarPets() {
        const qtd = document.getElementById('qtd_pets').value;
        const div = document.getElementById('lista_pets');
        div.innerHTML = "";
        for(let i=1; i<=qtd; i++) {
            div.innerHTML += `<div class="pet-box"><label>NOME DO PET ${i}*</label><input type="text" id="nome_pet_${i}" required></div>`;
        }
    }

    function renderizarEscolhaServicos() {
        const qtd = document.getElementById('qtd_pets').value;
        const div = document.getElementById('container_servicos');
        div.innerHTML = "";
        for(let i=1; i<=qtd; i++) {
            const nome = document.getElementById(`nome_pet_${i}`).value || `Pet ${i}`;
            div.innerHTML += `
            <div class="pet-box">
                <strong>${nome.toUpperCase()}</strong>
                <label>PLANO:</label>
                <select id="plano_${i}" onchange="mostrarDatasPacote(${i})">
                    <option value="avulso">Avulso</option>
                    <option value="basico">Básico</option>
                    <option value="basico_tosa">Básico com Tosa</option>
                    <option value="premium">Premium</option>
                </select>
                <div id="datas_pacote_${i}"></div>
            </div>`;
        }
    }

    function mostrarDatasPacote(id) {
        const plano = document.getElementById(`plano_${id}`).value;
        const div = document.getElementById(`datas_pacote_${id}`);
        div.innerHTML = "";
        
        let sessoes = [];
        if(plano === "basico") sessoes = ["1º Banho", "1º Banho + Tosa Higiênica"];
        if(plano === "basico_tosa") sessoes = ["1º Banho", "1º Banho + Tosa"];
        if(plano === "premium") sessoes = ["1º Banho", "2º Banho", "3º Banho", "1º Banho + Tosa Higiênica", "5º Banho (Opcional)"];

        sessoes.forEach((s, index) => {
            div.innerHTML += `
            <div class="sessao-pacote">
                <strong>${s}</strong>
                <input type="date" onchange="validarData(this)">
                <select><option>09:00</option><option>11:00</option><option>14:30</option></select>
            </div>`;
        });
    }

    function verificarDestino() {
        const planos = Array.from(document.querySelectorAll('[id^="plano_"]')).map(s => s.value);
        if(planos.every(p => p !== "avulso")) finalizar();
        else irPara(4);
    }

    function validarData(el) {
        const dt = new Date(el.value + "T00:00:00");
        const hoje = new Date(); hoje.setHours(0,0,0,0);
        if(dt < hoje) { alert("Data passada bloqueada!"); el.value = ""; return; }
        if(dt.getMonth() > hoje.getMonth() && hoje.getDate() < 20) { alert("Mês seguinte libera dia 20!"); el.value = ""; }
    }

    function finalizar() {
        alert("Agendamento confirmado! Envie a foto do pet no WhatsApp.");
        window.open("https://wa.me Nilo Pet Realizado!");
    }
</script>
</body>
</html>
