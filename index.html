<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Nilo Pet - Agendamento Oficial</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background-color: #f0f9ff; font-family: sans-serif; color: #1e293b; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin: 15px; padding: 25px; border: 1px solid #e2e8f0; }
        input, select { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #e2e8f0; margin-bottom: 12px; font-size: 16px; color: black; }
        .btn-next { background-color: #dc2626; color: white; width: 100%; padding: 18px; border-radius: 12px; font-weight: 800; font-size: 18px; border: none; cursor: pointer; }
        .btn-cancel { background-color: #64748b; color: white; width: 100%; padding: 12px; border-radius: 10px; font-weight: 700; margin-top: 10px; cursor: pointer; text-align: center; display: block; }
        .step-content { display: none; }
        .step-content.active { display: block; }
        .pet-box { border: 2px solid #e2e8f0; padding: 15px; border-radius: 15px; margin-bottom: 15px; background: #f8fafc; }
        .label-req { display: block; font-size: 10px; margin-bottom: 4px; text-transform: uppercase; font-weight: 900; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="bg-white p-6 text-center border-b shadow-sm">
        <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter italic">Nilo Pet</h1>
        <p class="text-red-600 font-bold text-xs uppercase">Banho e Tosa</p>
    </div>

    <form id="niloForm">
        <!-- ETAPA 1 -->
        <div id="step1" class="step-content active">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline">Etapa 1: Dados do Cliente</h2>
                <label class="label-req">Nome do Cliente *</label>
                <input type="text" id="nome" required placeholder="Nome completo">
                <label class="label-req">WhatsApp *</label>
                <input type="tel" id="whatsapp" required placeholder="11999998888" maxlength="11">
                <label class="label-req">Rua e Número *</label>
                <input type="text" id="rua" required placeholder="Ex: Rua das Flores, 123">
                <button type="button" onclick="next(2)" class="btn-next mt-4">PRÓXIMO</button>
                <button type="button" onclick="botaoCancelar()" class="btn-cancel">CANCELAR AGENDAMENTO</button>
            </div>
        </div>

        <!-- ETAPA 2 -->
        <div id="step2" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline">Etapa 2: Dados do Pet</h2>
                <select id="qtd" onchange="renderPets()"><option value="1">1 Pet</option><option value="2">2 Pets</option></select>
                <div id="petsContainer"></div>
                <button type="button" onclick="next(3)" class="btn-next">PRÓXIMO</button>
                <button type="button" onclick="next(1)" class="btn-cancel">VOLTAR</button>
            </div>
        </div>

        <!-- ETAPA 3 -->
        <div id="step3" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline">Etapa 3: Serviços</h2>
                <select id="tipo" onchange="renderServicos()">
                    <option value="avulso">AVULSO</option>
                    <option value="basico">PACOTE BÁSICO (2 Datas)</option>
                    <option value="premium">PACOTE PREMIUM (4 Datas)</option>
                </select>
                <div id="boxServico"></div>
                <button type="button" onclick="next(4)" class="btn-next">ESCOLHER HORÁRIOS</button>
                <button type="button" onclick="next(2)" class="btn-cancel">VOLTAR</button>
            </div>
        </div>

        <!-- ETAPA 4 -->
        <div id="step4" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline">Etapa 4: Horários</h2>
                <div id="datasContainer"></div>
                <button type="button" onclick="finish()" class="btn-next mt-6">CONFIRMAR ✅</button>
                <button type="button" onclick="botaoCancelar()" class="btn-cancel">CANCELAR TUDO</button>
            </div>
        </div>
    </form>

    <script>
        function next(n) {
            document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
            document.getElementById('step'+n).classList.add('active');
            if(n===2) renderPets();
            if(n===3) renderServicos();
            if(n===4) renderDatas();
        }

        function botaoCancelar() {
            const tipo = document.getElementById('tipo').value;
            let msg = tipo === 'avulso' ? "Deseja cancelar seu serviço avulso?" : "Ao cancelar uma data, você cancelará todo o seu pacote. Para alterar apenas uma data, entre em contato com os atendentes. Deseja cancelar?";
            
            if(confirm(msg)) {
                document.getElementById('niloForm').reset();
                next(1);
            }
        }

        function renderPets() {
            const container = document.getElementById('petsContainer');
            container.innerHTML = `<label class="label-req">Nome do Pet</label><input type="text" class="pet-nome-input" placeholder="Nome do Pet" oninput="renderDatas()">`;
        }

        function renderServicos() {
            const t = document.getElementById('tipo').value;
            const b = document.getElementById('boxServico');
            if(t === 'avulso') {
                b.innerHTML = `<label class="label-req">Serviço</label><select><option>Banho</option><option>Tosa</option></select>`;
            } else {
                b.innerHTML = `<label class="label-req text-red-600">Serviço de Pacote Selecionado (Fixo)</label><input type="text" value="BANHOS DO PACOTE" readonly class="bg-gray-100 font-bold">`;
            }
        }

        function renderDatas() {
            const t = document.getElementById('tipo').value;
            const container = document.getElementById('datasContainer');
            const cliente = document.getElementById('nome').value || "Cliente";
            const pet = document.querySelector('.pet-nome-input')?.value || "Pet";
            
            let num = t === 'avulso' ? 1 : (t === 'basico' ? 2 : 4);
            container.innerHTML = '';
            
            for(let i=1; i<=num; i++) {
                container.innerHTML += `
                <div class="mb-4 p-4 border rounded bg-slate-50">
                    <p class="text-[10px] font-black uppercase text-red-600">Agendamento ${i}</p>
                    <p class="text-xs mb-2"><b>Cliente:</b> ${cliente} | <b>Pet:</b> ${pet}</p>
                    <label class="label-req">Data</label><input type="date" required>
                    <label class="label-req">Horário</label>
                    <select><option>08:00</option><option>10:00</option><option>14:00</option></select>
                </div>`;
            }
        }

        function finish() { alert("Agendamento solicitado!"); }
    </script>
</body>
</html>
