<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nilo Pet - Agendamento</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background-color: #e0f2fe; color: #dc2626; font-family: sans-serif; }
        .border-nilo { border: 3px solid black; }
        .step { display: none; }
        .step.active { display: block; }
    </script>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto bg-white border-nilo shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] p-6">
        <h1 class="text-2xl font-black text-center mb-6 uppercase">Nilo Pet Banho e Tosa</h1>
        
        <!-- ETAPA 1 -->
        <div id="step1" class="step active">
            <h2 class="font-bold border-b-2 border-black mb-4">Etapa 1: Seus Dados</h2>
            <label class="block font-bold">NOME COMPLETO *</label>
            <input type="text" class="w-full border-2 border-black p-2 mb-4 outline-none">
            
            <label class="block font-bold">WHATSAPP (11 DÍGITOS) *</label>
            <input type="tel" class="w-full border-2 border-black p-2 mb-4">

            <label class="block font-bold">ENDEREÇO (Sol Nascente) *</label>
            <input type="text" class="w-full border-2 border-black p-2 mb-6">

            <button onclick="nextStep(2)" class="w-full bg-red-600 text-white font-bold p-3 border-2 border-black">PRÓXIMO</button>
        </div>

        <!-- ETAPA 2 (Pets), ETAPA 3 (Serviços) e ETAPA 4 (Data) seguiriam aqui -->
        <!-- O sistema de bloqueio de datas e cálculo de vagas ficaria no script abaixo -->

    </div>

    <script>
        function nextStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
        }
    </script>
</body>
</html>
