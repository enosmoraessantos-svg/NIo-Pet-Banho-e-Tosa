<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nilo Pet - Agendamento</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background-color: #e0f2fe; color: #dc2626; font-family: 'Arial Black', sans-serif; }
        .border-nilo { border: 4px solid black; }
        .btn-nilo { border: 3px solid black; transition: 0.2s; }
        .btn-nilo:active { transform: translate(2px, 2px); box-shadow: none; }
        .step { display: none; }
        .step.active { display: block; }
        input, select { color: black !important; border: 2px solid black; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-2xl mx-auto bg-white border-nilo shadow-[10px_10px_0px_0px_rgba(0,0,0,1)] p-6">
        <header class="text-center mb-8 border-b-4 border-black pb-4">
            <h1 class="text-3xl font-black uppercase italic">Nilo Pet</h1>
            <p class="text-xl font-bold">Banho e Tosa</p>
        </header>

        <form id="agendamentoForm">
            <!-- ETAPA 1: DADOS DO TUTOR -->
            <div id="step1" class="step active">
                <h2 class="text-lg font-black mb-4 uppercase underline">Etapa 1: Dados do Tutor</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block font-bold">NOME COMPLETO *</label>
                        <input type="text" id="nome" required class="w-full p-3 bg-blue-50">
                    </div>
                    <div>
                        <label class="block font-bold">WHATSAPP (11 DÍGITOS) *</label>
                        <input type="tel" id="whatsapp" placeholder="11999999999" required class="w-full p-3 bg-blue-50">
                    </div>
                    <div>
                        <label class="block font-bold">ENDEREÇO (SOL NASCENTE) *</label>
                        <input type="text" id="endereco" required class="w-full p-3 bg-blue-50">
                    </div>
                    <button type="button" onclick="nextStep(2)" class="w-full bg-red-600 text-white font-black p-4 btn-nilo shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">PRÓXIMO</button>
                </div>
            </div>

            <!-- ETAPA 2: DADOS DO PET -->
            <div id="step2" class="step">
                <h2 class="text-lg font-black mb-4 uppercase underline">Etapa 2: Sobre o Pet</h2>
                <div id="petsContainer" class="space-y-4">
                    <div class="p-4 border-2 border-black bg-blue-50">
                        <label class="block font-bold">ESPÉCIE</label>
                        <select id="especie" class="w-full p-2 mb-3">
                            <option value="Cachorro">Cachorro</option>
                            <option value="Gato">Gato</option>
                        </select>
                        <label class="block font-bold">NOME DO PET *</label>
                        <input type="text" id="nomePet" class="w-full p-2 mb-3">
                        <label class="block font-bold">PORTE / PELO</label>
                        <select id="porte" class="w-full p-2 mb-3">
                            <option>Pequeno</option>
                            <option>Médio</option>
                            <option>Grande Pelo Curto</option>
                            <option>Grande Peludo</option>
                        </select>
                        <label class="block font-bold">POSSUI ALERGIA?</label>
                        <select id="alergia" class="w-full p-2">
                            <option>Não</option>
                            <option>Sim (descrever abaixo)</option>
                        </select>
                        <input type="text" placeholder="Observações de alergia" class="w-full p-2 mt-2">
                    </div>
                </div>
                <div class="flex gap-2 mt-6">
                    <button type="button" onclick="prevStep(1)" class="w-1/3 border-2 border-black font-bold p-3">VOLTAR</button>
                    <button type="button" onclick="nextStep(3)" class="w-2/3 bg-red-600 text-white font-black p-3 btn-nilo shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">PRÓXIMO</button>
                </div>
            </div>

            <!-- ETAPA 3: SERVIÇO / PACOTE -->
            <div id="step3" class="step">
                <h2 class="text-lg font-black mb-4 uppercase underline">Etapa 3: Tipo de Serviço</h2>
                <div class="grid grid-cols-1 gap-3">
                    <label class="border-2 border-black p-4 flex items-center gap-3 bg-white">
                        <input type="radio" name="servico" value="Avulso" checked> 
                        <span>AVULSO (Banho / Tosa Higiênica / Tosa)</span>
                    </label>
                    <label class="border-2 border-black p-4 flex items-center gap-3 bg-white">
                        <input type="radio" name="servico" value="Básico"> 
                        <span>BÁSICO (1 Banho + 1 Tosa Higiênica)</span>
                    </label>
                    <label class="border-2 border-black p-4 flex items-center gap-3 bg-white">
                        <input type="radio" name="servico" value="Premium"> 
                        <span>PREMIUM (3 Banhos + 1 Tosa Higiênica)</span>
                    </label>
                </div>
                <div class="flex gap-2 mt-6">
                    <button type="button" onclick="prevStep(2)" class="w-1/3 border-2 border-black font-bold p-3">VOLTAR</button>
                    <button type="button" onclick="nextStep(4)" class="w-2/3 bg-red-600 text-white font-black p-3 btn-nilo shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">PRÓXIMO</button>
                </div>
            </div>

            <!-- ETAPA 4: DATA E HORA -->
            <div id="step4" class="step">
                <h2 class="text-lg font-black mb-4 uppercase underline">Etapa 4: Horário</h2>
                <div class="space-y-4">
                    <label class="block font-bold">ESCOLHA O DIA:</label>
                    <input type="date" id="dataAgendamento" class="w-full p-3 font-bold" onchange="atualizarHorarios()">
                    
                    <label class="block font-bold">HORÁRIOS DISPONÍVEIS:</label>
                    <select id="horarios" class="w-full p-3 font-bold">
                        <!-- Horários aparecerão via JS -->
                    </select>

                    <div class="bg-blue-100 border-2 border-dashed border-black p-3 text-sm text-black italic">
                        <strong>🎁 Surpresa de Cancelamento:</strong> Se precisar cancelar, avise com 2h de antecedência e ganhe um bônus surpresa no próximo agendamento!
                    </div>

                    <div class="flex gap-2 mt-6">
                        <button type="button" onclick="prevStep(3)" class="w-1/3 border-2 border-black font-bold p-3 text-red-600">VOLTAR</button>
                        <button type="button" onclick="finalizar()" class="w-2/3 bg-red-600 text-white font-black p-3 btn-nilo shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] uppercase">Confirmar Agora</button>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <script>
        function nextStep(s) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + s).classList.add('active');
            window.scrollTo(0,0);
        }
        function prevStep(s) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + s).classList.add('active');
        }

        // Lógica de horários conforme suas regras
        function atualizarHorarios() {
            const dataInput = document.getElementById('dataAgendamento').value;
            const data = new Date(dataInput);
            const diaSemana = data.getDay(); // 0 Dom, 3 Qua, 6 Sab
            const combo = document.getElementById('horarios');
            combo.innerHTML = '';

            // Bloqueio de calendário (Exemplo simplificado)
            const hoje = new Date();
            const dia20 = new Date(hoje.getFullYear(), hoje.getMonth(), 20);
            
            // Regras de quarta (3) a sábado (6)
            if (diaSemana >= 3 && diaSemana <= 6) {
                const h = ["09:00", "10:00", "11:00", "13:30", "14:30", "15:30", "16:00"];
                h.forEach(hora => {
                    let opt = document.createElement('option');
                    opt.value = hora; opt.text = hora; combo.add(opt);
                });
            } else if (diaSemana === 0) { // Domingo
                ["09:00", "10:00", "11:00", "12:00"].forEach(hora => {
                    let opt = document.createElement('option');
                    opt.value = hora; opt.text = hora; combo.add(opt);
                });
            } else {
                let opt = document.createElement('option');
                opt.text = "Fechado (Atendemos de Qua a Dom)"; combo.add(opt);
            }
        }

        function finalizar() {
            alert("Agendamento confirmado!\n\nLogo mais nossa equipe entrará em contato para passar valores. De imediato envie uma foto do pet para acelerar o processo.");
            // Aqui futuramente conectaremos ao seu Painel ADM
        }

        // Bloqueio de datas anteriores no input
        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById('dataAgendamento').setAttribute('min', hoje);
    </script>
</body>
</html>
