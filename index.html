<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nilo Pet - Agendamento</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        .step { display: none; }
        .step.active { display: block; }
        .card { background: white; padding: 20px; border-radius: 15px; margin: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #e2e8f0; border-radius: 10px; }
        .btn { background: #dc2626; color: white; width: 100%; padding: 15px; border-radius: 10px; font-weight: 800; }
    </style>
</head>
<body class="bg-blue-50">

    <div class="p-6 text-center font-black text-2xl italic italic uppercase">NILO PET</div>

    <div id="fluxo">
        <!-- ETAPA 1 -->
        <div id="step1" class="step active card">
            <h2 class="font-bold mb-4 uppercase text-sm underline">Etapa 1: Dados</h2>
            <select id="acao" onchange="toggleCance()">
                <option value="agendar">NOVO AGENDAMENTO</option>
                <option value="cancelar_avulso">CANCELAR AVULSO</option>
                <option value="cancelar_pacote">CANCELAR PACOTE</option>
            </select>
            <input type="text" id="nome" placeholder="Seu Nome *" required>
            <input type="tel" id="zap" placeholder="WhatsApp (119...) *" maxlength="11" required>
            <div class="flex gap-1">
                <input type="text" id="rua" placeholder="Rua e Número *" required>
                <input type="text" value="Sol Nascente" readonly class="bg-gray-100 font-bold text-[10px] w-24">
            </div>
            <button onclick="valida(1, 2)" class="btn">PRÓXIMO</button>
        </div>

        <!-- ETAPA 2: PETS -->
        <div id="step2" class="step card">
            <h2 class="font-bold mb-4 uppercase text-sm">Etapa 2: Pets</h2>
            <select id="qtd" onchange="gerarPets()">
                <option value="1">1 Pet</option><option value="2">2 Pets</option><option value="3">3 Pets</option><option value="4">4 Pets</option>
            </select>
            <div id="petsCont"></div>
            <button onclick="valida(2, 3)" class="btn">PRÓXIMO</button>
        </div>

        <!-- ETAPA 3: PLANO -->
        <div id="step3" class="step card">
            <h2 class="font-bold mb-4 uppercase text-sm">Etapa 3: Planos</h2>
            <div id="planoCont"></div>
            <button onclick="valida(3, 4)" class="btn">PRÓXIMO</button>
        </div>

        <!-- ETAPA 4: DATA -->
        <div id="step4" class="step card">
            <h2 class="font-bold mb-4 uppercase text-sm">Etapa 4: Horário</h2>
            <div id="dataCont"></div>
            <button id="btnFin" onclick="finalizar()" class="btn">CONFIRMAR ✅</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://supabase.co";
        const SB_KEY = "sb_publishable_6SmMDIymguOi59WrVb1QQA_wSykUdUm";

        function valida(atual, prox) {
            const inputs = document.getElementById('step'+atual).querySelectorAll('[required]');
            for(let i of inputs) if(!i.value) return alert("Preencha tudo!");
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step'+prox).classList.add('active');
            if(prox===2) gerarPets();
            if(prox===3) gerarPlanos();
            if(prox===4) gerarDatas();
        }

        function gerarPets() {
            const q = document.getElementById('qtd').value;
            let h = '';
            for(let i=1; i<=q; i++) h += `<input type="text" id="p_nome${i}" placeholder="Nome do Pet ${i} *" required>
            <select id="p_esp${i}"><option value="cachorro">Cachorro</option><option value="gato">Gato</option></select>`;
            document.getElementById('petsCont').innerHTML = h;
        }

        // Simplificação da lógica de finalização
        async function finalizar() {
            const btn = document.getElementById('btnFin');
            btn.innerText = "ENVIANDO..."; btn.disabled = true;

            const dados = {
                cliente: document.getElementById('nome').value,
                whatsapp: document.getElementById('zap').value,
                rua: document.getElementById('rua').value + ", Sol Nascente",
                tipo_servico: "Agendamento via Site",
                data: new Date().toISOString().split('T')[0]
            };

            const res = await fetch(`${SB_URL}/agendamentos`, {
                method: 'POST',
                headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json", "Prefer": "return=minimal" },
                body: JSON.stringify(dados)
            });

            if(res.ok) {
                alert("AGENDADO! Em breve nossa equipe entrará em contato. De imediato mande foto do seu pet para adiantar o atendimento.");
                location.reload();
            }
        }
    </script>
</body>
</html>
