<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Nilo Pet - Agendamento Oficial</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background-color: #f0f9ff; font-family: sans-serif; color: #1e293b; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin: 15px; padding: 25px; border: 1px solid #e2e8f0; }
        input, select, textarea { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #e2e8f0; margin-bottom: 12px; font-size: 16px; color: black; }
        .btn-next { background-color: #dc2626; color: white; width: 100%; padding: 18px; border-radius: 12px; font-weight: 800; font-size: 18px; border: none; cursor: pointer; }
        .btn-cancel-final { background-color: #ef4444; color: white; width: 100%; padding: 15px; border-radius: 12px; font-weight: 800; margin-top: 10px; cursor: pointer; }
        .step-content { display: none; }
        .step-content.active { display: block; }
        .pet-box { border: 2px solid #e2e8f0; padding: 15px; border-radius: 15px; margin-bottom: 15px; background: #f8fafc; }
        .label-req { display: block; font-size: 10px; margin-bottom: 4px; text-transform: uppercase; font-weight: 900; }
        .hidden { display: none; }
        .aviso-pacote { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; padding: 15px; border-radius: 10px; font-size: 12px; font-weight: bold; line-height: 1.4; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="bg-white p-6 text-center border-b shadow-sm">
        <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter italic">Nilo Pet</h1>
        <p class="text-red-600 font-bold text-xs uppercase">Banho e Tosa</p>
    </div>

    <form id="niloForm">
        <!-- ETAPA 1: ESCOLHA INICIAL -->
        <div id="step1" class="step-content active">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline text-sm">Etapa 1: O que deseja fazer?</h2>
                
                <label class="label-req">Selecione uma opção:</label>
                <select id="acaoInicial" onchange="toggleAcao()">
                    <option value="">Selecione...</option>
                    <option value="agendar">NOVO AGENDAMENTO</option>
                    <option value="cancelar_avulso">CANCELAR SERVIÇO AVULSO</option>
                    <option value="cancelar_pacote">CANCELAR PACOTE</option>
                </select>

                <!-- Campos para Agendamento -->
                <div id="camposAgendar" class="hidden">
                    <label class="label-req">Nome do Cliente *</label>
                    <input type="text" id="nomeCliente" placeholder="Nome completo">
                    
                    <label class="label-req">WhatsApp (11 dígitos) *</label>
                    <input type="tel" id="whatsapp" placeholder="11999998888" maxlength="11">
                    
                    <label class="label-req">Rua e Número *</label>
                    <div class="flex gap-2 mb-3">
                        <input type="text" id="rua" placeholder="Ex: Rua das Flores, 123" class="flex-grow mb-0">
                        <input type="text" value="Sol Nascente" readonly class="w-32 bg-slate-100 font-bold text-slate-500 text-center border-none text-[10px] mb-0" tabindex="-1">
                    </div>
                    
                    <button type="button" onclick="validaAgendamento()" class="btn-next mt-4">PRÓXIMO</button>
                </div>

                <!-- Campos para Cancelar Avulso -->
                <div id="camposCancelAvulso" class="hidden">
                    <label class="label-req">Data do Agendamento *</label>
                    <input type="date" id="cancelData">
                    <label class="label-req">Horário *</label>
                    <input type="time" id="cancelHora">
                    <label class="label-req">Nome do Cliente *</label>
                    <input type="text" id="cancelNome" placeholder="Seu nome">
                    <label class="label-req">Nome do Pet *</label>
                    <input type="text" id="cancelPet" placeholder="Nome do pet">
                    <button type="button" onclick="confirmarCancelamento('Avulso')" class="btn-cancel-final">CONFIRMAR CANCELAMENTO DO AVULSO</button>
                </div>

                <!-- Campos para Cancelar Pacote -->
                <div id="camposCancelPacote" class="hidden">
                    <div class="aviso-pacote">
                        AO CANCELAR ESTA DATA VOCÊ IRÁ CANCELAR TODO SEU PACOTE. SE FOR A TROCA DE DATA FALE COM OS ATENDENTES PARA SEGUIR COM OS DEMAIS AGENDAMENTOS DO PACOTE.
                    </div>
                    <label class="label-req">Nome do Cliente (Titular do Pacote) *</label>
                    <input type="text" id="cancelPacoteNome" placeholder="Nome completo">
                    <button type="button" onclick="confirmarCancelamento('Pacote')" class="btn-cancel-final">CONFIRMAR CANCELAMENTO DO PACOTE</button>
                </div>
            </div>
        </div>

        <!-- ETAPA 2: PETS -->
        <div id="step2" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline text-sm">Etapa 2: Dados do Pet</h2>
                <label class="label-req">Quantidade de Pets (Max 4)</label>
                <select id="qtdPets" onchange="renderPets()">
                    <option value="1">1 Pet</option><option value="2">2 Pets</option>
                    <option value="3">3 Pets</option><option value="4">4 Pets</option>
                </select>
                <div id="petsContainer"></div>
                <button type="button" onclick="next(3)" class="btn-next">PRÓXIMO</button>
                <button type="button" onclick="next(1)" class="btn-cancel bg-slate-400 text-white w-full p-3 rounded-lg font-bold mt-2">VOLTAR</button>
            </div>
        </div>

        <!-- ETAPA 3: SERVIÇOS -->
        <div id="step3" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline text-sm">Etapa 3: Serviços</h2>
                <select id="tipoPlano" onchange="renderServicos()">
                    <option value="avulso">AVULSO</option>
                    <option value="basico">PACOTE BÁSICO</option>
                    <option value="basico_tosa">PACOTE BÁSICO COM TOSA</option>
                    <option value="premium">PACOTE PREMIUM</option>
                </select>
                <div id="boxServico"></div>
                <button type="button" onclick="next(4)" class="btn-next">ESCOLHER HORÁRIOS</button>
                <button type="button" onclick="next(2)" class="btn-cancel bg-slate-400 text-white w-full p-3 rounded-lg font-bold mt-2">VOLTAR</button>
            </div>
        </div>

        <!-- ETAPA 4: HORÁRIOS -->
        <div id="step4" class="step-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-slate-700 uppercase underline text-sm">Etapa 4: Horários</h2>
                <div id="datasContainer"></div>
                <button type="button" onclick="finish()" class="btn-next">CONFIRMAR AGENDAMENTO ✅</button>
                <button type="button" onclick="next(3)" class="btn-cancel bg-slate-400 text-white w-full p-3 rounded-lg font-bold mt-2">VOLTAR</button>
            </div>
        </div>
    </form>

    <script>
        function toggleAcao() {
            const acao = document.getElementById('acaoInicial').value;
            document.getElementById('camposAgendar').classList.toggle('hidden', acao !== 'agendar');
            document.getElementById('camposCancelAvulso').classList.toggle('hidden', acao !== 'cancelar_avulso');
            document.getElementById('camposCancelPacote').classList.toggle('hidden', acao !== 'cancelar_pacote');
        }

        function next(n) {
            document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
            document.getElementById('step'+n).classList.add('active');
            if(n===2) renderPets();
            if(n===3) renderServicos();
            if(n===4) renderDatas();
            window.scrollTo(0,0);
        }

        function validaAgendamento() {
            const n = document.getElementById('nomeCliente').value;
            const w = document.getElementById('whatsapp').value;
            const r = document.getElementById('rua').value;
            if(!n || w.length !== 11 || !r) return alert("Preencha Nome, WhatsApp (11 dígitos) e Rua!");
            next(2);
        }

        function confirmarCancelamento(tipo) {
            alert("Solicitação de cancelamento de " + tipo + " enviada com sucesso!");
            location.reload();
        }

        function renderPets() {
            const qtd = document.getElementById('qtdPets').value;
            const container = document.getElementById('petsContainer');
            container.innerHTML = '';
            for(let i=1; i<=qtd; i++) {
                container.innerHTML += `
                <div class="pet-box">
                    <label class="label-req italic">Nome do Pet ${i} *</label>
                    <input type="text" class="pet-nome" required>
                    <label class="label-req">Espécie</label>
                    <select onchange="checkEspecie(this)">
                        <option value="Cachorro">Cachorro</option><option value="Gato">Gato</option>
                    </select>
                    <div class="porte-div">
                        <label class="label-req">Porte</label>
                        <select><option>Pequeno</option><option>Médio</option><option>Grande pelo curto</option><option>Grande peludo</option></select>
                    </div>
                </div>`;
            }
        }

        function checkEspecie(el) {
            const p = el.parentElement.querySelector('.porte-div');
            el.value === 'Gato' ? p.classList.add('hidden') : p.classList.remove('hidden');
        }

        function renderServicos() {
            const t = document.getElementById('tipoPlano').value;
            const b = document.getElementById('boxServico');
            if(t === 'avulso') {
                b.innerHTML = `<label class="label-req">Serviço:</label><select><option>Banho</option><option>Banho + Tosa Higiênica</option><option>Banho + Tosa</option></select>`;
            } else {
                b.innerHTML = `<div class="p-3 bg-gray-100 rounded-lg font-bold text-red-600 text-xs">SERVIÇO DO PACOTE BLOQUEADO</div>`;
            }
        }

        function renderDatas() {
            const t = document.getElementById('tipoPlano').value;
            const num = t==='avulso'?1:(t==='premium'?4:2);
            const container = document.getElementById('datasContainer');
            container.innerHTML = '';
            for(let i=1; i<=num; i++) {
                container.innerHTML += `<div class="mb-4 p-4 border rounded bg-slate-50"><label class="label-req">Data ${i}</label><input type="date" required><label class="label-req">Horários</label><select><option>09:00</option><option>11:00</option><option>14:30</option></select></div>`;
            }
        }

        function finish() {
            const nome = document.getElementById('nomeCliente').value;
            alert("AGENDAMENTO CONFIRMADO!\n\n" + nome + ", logo mais nossa equipe entrará em contato para passar valores. Envie a foto do pet no WhatsApp.");
        }
    </script>
</body>
</html>
